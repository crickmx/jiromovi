<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SICAS - Test de Formatos XML</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .test-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      display: block;
      margin: 0 auto 30px;
    }

    .test-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
    }

    .test-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: white;
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .loading.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .summary-box {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      display: none;
    }

    .summary-box.show {
      display: block;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .summary-title {
      font-size: 1.8rem;
      color: #2d3748;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .recommendation {
      background: #f7fafc;
      border-left: 4px solid #48bb78;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .recommendation.warning {
      border-left-color: #f6ad55;
    }

    .recommendation.error {
      border-left-color: #fc8181;
    }

    .recommendation-text {
      font-size: 1.1rem;
      color: #2d3748;
      font-weight: 500;
    }

    .results-grid {
      display: grid;
      gap: 20px;
    }

    .result-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-left: 4px solid #cbd5e0;
      transition: all 0.3s ease;
    }

    .result-card:hover {
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      transform: translateX(5px);
    }

    .result-card.success {
      border-left-color: #48bb78;
      background: linear-gradient(to right, #f0fff4, white);
    }

    .result-card.partial {
      border-left-color: #f6ad55;
      background: linear-gradient(to right, #fffaf0, white);
    }

    .result-card.error {
      border-left-color: #fc8181;
      background: linear-gradient(to right, #fff5f5, white);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .result-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2d3748;
    }

    .result-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-success {
      background: #48bb78;
      color: white;
    }

    .badge-partial {
      background: #f6ad55;
      color: white;
    }

    .badge-error {
      background: #fc8181;
      color: white;
    }

    .result-description {
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 15px;
    }

    .result-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 15px;
    }

    .detail-item {
      background: #f7fafc;
      padding: 10px;
      border-radius: 8px;
    }

    .detail-label {
      font-size: 0.8rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 1rem;
      color: #2d3748;
      font-weight: 600;
    }

    .error-message {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      padding: 12px;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.9rem;
      margin-top: 10px;
      word-break: break-word;
    }

    .response-preview {
      margin-top: 15px;
    }

    .response-toggle {
      background: #4a5568;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.3s ease;
    }

    .response-toggle:hover {
      background: #2d3748;
    }

    .response-content {
      display: none;
      background: #2d3748;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .response-content.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧪 SICAS XML Format Tester</h1>
      <p>Probando 6 variantes de XML para identificar el formato correcto</p>
    </div>

    <button id="btnTest" class="test-btn" onclick="runTests()">
      Ejecutar 6 Tests de Formato XML
    </button>

    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      Probando diferentes formatos XML... (10-15 segundos)
    </div>

    <div id="summaryBox" class="summary-box">
      <h2 class="summary-title">📊 Resumen de Resultados</h2>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="totalTests">0</div>
          <div class="stat-label">Tests Ejecutados</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="workingTests">0</div>
          <div class="stat-label">Exitosos</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="partialTests">0</div>
          <div class="stat-label">Errores VB</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="errorTests">0</div>
          <div class="stat-label">Otros Errores</div>
        </div>
      </div>

      <div id="recommendationBox" class="recommendation">
        <div class="recommendation-text" id="recommendationText"></div>
      </div>
    </div>

    <div id="results" class="results-grid"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';
    const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/sicas-test-xml-formats`;

    async function runTests() {
      const btn = document.getElementById('btnTest');
      const loading = document.getElementById('loading');
      const summaryBox = document.getElementById('summaryBox');
      const resultsDiv = document.getElementById('results');

      btn.disabled = true;
      loading.classList.add('show');
      summaryBox.classList.remove('show');
      resultsDiv.innerHTML = '';

      try {
        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'apikey': SUPABASE_ANON_KEY,
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const data = await response.json();

        // Update summary
        document.getElementById('totalTests').textContent = data.summary.total;
        document.getElementById('workingTests').textContent = data.summary.working;
        document.getElementById('partialTests').textContent = data.summary.partialSuccess;
        document.getElementById('errorTests').textContent = data.summary.otherErrors + data.summary.fetchErrors;

        // Update recommendation
        const recommendationBox = document.getElementById('recommendationBox');
        const recommendationText = document.getElementById('recommendationText');
        recommendationText.textContent = data.recommendation;

        if (data.summary.working > 0) {
          recommendationBox.className = 'recommendation';
        } else if (data.summary.partialSuccess === data.summary.total) {
          recommendationBox.className = 'recommendation warning';
        } else {
          recommendationBox.className = 'recommendation error';
        }

        // Display results
        data.results.forEach((result, index) => {
          const card = document.createElement('div');

          let cardClass = 'result-card';
          let badgeClass = 'result-badge';
          let badgeText = '';

          if (!result.hasError && result.success) {
            cardClass += ' success';
            badgeClass += ' badge-success';
            badgeText = '✅ Funciona';
          } else if (result.errorType === 'VB_OBJECT_ERROR') {
            cardClass += ' partial';
            badgeClass += ' badge-partial';
            badgeText = '⚠️ Error VB';
          } else {
            cardClass += ' error';
            badgeClass += ' badge-error';
            badgeText = '❌ Error';
          }

          card.className = cardClass;
          card.innerHTML = `
            <div class="result-header">
              <div>
                <div class="result-title">${index + 1}. ${result.name}</div>
                <div class="result-description">${result.description}</div>
              </div>
              <span class="${badgeClass}">${badgeText}</span>
            </div>

            <div class="result-details">
              <div class="detail-item">
                <div class="detail-label">HTTP Status</div>
                <div class="detail-value">${result.httpStatus}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Response</div>
                <div class="detail-value">${result.responseTxt}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Tiempo</div>
                <div class="detail-value">${result.responseTime}ms</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Registros</div>
                <div class="detail-value">${result.recordCount}</div>
              </div>
            </div>

            ${result.hasError ? `
              <div class="error-message">
                <strong>Mensaje:</strong> ${result.message}
              </div>
            ` : ''}

            <div class="response-preview">
              <button class="response-toggle" onclick="toggleResponse(${index})">
                Ver respuesta XML
              </button>
              <div id="response-${index}" class="response-content">
${result.rawResponse}
              </div>
            </div>
          `;

          resultsDiv.appendChild(card);
        });

        summaryBox.classList.add('show');

      } catch (error) {
        resultsDiv.innerHTML = `
          <div class="result-card error">
            <div class="result-title">❌ Error General</div>
            <div class="error-message">${error.message}</div>
          </div>
        `;
      } finally {
        loading.classList.remove('show');
        btn.disabled = false;
      }
    }

    function toggleResponse(index) {
      const responseDiv = document.getElementById(`response-${index}`);
      responseDiv.classList.toggle('show');
    }
  </script>
</body>
</html>

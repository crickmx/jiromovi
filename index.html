    <script>
      // Domain gate: MUST be first script to prevent stale SW from redirecting public pages
      (function() {
        var host = window.location.host.toLowerCase();
        if (host !== 'agentedeseguros.website' && host !== 'www.agentedeseguros.website') return;
        // Unregister all service workers immediately on public domain
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
        var path = window.location.pathname || '/';
        // Allow public form pages
        if (path.indexOf('/cotizar/') === 0 || path === '/cotizar') return;
        if (path.indexOf('/registro-personal') === 0) return;
        // Allow single-segment agent slugs (not reserved)
        if (/^\/[^\/]+$/.test(path)) {
          var slug = path.replace(/^\/+/, '').toLowerCase();
          var reserved = ['login','dashboard','crm','comisiones','publicidad','admin','api','assets','configuracion','directorio','chat','vacaciones','tramites','store','mis-comisiones','mi-produccion','oficinas','notificaciones','comunicados','perfil','usuarios','education','espacio-jiro','movimeet','catalogos'];
          if (slug && reserved.indexOf(slug) === -1) return;
        }
        // Everything else redirects to main site
        window.location.replace('https://www.movi.digital');
      })();
    </script>

    <script>
      (function() {
        var STORAGE_KEY = 'movi-theme-mode';
        var mode = localStorage.getItem(STORAGE_KEY) || 'system';
        var shouldBeDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (shouldBeDark) {
          document.documentElement.classList.add('dark');

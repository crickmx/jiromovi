app = "movi-whatsapp-server"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3100"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "wa_sessions"
  destination = "/app/sessions"

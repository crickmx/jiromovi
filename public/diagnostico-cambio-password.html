<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico - Cambio de Contraseña</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h1 { color: #1e293b; margin-top: 0; }
    h2 { font-size: 18px; color: #475569; margin-top: 0; }
    button {
      background: #3b82f6;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
    }
    button:hover { background: #2563eb; }
    button.secondary {
      background: #64748b;
    }
    button.danger {
      background: #dc2626;
    }
    .result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    .success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .error { background: #fee; color: #991b1b; border: 1px solid #fca5a5; }
    .info { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    .warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 8px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Diagnóstico - Cambio de Contraseña</h1>
    <p style="color: #64748b;">
      Usuario: <strong>ccjimenez@me.com</strong><br>
      Nueva contraseña intentada: <strong>123456</strong>
    </p>
  </div>

  <div class="card">
    <h2>Paso 1: Login como Admin</h2>
    <label>Email Admin:</label>
    <input type="email" id="adminEmail" value="admin@jiro.mx" />
    <label>Contraseña Admin:</label>
    <input type="password" id="adminPassword" />
    <button onclick="loginAdmin()">Login Admin</button>
    <div id="loginResult"></div>
  </div>

  <div class="card" id="diagnosticSection" style="display: none;">
    <h2>Paso 2: Diagnóstico del Usuario</h2>
    <button onclick="buscarUsuario()">Buscar Usuario en BD</button>
    <button onclick="verificarAuth()" class="secondary">Verificar en Auth</button>
    <div id="diagnosticResult"></div>
  </div>

  <div class="card" id="updateSection" style="display: none;">
    <h2>Paso 3: Cambiar Contraseña</h2>
    <label>Nueva Contraseña:</label>
    <input type="password" id="newPassword" value="123456" />
    <button onclick="cambiarPassword()">Cambiar Contraseña</button>
    <button onclick="cambiarPasswordDirecto()" class="danger">Forzar Cambio (Service Role)</button>
    <div id="updateResult"></div>
  </div>

  <div class="card" id="verifySection" style="display: none;">
    <h2>Paso 4: Verificar Cambio</h2>
    <button onclick="probarLogin()">Probar Login con Nueva Contraseña</button>
    <div id="verifyResult"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentSession = null;
    let targetUserId = null;
    const targetEmail = 'ccjimenez@me.com';

    async function loginAdmin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const resultDiv = document.getElementById('loginResult');

      if (!email || !password) {
        resultDiv.innerHTML = `<div class="result error">❌ Por favor ingresa email y contraseña</div>`;
        return;
      }

      try {
        resultDiv.innerHTML = '<div class="result info">🔄 Iniciando sesión...</div>';

        console.log('Intentando login con:', { email, url: SUPABASE_URL });

        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        console.log('Respuesta auth:', { data: !!data, error: error?.message });

        if (error) {
          console.error('Error de autenticación:', error);
          throw error;
        }

        if (!data.session) {
          throw new Error('No se obtuvo sesión válida');
        }

        currentSession = data.session;
        console.log('Sesión obtenida:', currentSession.user.email);

        resultDiv.innerHTML = '<div class="result info">✅ Autenticación exitosa. Verificando rol...</div>';

        // Verificar rol
        const { data: userData, error: userError } = await supabaseClient
          .from('usuarios')
          .select('rol, nombre, apellidos')
          .eq('email_laboral', email)
          .maybeSingle();

        console.log('Usuario encontrado:', userData);

        if (userError) {
          console.error('Error al obtener usuario:', userError);
          throw new Error(`Error al verificar usuario: ${userError.message}`);
        }

        if (!userData) {
          throw new Error('Usuario no encontrado en la tabla usuarios');
        }

        if (userData.rol !== 'Administrador') {
          throw new Error(`Este usuario tiene rol "${userData.rol}", se requiere Administrador`);
        }

        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Sesión iniciada como <strong>${userData.nombre} ${userData.apellidos}</strong><br>
            <small>Rol: ${userData.rol}</small>
          </div>
        `;

        document.getElementById('diagnosticSection').style.display = 'block';

      } catch (error) {
        console.error('Error completo:', error);
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Error: ${error.message}<br><br>
            <strong>Posibles causas:</strong><br>
            • Contraseña incorrecta<br>
            • Usuario no existe<br>
            • Rol no es Administrador<br>
            • Problema de conexión<br><br>
            <small>Revisa la consola del navegador para más detalles</small>
          </div>
        `;
      }
    }

    async function buscarUsuario() {
      const resultDiv = document.getElementById('diagnosticResult');

      try {
        resultDiv.innerHTML = '<div class="result info">🔍 Buscando usuario...</div>';

        const { data: usuario, error } = await supabaseClient
          .from('usuarios')
          .select('*')
          .eq('email_laboral', targetEmail)
          .maybeSingle();

        if (error) throw error;

        if (!usuario) {
          throw new Error('Usuario no encontrado en la tabla usuarios');
        }

        targetUserId = usuario.id;

        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Usuario encontrado en tabla usuarios:<br><br>
            <strong>ID:</strong> ${usuario.id}<br>
            <strong>Nombre:</strong> ${usuario.nombre} ${usuario.apellidos}<br>
            <strong>Email:</strong> ${usuario.email_laboral}<br>
            <strong>Rol:</strong> ${usuario.rol}<br>
            <strong>Oficina ID:</strong> ${usuario.oficina_id || 'Sin asignar'}<br>
          </div>
        `;

        document.getElementById('updateSection').style.display = 'block';

      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">❌ ${error.message}</div>`;
      }
    }

    async function verificarAuth() {
      const resultDiv = document.getElementById('diagnosticResult');

      try {
        resultDiv.innerHTML = '<div class="result info">🔍 Consultando auth.users...</div>';

        // Intentar obtener info del usuario de auth
        const { data, error } = await supabaseClient.rpc('get_auth_user_info', {
          user_email: targetEmail
        });

        if (error) {
          // Si la función no existe, mostrar instrucciones
          resultDiv.innerHTML = `
            <div class="result warning">
              ⚠️ No se puede consultar auth.users directamente desde el cliente.<br>
              Esto solo se puede hacer desde el servidor con service_role_key.<br><br>
              <strong>Lo que sabemos:</strong><br>
              - El usuario existe en la tabla usuarios<br>
              - El ID es: ${targetUserId}<br>
              - Para verificar auth, necesitamos usar la edge function
            </div>
          `;
        }

      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">❌ ${error.message}</div>`;
      }
    }

    async function cambiarPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const resultDiv = document.getElementById('updateResult');

      if (!targetUserId) {
        resultDiv.innerHTML = '<div class="result error">Primero busca el usuario</div>';
        return;
      }

      if (!currentSession) {
        resultDiv.innerHTML = '<div class="result error">No hay sesión activa</div>';
        return;
      }

      try {
        resultDiv.innerHTML = '<div class="result info">🔄 Cambiando contraseña...</div>';

        console.log('Request:', {
          url: `${SUPABASE_URL}/functions/v1/update-user-password`,
          userId: targetUserId,
          password: newPassword,
        });

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/update-user-password`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${currentSession.access_token}`,
            },
            body: JSON.stringify({
              userId: targetUserId,
              password: newPassword,
            }),
          }
        );

        console.log('Response status:', response.status);
        const result = await response.json();
        console.log('Response body:', result);

        if (!response.ok) {
          throw new Error(result.error || 'Error al actualizar contraseña');
        }

        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Contraseña actualizada correctamente<br><br>
            <strong>Usuario:</strong> ${targetEmail}<br>
            <strong>Nueva contraseña:</strong> ${newPassword}<br>
            <strong>Respuesta del servidor:</strong><br>
            <pre>${JSON.stringify(result, null, 2)}</pre>
          </div>
        `;

        document.getElementById('verifySection').style.display = 'block';

      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Error al cambiar contraseña:<br>
            ${error.message}<br><br>
            <strong>Verifica:</strong><br>
            • La edge function está desplegada<br>
            • Tienes permisos de administrador<br>
            • La sesión está activa
          </div>
        `;
        console.error('Error completo:', error);
      }
    }

    async function cambiarPasswordDirecto() {
      const newPassword = document.getElementById('newPassword').value;
      const resultDiv = document.getElementById('updateResult');

      if (!targetUserId) {
        resultDiv.innerHTML = '<div class="result error">Primero busca el usuario</div>';
        return;
      }

      try {
        resultDiv.innerHTML = `
          <div class="result warning">
            ⚠️ Método directo con service_role_key<br>
            Este método fuerza el cambio directamente en auth.users<br>
            <br>
            <strong>IMPORTANTE:</strong> Este método solo funciona si tienes acceso al service_role_key
          </div>
        `;

        // Este método requiere service_role_key que no está disponible en el cliente
        alert('Este método debe ejecutarse desde el servidor o una edge function con service_role_key');

      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">❌ ${error.message}</div>`;
      }
    }

    async function probarLogin() {
      const newPassword = document.getElementById('newPassword').value;
      const resultDiv = document.getElementById('verifyResult');

      try {
        resultDiv.innerHTML = '<div class="result info">🔄 Probando login...</div>';

        // Primero cerrar sesión actual
        await supabaseClient.auth.signOut();

        // Intentar login con nueva contraseña
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: targetEmail,
          password: newPassword
        });

        if (error) throw error;

        resultDiv.innerHTML = `
          <div class="result success">
            ✅ LOGIN EXITOSO<br><br>
            <strong>Usuario:</strong> ${targetEmail}<br>
            <strong>Contraseña:</strong> ${newPassword}<br>
            <strong>Auth User ID:</strong> ${data.user.id}<br>
            <strong>Session creada:</strong> ${new Date(data.session.expires_at * 1000).toLocaleString()}<br><br>
            <strong>✅ La contraseña SÍ se cambió correctamente</strong>
          </div>
        `;

        // Restaurar sesión de admin
        setTimeout(() => {
          resultDiv.innerHTML += '<div class="result info" style="margin-top: 12px;">Por favor, vuelve a hacer login como admin para continuar</div>';
        }, 2000);

      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ LOGIN FALLÓ<br><br>
            <strong>Error:</strong> ${error.message}<br><br>
            <strong>Posibles causas:</strong><br>
            • La contraseña no se actualizó correctamente<br>
            • El usuario no existe en auth.users<br>
            • El email es incorrecto<br><br>
            <strong>Email intentado:</strong> ${targetEmail}<br>
            <strong>Password intentado:</strong> ${newPassword}
          </div>
        `;
      }
    }
  </script>
</body>
</html>

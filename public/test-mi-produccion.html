<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Mi Producción</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 10px 10px 0;
    }
    button:hover {
      background: #2563eb;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f0f9ff;
      border-radius: 8px;
      border: 1px solid #bae6fd;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      max-height: 600px;
      overflow-y: auto;
    }
    .error {
      background: #fee;
      border-color: #fcc;
      color: #c00;
    }
    .success {
      background: #efe;
      border-color: #cfc;
      color: #060;
    }
    .info {
      padding: 10px;
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Test Mi Producción - Diagnóstico</h1>

    <div class="info">
      <strong>Instrucciones:</strong>
      <ol>
        <li>Inicia sesión con tus credenciales</li>
        <li>Prueba la función get-my-production</li>
        <li>Revisa los resultados para identificar el problema</li>
      </ol>
    </div>

    <div class="section">
      <h2>1. Iniciar Sesión</h2>
      <input type="email" id="email" placeholder="Email" style="padding: 8px; margin-right: 10px; width: 250px;">
      <input type="password" id="password" placeholder="Password" style="padding: 8px; margin-right: 10px; width: 200px;">
      <button onclick="login()">Iniciar Sesión</button>
      <div id="loginResult" class="result" style="display: none;"></div>
    </div>

    <div class="section">
      <h2>2. Verificar Usuario y Mapeo</h2>
      <button onclick="checkUserMapping()">Verificar Mapeo de Vendedor</button>
      <div id="mappingResult" class="result" style="display: none;"></div>
    </div>

    <div class="section">
      <h2>3. Verificar Google Sheets Config</h2>
      <button onclick="checkGoogleSheetsConfig()">Verificar Configuración</button>
      <button onclick="testGoogleSheetsAccess()">Probar Acceso a Google Sheets</button>
      <div id="sheetsResult" class="result" style="display: none;"></div>
    </div>

    <div class="section">
      <h2>4. Probar Edge Function</h2>
      <button onclick="testGetMyProduction()">Llamar get-my-production</button>
      <button onclick="testGetMyProductionWithParams()">Llamar con Filtros</button>
      <div id="functionResult" class="result" style="display: none;"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://pwncaeyftuydixgmpbzf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3bmNhZXlmdHV5ZGl4Z21wYnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NTk4MDYsImV4cCI6MjA0NTEzNTgwNn0.Y6q-Z6gUj8q7M9xEGLBxZYtlIDLSJ76VXCjjQ90sHyA';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentSession = null;

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const resultDiv = document.getElementById('loginResult');

      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = 'Iniciando sesión... <div class="loading"></div>';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        currentSession = data.session;
        resultDiv.className = 'result success';
        resultDiv.textContent = `✅ Sesión iniciada correctamente\n\nUsuario ID: ${data.user.id}\nEmail: ${data.user.email}`;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Error: ${error.message}`;
      }
    }

    async function checkUserMapping() {
      if (!currentSession) {
        alert('Por favor inicia sesión primero');
        return;
      }

      const resultDiv = document.getElementById('mappingResult');
      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = 'Verificando mapeo... <div class="loading"></div>';

      try {
        // Verificar en production_vendors_cache
        const { data: vendorCache, error: cacheError } = await supabase
          .from('production_vendors_cache')
          .select('*')
          .eq('movi_user_id', currentSession.user.id)
          .maybeSingle();

        if (cacheError) throw cacheError;

        let result = '=== MAPEO DE VENDEDOR ===\n\n';

        if (!vendorCache) {
          result += '❌ NO HAY VENDEDOR ASIGNADO\n\n';
          result += 'Este usuario no tiene un vendedor asociado en production_vendors_cache.\n';
          result += 'Necesitas:\n';
          result += '1. Ir a "Producción por Vendedor"\n';
          result += '2. Hacer clic en "Mapear Vendedor"\n';
          result += '3. Asociar tu usuario con un nombre de vendedor del Excel\n';
        } else {
          result += '✅ VENDEDOR ENCONTRADO\n\n';
          result += `Vendor Nombre: ${vendorCache.vendor_nombre}\n`;
          result += `Vendor Normalizado: ${vendorCache.vendor_nombre_normalized}\n`;
          result += `Usuario ID: ${vendorCache.movi_user_id}\n`;
          result += `Usuario Nombre: ${vendorCache.movi_user_name}\n`;
          result += `Oficina: ${vendorCache.oficina_nombre || 'N/A'}\n`;
          result += `Total Records: ${vendorCache.total_records}\n`;
          result += `Mapping Source: ${vendorCache.mapping_source}\n`;
          result += `Match Method: ${vendorCache.match_method}\n`;
        }

        resultDiv.className = vendorCache ? 'result success' : 'result error';
        resultDiv.textContent = result;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Error: ${error.message}\n\n${error.stack || ''}`;
      }
    }

    async function checkGoogleSheetsConfig() {
      if (!currentSession) {
        alert('Por favor inicia sesión primero');
        return;
      }

      const resultDiv = document.getElementById('sheetsResult');
      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = 'Verificando configuración... <div class="loading"></div>';

      try {
        const { data: config, error } = await supabase
          .from('production_google_sheets_config')
          .select('*')
          .eq('activo', true)
          .maybeSingle();

        if (error) throw error;

        let result = '=== CONFIGURACIÓN DE GOOGLE SHEETS ===\n\n';

        if (!config) {
          result += '❌ NO HAY CONFIGURACIÓN ACTIVA\n\n';
          result += 'No existe una configuración activa de Google Sheets.\n';
        } else {
          result += '✅ CONFIGURACIÓN ENCONTRADA\n\n';
          result += `Sheet ID: ${config.sheet_id}\n`;
          result += `Sheet URL: ${config.sheet_url}\n`;
          result += `Activo: ${config.activo}\n`;
          result += `Created At: ${new Date(config.created_at).toLocaleString('es-MX')}\n`;
          result += `\nCSV URL: https://docs.google.com/spreadsheets/d/${config.sheet_id}/export?format=csv&gid=0\n`;
        }

        resultDiv.className = config ? 'result success' : 'result error';
        resultDiv.textContent = result;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Error: ${error.message}`;
      }
    }

    async function testGoogleSheetsAccess() {
      if (!currentSession) {
        alert('Por favor inicia sesión primero');
        return;
      }

      const resultDiv = document.getElementById('sheetsResult');
      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = 'Probando acceso a Google Sheets... <div class="loading"></div>';

      try {
        const { data: config, error } = await supabase
          .from('production_google_sheets_config')
          .select('sheet_id')
          .eq('activo', true)
          .maybeSingle();

        if (error) throw error;
        if (!config) throw new Error('No hay configuración activa');

        const csvUrl = `https://docs.google.com/spreadsheets/d/${config.sheet_id}/export?format=csv&gid=0`;

        const response = await fetch(csvUrl);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}\n\nPosibles causas:\n- La hoja de cálculo no es pública\n- El enlace es incorrecto\n- El archivo fue eliminado`);
        }

        const csvText = await response.text();
        const lines = csvText.split('\n');

        let result = '=== ACCESO A GOOGLE SHEETS ===\n\n';
        result += `✅ ACCESO EXITOSO\n\n`;
        result += `URL: ${csvUrl}\n`;
        result += `Status: ${response.status} ${response.statusText}\n`;
        result += `Total líneas: ${lines.length}\n\n`;
        result += `Primeras 3 líneas:\n`;
        result += lines.slice(0, 3).join('\n');

        resultDiv.className = 'result success';
        resultDiv.textContent = result;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Error accediendo a Google Sheets:\n\n${error.message}`;
      }
    }

    async function testGetMyProduction() {
      if (!currentSession) {
        alert('Por favor inicia sesión primero');
        return;
      }

      const resultDiv = document.getElementById('functionResult');
      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = 'Llamando a get-my-production... <div class="loading"></div>';

      try {
        const apiUrl = `${SUPABASE_URL}/functions/v1/get-my-production`;

        const params = new URLSearchParams({
          page: '1',
          limit: '10'
        });

        const startTime = Date.now();

        const response = await fetch(`${apiUrl}?${params}`, {
          headers: {
            'Authorization': `Bearer ${currentSession.access_token}`,
            'Content-Type': 'application/json',
          }
        });

        const duration = Date.now() - startTime;

        const result = await response.json();

        let output = '=== RESPUESTA DE get-my-production ===\n\n';
        output += `Status: ${response.status} ${response.statusText}\n`;
        output += `Duración: ${duration}ms\n\n`;
        output += JSON.stringify(result, null, 2);

        resultDiv.className = response.ok ? 'result success' : 'result error';
        resultDiv.textContent = output;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Error:\n\n${error.message}\n\n${error.stack || ''}`;
      }
    }

    async function testGetMyProductionWithParams() {
      if (!currentSession) {
        alert('Por favor inicia sesión primero');
        return;
      }

      const resultDiv = document.getElementById('functionResult');
      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = 'Llamando a get-my-production con filtros... <div class="loading"></div>';

      try {
        const apiUrl = `${SUPABASE_URL}/functions/v1/get-my-production`;

        const today = new Date().toISOString().split('T')[0];
        const firstDayOfYear = new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0];

        const params = new URLSearchParams({
          page: '1',
          limit: '25',
          fechaDesde: firstDayOfYear,
          fechaHasta: today
        });

        const startTime = Date.now();

        const response = await fetch(`${apiUrl}?${params}`, {
          headers: {
            'Authorization': `Bearer ${currentSession.access_token}`,
            'Content-Type': 'application/json',
          }
        });

        const duration = Date.now() - startTime;

        const result = await response.json();

        let output = '=== RESPUESTA DE get-my-production (con filtros) ===\n\n';
        output += `Status: ${response.status} ${response.statusText}\n`;
        output += `Duración: ${duration}ms\n`;
        output += `Filtros aplicados: ${firstDayOfYear} - ${today}\n\n`;
        output += JSON.stringify(result, null, 2);

        resultDiv.className = response.ok ? 'result success' : 'result error';
        resultDiv.textContent = output;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Error:\n\n${error.message}\n\n${error.stack || ''}`;
      }
    }
  </script>
</body>
</html>

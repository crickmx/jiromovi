<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico GMM - Motor de Cálculo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      border-bottom: 3px solid #0066cc;
      padding-bottom: 10px;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-left: 4px solid #0066cc;
    }
    .success {
      color: #28a745;
      font-weight: bold;
    }
    .error {
      color: #dc3545;
      font-weight: bold;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover {
      background: #0052a3;
    }
    .info {
      background: #e7f3ff;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Diagnóstico GMM - Motor de Cálculo</h1>

    <div class="info">
      <strong>Propósito:</strong> Verificar que el motor de cálculo de GMM BX+ esté funcionando correctamente.
    </div>

    <button onclick="diagnosticar()">▶️ Ejecutar Diagnóstico</button>
    <button onclick="location.reload()">🔄 Reiniciar</button>

    <div id="resultado"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jhiutitdmllmrcgkmcvk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoaXV0aXRkbWxsbXJjZ2ttY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NTYwOTYsImV4cCI6MjA0NTEzMjA5Nn0.BmKmA1FuTpAiQwzeXS-KrXW2S3lWLxkV1ub1L18H3Ek';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function log(html) {
      document.getElementById('resultado').innerHTML += html;
    }

    async function diagnosticar() {
      document.getElementById('resultado').innerHTML = '';
      log('<div class="section"><h2>🚀 Iniciando diagnóstico...</h2></div>');

      try {
        // 1. Verificar paquete activo
        log('<div class="section"><h3>1️⃣ Verificando paquete de tarifas activo...</h3>');
        const { data: pkg, error: pkgError } = await supabase
          .from('tariff_packages')
          .select('*')
          .eq('status', 'active')
          .maybeSingle();

        if (pkgError) throw new Error('Error cargando paquete: ' + pkgError.message);
        if (!pkg) throw new Error('No hay paquete de tarifas activo');

        log(`<span class="success">✓ Paquete activo encontrado: ${pkg.name}</span>`);
        log(`<pre>ID: ${pkg.id}\nFecha: ${pkg.created_at}</pre></div>`);

        // 2. Cargar tarifas
        log('<div class="section"><h3>2️⃣ Cargando tablas de tarifas...</h3>');
        const { data: tables, error: tablesError } = await supabase
          .from('tariff_tables')
          .select('*')
          .eq('tariff_package_id', pkg.id);

        if (tablesError) throw new Error('Error cargando tablas: ' + tablesError.message);

        log(`<span class="success">✓ ${tables.length} tablas cargadas</span></div>`);

        // 3. Verificar tablas críticas
        log('<div class="section"><h3>3️⃣ Verificando tablas críticas...</h3>');
        const criticalTables = [
          'factor_estado',
          'factor_nivel_hospitalario',
          'factor_tabulador',
          'factor_suma_asegurada',
          'factor_deducible',
          'factor_coaseguro',
          'base_intermedia_edad_sexo',
          'coef_medicamentos'
        ];

        for (const tableName of criticalTables) {
          const table = tables.find(t => t.table_key === tableName);
          if (!table) {
            log(`<span class="error">✗ Tabla faltante: ${tableName}</span><br>`);
          } else {
            log(`<span class="success">✓ ${tableName}: ${Array.isArray(table.data_json) ? table.data_json.length + ' filas' : 'valor simple'}</span><br>`);
          }
        }
        log('</div>');

        // 4. Prueba de cálculo simple
        log('<div class="section"><h3>4️⃣ Prueba de cálculo...</h3>');

        const factorEstadoTable = tables.find(t => t.table_key === 'factor_estado')?.data_json;
        const queretaro = factorEstadoTable.find(r => r.col_0 === 'QUERETARO');
        if (!queretaro) throw new Error('Estado QUERETARO no encontrado');
        log(`Factor Estado (QUERETARO): col_0="${queretaro.col_0}", col_1=${queretaro.col_1}, col_2=${queretaro.col_2}<br>`);

        const factorNivelTable = tables.find(t => t.table_key === 'factor_nivel_hospitalario')?.data_json;
        const plus = factorNivelTable.find(r => r.col_0 === 'PLUS');
        if (!plus) throw new Error('Nivel PLUS no encontrado');
        log(`Factor Nivel (PLUS): col_0="${plus.col_0}", col_1=${plus.col_1}<br>`);

        const baseIntermediaTable = tables.find(t => t.table_key === 'base_intermedia_edad_sexo')?.data_json;
        const edad40 = baseIntermediaTable.find(r => r.col_0 === 40);
        if (!edad40) throw new Error('Edad 40 no encontrada');
        log(`Base Intermedia (Edad 40): col_0=${edad40.col_0}, col_1(Hombre)=${edad40.col_1}, col_2(Mujer)=${edad40.col_2}<br>`);

        log('<h4>Simulación de cálculo manual:</h4>');
        const baseHombre40 = parseFloat(edad40.col_1);
        const factorEstado = parseFloat(queretaro.col_2); // CORRECCIÓN: usar col_2
        const factorNivel = parseFloat(plus.col_1);

        log(`Base Intermedia (Hombre 40 años): ${baseHombre40.toFixed(2)}<br>`);
        log(`Factor Estado (QUERETARO): ${factorEstado}<br>`);
        log(`Factor Nivel (PLUS): ${factorNivel}<br>`);

        const primaSimple = baseHombre40 * factorEstado * factorNivel;
        log(`<strong>Prima simple (sin otros factores): $${primaSimple.toFixed(2)}</strong><br>`);

        if (primaSimple > 0) {
          log(`<span class="success">✓ El cálculo está funcionando correctamente</span><br>`);
        } else {
          log(`<span class="error">✗ El cálculo devuelve $0 - hay un problema</span><br>`);
        }

        log('</div>');

        // 5. Verificar coeficientes
        log('<div class="section"><h3>5️⃣ Verificando coeficientes de coberturas...</h3>');
        const coefMedicamentos = tables.find(t => t.table_key === 'coef_medicamentos')?.data_json;
        const coefVip = tables.find(t => t.table_key === 'coef_vip')?.data_json;
        const coefMultiregion = tables.find(t => t.table_key === 'multiregion_carga_sistema')?.data_json;

        log(`coef_medicamentos: ${coefMedicamentos}<br>`);
        log(`coef_vip: ${coefVip}<br>`);
        log(`multiregion_carga_sistema: ${coefMultiregion ? coefMultiregion.length + ' zonas' : 'N/A'}<br>`);
        log('</div>');

        log('<div class="section"><h2 class="success">✅ Diagnóstico completado exitosamente</h2></div>');

      } catch (error) {
        log(`<div class="section"><h2 class="error">❌ Error: ${error.message}</h2><pre>${error.stack}</pre></div>`);
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Google Drive Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace;
      padding: 20px;
      background: #1f2937;
      color: #10b981;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #111827;
      padding: 30px;
      border-radius: 8px;
    }
    h1 { margin-bottom: 20px; color: #60a5fa; }
    input {
      width: 100%;
      padding: 12px;
      background: #374151;
      border: 1px solid #4b5563;
      color: white;
      border-radius: 6px;
      margin-bottom: 15px;
      font-family: monospace;
    }
    button {
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }
    button:hover { background: #2563eb; }
    .log {
      background: #000;
      padding: 20px;
      border-radius: 6px;
      margin-top: 20px;
      max-height: 500px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .info { color: #60a5fa; }
    .warning { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Test Google Drive Download</h1>

    <input
      type="text"
      id="driveUrl"
      placeholder="Pega aquí la URL de Google Drive"
      value="https://drive.google.com/file/d/195RA5lOGsZLYB2vJ8gz7gKE0PG4YXmPI/preview"
    >

    <button onclick="testDirect()">Test Descarga Directa</button>
    <button onclick="testEdgeFunction()">Test con Edge Function</button>
    <button onclick="clearLog()">Limpiar Log</button>

    <div class="log" id="log"></div>
  </div>

  <script>
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(line);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function extractFileId(url) {
      const match = url.match(/\/d\/([^\/]+)\//);
      return match ? match[1] : null;
    }

    async function testDirect() {
      clearLog();
      const url = document.getElementById('driveUrl').value;
      const fileId = extractFileId(url);

      if (!fileId) {
        log('❌ No se pudo extraer el File ID', 'error');
        return;
      }

      log(`📋 File ID: ${fileId}`, 'info');

      const methods = [
        { name: 'UC Export', url: `https://drive.google.com/uc?export=download&id=${fileId}` },
        { name: 'UC with Confirm', url: `https://drive.usercontent.google.com/download?id=${fileId}&export=download&confirm=t` },
        { name: 'Direct Link', url: `https://drive.google.com/file/d/${fileId}/view` }
      ];

      for (const method of methods) {
        log(`\n🔄 Probando: ${method.name}`, 'info');
        log(`   URL: ${method.url}`, 'info');

        try {
          const response = await fetch(method.url, {
            method: 'HEAD',
            mode: 'no-cors'
          });

          log(`   ⚠️  No-cors mode - no podemos ver el status`, 'warning');

        } catch (error) {
          log(`   ❌ Error: ${error.message}`, 'error');
        }
      }

      log('\n💡 Conclusión:', 'warning');
      log('Los navegadores bloquean las descargas desde Google Drive por CORS', 'warning');
      log('Es necesario usar una Edge Function con service role', 'warning');
    }

    async function testEdgeFunction() {
      clearLog();
      const url = document.getElementById('driveUrl').value;

      log('🚀 Llamando a Edge Function...', 'info');

      try {
        const response = await fetch('https://qhwvuuyjhcennqccgvse.supabase.co/functions/v1/migrate-videos-from-drive', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ',
          },
          body: JSON.stringify({
            items: [{
              titulo: 'Test Video',
              videoUrl: url,
              imageUrl: ''
            }]
          })
        });

        const result = await response.json();

        log('\n📦 Respuesta:', 'info');
        log(JSON.stringify(result, null, 2), 'info');

        if (result.success) {
          const item = result.results[0];
          if (item.success) {
            log('\n✅ ÉXITO!', 'success');
            if (item.videoUrl) log(`   Video: ${item.videoUrl}`, 'success');
            if (item.imageUrl) log(`   Imagen: ${item.imageUrl}`, 'success');
          } else {
            log('\n❌ ERROR:', 'error');
            item.errors.forEach(err => log(`   - ${err}`, 'error'));
          }
        } else {
          log(`\n❌ Error general: ${result.error}`, 'error');
        }

      } catch (error) {
        log(`\n❌ Error de red: ${error.message}`, 'error');
      }
    }
  </script>
</body>
</html>

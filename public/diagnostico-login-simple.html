<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico de Login - Emergencia</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }
    h1 {
      color: #1a202c;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #2d3748;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .success {
      background: #c6f6d5;
      border: 2px solid #48bb78;
      color: #22543d;
    }
    .error {
      background: #fed7d7;
      border: 2px solid #f56565;
      color: #742a2a;
    }
    .info {
      background: #bee3f8;
      border: 2px solid #4299e1;
      color: #2c5282;
    }
    pre {
      background: #2d3748;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      margin-top: 10px;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .quick-access {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }
    .quick-access h3 {
      font-size: 14px;
      color: #4a5568;
      margin-bottom: 10px;
    }
    .quick-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #edf2f7;
      color: #2d3748;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .quick-btn:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Login de Emergencia</h1>
    <p class="subtitle">Acceso directo si hay problemas con el login principal</p>

    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="admin@movi.mx"
          required
        />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="Tu contraseña"
          required
        />
      </div>

      <button type="submit" id="loginBtn">
        Iniciar Sesión
      </button>
    </form>

    <div id="result"></div>

    <div class="quick-access">
      <h3>Acciones Rápidas</h3>
      <button class="quick-btn" onclick="testConnection()">
        Probar Conexión a Supabase
      </button>
      <button class="quick-btn" onclick="checkPolicies()">
        Verificar Políticas RLS
      </button>
      <button class="quick-btn" onclick="getCurrentSession()">
        Ver Sesión Actual
      </button>
      <button class="quick-btn" onclick="clearSession()">
        Cerrar Sesión y Limpiar Cache
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qxnwjzmmglxilzkmlzpc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bndqem1tZ2x4aWx6a21senBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk0NDE5NDMsImV4cCI6MjA0NTAxNzk0M30.IxWjPwc5snKLvNGEi3mAOIQAn6yAvgNjNjYFOVUiIBQ';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const resultDiv = document.getElementById('result');
    const loginBtn = document.getElementById('loginBtn');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await login();
    });

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span>Iniciando sesión...';
      resultDiv.innerHTML = '';

      try {
        console.log('Intentando login con:', email);

        // Paso 1: Intentar login
        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (authError) {
          throw new Error(`Error de autenticación: ${authError.message}`);
        }

        console.log('Login exitoso, sesión:', authData.session);

        // Paso 2: Intentar obtener datos del usuario
        const { data: userData, error: userError } = await supabase
          .from('usuarios')
          .select('id, nombre_completo, email, rol, estado')
          .eq('id', authData.user.id)
          .single();

        if (userError) {
          console.error('Error al obtener datos del usuario:', userError);
          resultDiv.innerHTML = `
            <div class="result error">
              <strong>⚠️ Login exitoso pero no se pudieron cargar los datos del usuario</strong>
              <p>El login funcionó pero hay un problema con las políticas RLS de la tabla usuarios.</p>
              <pre>${JSON.stringify(userError, null, 2)}</pre>
              <p style="margin-top: 12px;">
                <strong>Solución:</strong> Contacta al administrador del sistema.
              </p>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result success">
              <strong>✅ Login exitoso!</strong>
              <p><strong>Email:</strong> ${authData.user.email}</p>
              <p><strong>Nombre:</strong> ${userData.nombre_completo}</p>
              <p><strong>Rol:</strong> ${userData.rol}</p>
              <p><strong>Estado:</strong> ${userData.estado}</p>
              <p style="margin-top: 12px;">
                <a href="/" style="color: #667eea; font-weight: 600;">
                  → Ir al Dashboard Principal
                </a>
              </p>
            </div>
          `;

          // Redirigir automáticamente después de 2 segundos
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        }
      } catch (error) {
        console.error('Error completo:', error);
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error al iniciar sesión</strong>
            <p>${error.message}</p>
            <pre>${JSON.stringify(error, null, 2)}</pre>
          </div>
        `;
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Iniciar Sesión';
      }
    }

    async function testConnection() {
      resultDiv.innerHTML = '<div class="result info">Probando conexión...</div>';

      try {
        const { data, error } = await supabase.from('usuarios').select('count').limit(1);

        if (error) {
          resultDiv.innerHTML = `
            <div class="result error">
              <strong>❌ Error de conexión</strong>
              <pre>${JSON.stringify(error, null, 2)}</pre>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result success">
              <strong>✅ Conexión exitosa a Supabase</strong>
              <p>La base de datos está accesible.</p>
            </div>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error de red</strong>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    async function checkPolicies() {
      resultDiv.innerHTML = '<div class="result info">Verificando políticas RLS...</div>';

      try {
        const { data: session } = await supabase.auth.getSession();

        if (!session.session) {
          resultDiv.innerHTML = `
            <div class="result error">
              <strong>⚠️ No hay sesión activa</strong>
              <p>Debes iniciar sesión primero para verificar las políticas.</p>
            </div>
          `;
          return;
        }

        // Intentar leer usuarios
        const { data: usuarios, error: usuariosError } = await supabase
          .from('usuarios')
          .select('id, nombre_completo')
          .limit(5);

        resultDiv.innerHTML = `
          <div class="result ${usuariosError ? 'error' : 'success'}">
            <strong>Políticas RLS - Tabla usuarios</strong>
            ${usuariosError
              ? `<p>❌ No se puede leer: ${usuariosError.message}</p>`
              : `<p>✅ Lectura OK (${usuarios.length} usuarios visibles)</p>`
            }
            ${usuariosError ? `<pre>${JSON.stringify(usuariosError, null, 2)}</pre>` : ''}
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error</strong>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    async function getCurrentSession() {
      const { data: { session }, error } = await supabase.auth.getSession();

      if (error || !session) {
        resultDiv.innerHTML = `
          <div class="result info">
            <strong>ℹ️ No hay sesión activa</strong>
            <p>No estás conectado actualmente.</p>
          </div>
        `;
      } else {
        resultDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Sesión activa</strong>
            <p><strong>Usuario:</strong> ${session.user.email}</p>
            <p><strong>Expira:</strong> ${new Date(session.expires_at * 1000).toLocaleString('es-MX')}</p>
            <details>
              <summary style="cursor: pointer; margin-top: 10px;">Ver detalles completos</summary>
              <pre>${JSON.stringify(session, null, 2)}</pre>
            </details>
          </div>
        `;
      }
    }

    async function clearSession() {
      if (confirm('¿Estás seguro de cerrar la sesión y limpiar el cache?')) {
        await supabase.auth.signOut();
        localStorage.clear();
        sessionStorage.clear();

        resultDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Sesión cerrada y cache limpiado</strong>
            <p>Puedes iniciar sesión nuevamente.</p>
          </div>
        `;
      }
    }

    // Auto-check session on load
    window.onload = () => {
      getCurrentSession();
    };
  </script>
</body>
</html>

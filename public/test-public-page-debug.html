<!DOCTYPE html>
<html>
<head>
  <title>Test Public Page API</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test Public Page API - ejemplo</h1>
  <button onclick="testAPI()">Test API Call</button>
  <pre id="result"></pre>

  <script>
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk2MTUzMDAsImV4cCI6MjA0NTE5MTMwMH0.bxqRmBHk1kJRvkKD4ybvJ3WFW0EiFBhPrLW_HhfaLt8';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function testAPI() {
      const resultEl = document.getElementById('result');
      resultEl.textContent = 'Loading...';

      try {
        const { data, error } = await supabase.rpc('get_public_web_page_by_slug', {
          p_slug: 'ejemplo'
        });

        if (error) {
          resultEl.textContent = 'ERROR:\n' + JSON.stringify(error, null, 2);
        } else {
          resultEl.textContent = 'SUCCESS:\n' + JSON.stringify(data, null, 2);
        }
      } catch (err) {
        resultEl.textContent = 'EXCEPTION:\n' + err.message;
      }
    }

    // Auto-run on load
    window.addEventListener('load', testAPI);
  </script>
</body>
</html>

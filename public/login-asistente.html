<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Test Asistente</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    button {
      width: 100%;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
    }
    .quick-login {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    .quick-login h3 {
      margin-top: 0;
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
    }
    .quick-btn {
      background: #2196F3;
      margin-bottom: 10px;
    }
    .quick-btn:hover {
      background: #0b7dda;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🔐 Iniciar Sesión</h1>

    <div id="message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" required placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label>Contraseña:</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" id="loginBtn">Iniciar Sesión</button>
    </form>

    <div class="quick-login">
      <h3>🚀 Usuarios Disponibles (usa tu contraseña)</h3>
      <button class="quick-btn" onclick="quickLogin('cdcjimenez@gmail.com')">
        Christofer Prueba (Agente)
      </button>
      <button class="quick-btn" onclick="quickLogin('ccjimenez@jiro.com.mx')">
        Christofer Cruz (Administrador)
      </button>
      <button class="quick-btn" onclick="quickLogin('djimenez@jiro.mx')">
        Diego Jiménez (Agente)
      </button>
      <button class="quick-btn" onclick="quickLogin('zacatecas@jiro.mx')">
        Pablo Jiménez (Agente)
      </button>
    </div>

    <div class="info">
      <strong>ℹ️ Después de iniciar sesión:</strong><br>
      Serás redirigido a la página de diagnóstico para probar el asistente.
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabaseUrl = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';
    const supabase = createClient(supabaseUrl, supabaseKey);

    // Verificar si ya hay sesión
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      showMessage('Ya tienes sesión activa. Redirigiendo...', 'success');
      setTimeout(() => {
        window.location.href = '/diagnostico-asistente-datos.html';
      }, 1500);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Iniciando sesión...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        showMessage('✅ Sesión iniciada exitosamente. Redirigiendo...', 'success');

        setTimeout(() => {
          window.location.href = '/diagnostico-asistente-datos.html';
        }, 1500);
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    });

    window.quickLogin = function(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').focus();
    };

    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.className = 'message ' + type;
      msgDiv.textContent = text;
      msgDiv.style.display = 'block';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Lecciones - SQL Directo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1400px; margin: 20px auto; padding: 20px; }
    button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; }
    .btn-primary { background: #2196F3; color: white; }
    .btn-success { background: #4CAF50; color: white; }
    .btn-danger { background: #f44336; color: white; }
    #output { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 5px; }
    .log { margin: 5px 0; padding: 8px; background: white; border-left: 3px solid #2196F3; }
    .error { border-left-color: #f44336; color: #f44336; }
    .success { border-left-color: #4CAF50; color: #4CAF50; }
    pre { background: #263238; color: #aed581; padding: 15px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Crear Lecciones On Demand - SQL Directo</h1>

  <div>
    <button class="btn-primary" onclick="generarSQL()">1. Generar SQL</button>
    <button class="btn-success" onclick="ejecutarInsercion()">2. Ejecutar Inserción</button>
    <button class="btn-danger" onclick="verificar()">3. Verificar Lecciones Creadas</button>
  </div>

  <div id="output"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabaseUrl = 'https://lcsjaejpenwecoitbthb.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxjc2phZWpwZW53ZWNvaXRidGhiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcyOTU2MDY5MiwiZXhwIjoyMDQ1MTM2NjkyfQ.KuRZcyW_8e3HUdIXCmcpZSftwf52HhbqvQb9PJSl0_8';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const categoriaId = '058c4297-3721-4847-a069-6c03f815bd7c';
    const logoDefault = 'https://movi.digital/wp-content/uploads/elementor/thumbs/SE_logo-qi2h8gdjgh6jj941hy1ii3ma59is7tbjiuao4t0a2o.png';

    let leccionesData = [];

    function log(mensaje, tipo = 'info') {
      const output = document.getElementById('output');
      const clase = tipo === 'error' ? 'log error' : tipo === 'success' ? 'log success' : 'log';
      output.innerHTML += `<div class="${clase}">${mensaje}</div>`;
    }

    function limpiarTitulo(filename) {
      let titulo = filename.replace(/\.[^/.]+$/, '');
      titulo = titulo.replace(/^\d+\s+/, ''); // Remover fecha al inicio
      titulo = titulo.replace(/\d{1,2}\s+(de\s+)?(Enero|Febrero|Marzo|Abril|Mayo|Junio|Julio|Agosto|Septiembre|Octubre|Noviembre|Diciembre)\s+/gi, '');
      titulo = titulo.replace(/[_-]/g, ' ');
      titulo = titulo.trim();
      titulo = titulo.split(' ')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(' ');
      return titulo;
    }

    window.generarSQL = async function() {
      document.getElementById('output').innerHTML = '';
      log('=== PASO 1: GENERANDO SQL ===');

      try {
        // Obtener videos
        log('Obteniendo lista de videos...');
        const { data: videos, error: errorVideos } = await supabase
          .storage
          .from('videos-seguros-education')
          .list('', { limit: 1000, sortBy: { column: 'name', order: 'asc' } });

        if (errorVideos) {
          log(`ERROR: ${errorVideos.message}`, 'error');
          return;
        }

        const videosLimpios = videos.filter(v => v.name && !v.name.startsWith('.'));
        log(`✓ ${videosLimpios.length} videos encontrados`, 'success');

        // Obtener thumbnails
        log('Obteniendo lista de thumbnails...');
        const { data: thumbnails, error: errorThumbs } = await supabase
          .storage
          .from('thumbnails-seguros-education')
          .list('', { limit: 1000, sortBy: { column: 'name', order: 'asc' } });

        if (errorThumbs) {
          log(`ERROR: ${errorThumbs.message}`, 'error');
          return;
        }

        const thumbsLimpios = thumbnails.filter(t => t.name && !t.name.startsWith('.'));
        log(`✓ ${thumbsLimpios.length} thumbnails encontrados`, 'success');

        // Generar datos de lecciones
        leccionesData = videosLimpios.map((video, index) => {
          const titulo = limpiarTitulo(video.name);
          const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos-seguros-education/${encodeURIComponent(video.name)}`;

          // Buscar thumbnail matching
          const videoBase = video.name.replace(/\.[^/.]+$/, '').toLowerCase().trim();
          const thumb = thumbsLimpios.find(t => {
            const thumbBase = t.name.replace(/\.[^/.]+$/, '').toLowerCase().trim();
            return thumbBase === videoBase ||
                   thumbBase.includes(videoBase) ||
                   videoBase.includes(thumbBase) ||
                   thumbBase.replace(/\s+/g, '') === videoBase.replace(/\s+/g, '');
          });

          const thumbnailUrl = thumb
            ? `${supabaseUrl}/storage/v1/object/public/thumbnails-seguros-education/${encodeURIComponent(thumb.name)}`
            : logoDefault;

          return {
            orden: index + 1,
            titulo,
            video_url: videoUrl,
            miniatura_url: thumbnailUrl,
            video_name: video.name,
            thumb_name: thumb ? thumb.name : '(Logo default)'
          };
        });

        log(`\n✓ ${leccionesData.length} lecciones preparadas`, 'success');

        // Mostrar tabla preview
        let tabla = '<h3>Preview de Lecciones:</h3>';
        tabla += '<table style="width:100%; border-collapse: collapse;"><tr style="background:#2196F3; color:white;"><th>Orden</th><th>Título</th><th>Video</th><th>Thumbnail</th></tr>';
        leccionesData.forEach(l => {
          tabla += `<tr style="border-bottom:1px solid #ddd;"><td>${l.orden}</td><td>${l.titulo}</td><td style="font-size:11px;">${l.video_name}</td><td style="font-size:11px;">${l.thumb_name}</td></tr>`;
        });
        tabla += '</table>';
        document.getElementById('output').innerHTML += tabla;

        log('\n✓ Listo para ejecutar inserción', 'success');

      } catch (error) {
        log(`ERROR: ${error.message}`, 'error');
        console.error(error);
      }
    };

    window.ejecutarInsercion = async function() {
      if (leccionesData.length === 0) {
        log('⚠️  Primero ejecuta "Generar SQL"', 'error');
        return;
      }

      if (!confirm(`¿Crear ${leccionesData.length} lecciones nuevas?`)) {
        return;
      }

      log('\n=== PASO 2: EJECUTANDO INSERCIÓN ===');

      try {
        const inserts = leccionesData.map(l => ({
          titulo: l.titulo,
          descripcion: `Lección: ${l.titulo}`,
          categoria_id: categoriaId,
          miniatura_url: l.miniatura_url,
          video_url: l.video_url,
          orden: l.orden,
          es_grabacion: false
        }));

        log(`Insertando ${inserts.length} lecciones...`);

        const { data, error } = await supabase
          .from('seguros_lessons')
          .insert(inserts)
          .select();

        if (error) {
          log(`ERROR: ${error.message}`, 'error');
          console.error(error);
          return;
        }

        log(`✓ ${data.length} lecciones creadas exitosamente!`, 'success');
        log('\nPuedes verificar las lecciones creadas con el botón 3', 'success');

      } catch (error) {
        log(`ERROR: ${error.message}`, 'error');
        console.error(error);
      }
    };

    window.verificar = async function() {
      log('\n=== PASO 3: VERIFICANDO LECCIONES ===');

      try {
        const { data, error } = await supabase
          .from('seguros_lessons')
          .select('orden, titulo, video_url, miniatura_url')
          .eq('categoria_id', categoriaId)
          .order('orden');

        if (error) {
          log(`ERROR: ${error.message}`, 'error');
          return;
        }

        log(`\n✓ Total de lecciones: ${data.length}`, 'success');

        let tabla = '<h3>Lecciones Creadas:</h3>';
        tabla += '<table style="width:100%; border-collapse: collapse;"><tr style="background:#4CAF50; color:white;"><th>Orden</th><th>Título</th><th>Video</th><th>Miniatura</th></tr>';
        data.forEach(l => {
          const videoName = l.video_url.split('/').pop();
          const thumbName = l.miniatura_url.split('/').pop();
          tabla += `<tr style="border-bottom:1px solid #ddd;"><td>${l.orden}</td><td>${l.titulo}</td><td style="font-size:10px;">${decodeURIComponent(videoName)}</td><td style="font-size:10px;">${decodeURIComponent(thumbName)}</td></tr>`;
        });
        tabla += '</table>';
        document.getElementById('output').innerHTML += tabla;

      } catch (error) {
        log(`ERROR: ${error.message}`, 'error');
        console.error(error);
      }
    };

    // Auto-ejecutar paso 1 al cargar
    log('✓ Script cargado correctamente', 'success');
    log('Click en "1. Generar SQL" para comenzar\n');
  </script>
</body>
</html>

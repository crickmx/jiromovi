<!DOCTYPE html>
<html>
<head>
  <title>Test Delete User Auth</title>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NDc4MTAsImV4cCI6MjA0NTEyMzgxMH0.XQz8Vp_Z29Sg0bJ5_3oVVt1_iIFfFBJjYbdfWU1PZ1k';

    const supabase = createClient(supabaseUrl, supabaseKey);

    window.testAuth = async function() {
      const output = document.getElementById('output');
      output.innerHTML = 'Testing...\n';

      try {
        // 1. Get current session
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          output.innerHTML += `\n❌ Session Error: ${sessionError.message}`;
          return;
        }

        if (!session) {
          output.innerHTML += '\n❌ No session found. Please login first.';
          return;
        }

        output.innerHTML += `\n✓ Session found for user: ${session.user.email}`;
        output.innerHTML += `\n✓ Token (first 50 chars): ${session.access_token.substring(0, 50)}...`;

        // 2. Check user role
        const { data: userData, error: userError } = await supabase
          .from('usuarios')
          .select('id, nombre_completo, email, rol, is_deleted')
          .eq('id', session.user.id)
          .maybeSingle();

        if (userError) {
          output.innerHTML += `\n❌ User query error: ${userError.message}`;
          return;
        }

        output.innerHTML += `\n✓ User data: ${JSON.stringify(userData, null, 2)}`;

        // 3. Test edge function with supabase.functions.invoke
        output.innerHTML += '\n\n--- Testing with supabase.functions.invoke ---';

        const testUserId = document.getElementById('testUserId').value;
        if (!testUserId) {
          output.innerHTML += '\n⚠ No user ID provided. Using dummy ID for auth test.';
        }

        const { data: fnData, error: fnError } = await supabase.functions.invoke('delete-user', {
          body: {
            userId: testUserId || '00000000-0000-0000-0000-000000000000',
            reason: 'Test from diagnostic page'
          }
        });

        if (fnError) {
          output.innerHTML += `\n❌ Function error: ${fnError.message}`;
          output.innerHTML += `\n   Details: ${JSON.stringify(fnError, null, 2)}`;
        } else {
          output.innerHTML += `\n✓ Function response: ${JSON.stringify(fnData, null, 2)}`;
        }

        // 4. Test with direct fetch
        output.innerHTML += '\n\n--- Testing with direct fetch ---';

        const response = await fetch(
          `${supabaseUrl}/functions/v1/delete-user`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`,
              'apikey': supabaseKey,
            },
            body: JSON.stringify({
              userId: testUserId || '00000000-0000-0000-0000-000000000000',
              reason: 'Test from diagnostic page (fetch)'
            }),
          }
        );

        const result = await response.json();

        output.innerHTML += `\n   Status: ${response.status} ${response.statusText}`;
        output.innerHTML += `\n   Response: ${JSON.stringify(result, null, 2)}`;

      } catch (error) {
        output.innerHTML += `\n\n❌ Unexpected error: ${error.message}`;
        output.innerHTML += `\n   Stack: ${error.stack}`;
      }
    };

    window.login = async function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const output = document.getElementById('output');

      if (!email || !password) {
        output.innerHTML = '❌ Please enter email and password';
        return;
      }

      output.innerHTML = 'Logging in...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          output.innerHTML = `❌ Login error: ${error.message}`;
          return;
        }

        output.innerHTML = `✓ Logged in successfully as ${data.user.email}`;
      } catch (error) {
        output.innerHTML = `❌ Unexpected error: ${error.message}`;
      }
    };
  </script>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    input, button {
      padding: 8px;
      margin: 5px;
      font-family: monospace;
    }
    #output {
      background: #f5f5f5;
      padding: 20px;
      margin-top: 20px;
      white-space: pre-wrap;
      border: 1px solid #ddd;
      min-height: 300px;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>
<body>
  <h1>Delete User Auth Diagnostic</h1>

  <div class="section">
    <h3>1. Login</h3>
    <input type="email" id="email" placeholder="Email" value="admin@jiroseguros.com" />
    <input type="password" id="password" placeholder="Password" value="Admin2024!" />
    <button onclick="login()">Login</button>
  </div>

  <div class="section">
    <h3>2. Test Delete User Function</h3>
    <input type="text" id="testUserId" placeholder="User ID to delete (optional)" style="width: 300px;" />
    <button onclick="testAuth()">Run Test</button>
  </div>

  <div id="output">
    Click "Login" first, then "Run Test"
  </div>
</body>
</html>

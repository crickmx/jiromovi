<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migrar Videos - Academia de Negocios 2025</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #2d3748;
      margin-bottom: 10px;
      font-size: 32px;
    }
    .subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #4a5568;
    }
    .btn-secondary:hover {
      background: #cbd5e0;
    }
    .progress-container {
      margin-bottom: 20px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s;
      border-radius: 4px;
    }
    .progress-text {
      font-size: 14px;
      color: #718096;
      text-align: center;
    }
    .lessons-grid {
      display: grid;
      gap: 15px;
      max-height: 600px;
      overflow-y: auto;
      padding: 20px;
      background: #f7fafc;
      border-radius: 12px;
    }
    .lesson-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #e2e8f0;
      transition: all 0.3s;
    }
    .lesson-card.migrating {
      border-left-color: #ecc94b;
      background: #fffbeb;
    }
    .lesson-card.success {
      border-left-color: #48bb78;
      background: #f0fff4;
    }
    .lesson-card.error {
      border-left-color: #f56565;
      background: #fff5f5;
    }
    .lesson-title {
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 8px;
      font-size: 16px;
    }
    .lesson-status {
      font-size: 14px;
      color: #718096;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .status-pending { background: #e2e8f0; }
    .status-migrating { background: #faf089; }
    .status-success { background: #9ae6b4; }
    .status-error { background: #fc8181; }
    .lesson-details {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 5px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Migración de Videos - Academia de Negocios 2025</h1>
    <p class="subtitle">Migrar videos desde Google Drive a Supabase Storage</p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalLessons">0</div>
        <div class="stat-label">Total de Lecciones</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="migratedCount">0</div>
        <div class="stat-label">Migradas</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-label">Pendientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="errorCount">0</div>
        <div class="stat-label">Errores</div>
      </div>
    </div>

    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">Preparando migración...</div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="startBtn">
        🚀 Iniciar Migración
      </button>
      <button class="btn-secondary" id="loadBtn">
        🔄 Recargar Lecciones
      </button>
      <button class="btn-secondary" id="clearBtn">
        ⚡ Limpiar Todo
      </button>
    </div>

    <div class="lessons-grid" id="lessonsGrid">
      <p style="text-align: center; color: #a0aec0;">Haz clic en "Recargar Lecciones" para comenzar</p>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';
      const CATEGORIA_ID = '058c4297-3721-4847-a069-6c03f815bd7c';

      let client = null;
      let lessons = [];
      let migrationStatus = {};
      let isMigrating = false;

      function initSupabase() {
        if (!client) {
          client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        return client;
      }

      function updateStats() {
        const total = lessons.length;
        const migrated = Object.values(migrationStatus).filter(s => s === 'success').length;
        const errors = Object.values(migrationStatus).filter(s => s === 'error').length;
        const pending = total - migrated - errors;

        document.getElementById('totalLessons').textContent = total;
        document.getElementById('migratedCount').textContent = migrated;
        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('errorCount').textContent = errors;
      }

      function renderLessons() {
        const grid = document.getElementById('lessonsGrid');

        if (lessons.length === 0) {
          grid.innerHTML = '<p style="text-align: center; color: #a0aec0;">No hay lecciones para mostrar</p>';
          return;
        }

        grid.innerHTML = lessons.map(lesson => {
          const status = migrationStatus[lesson.id] || 'pending';
          const statusText = {
            pending: 'Pendiente',
            migrating: 'Migrando...',
            success: 'Migrada ✓',
            error: 'Error ✗'
          }[status];

          const statusIcon = {
            pending: '⏳',
            migrating: '🔄',
            success: '✅',
            error: '❌'
          }[status];

          return `
            <div class="lesson-card ${status}" id="lesson-${lesson.id}">
              <div class="lesson-title">${lesson.titulo}</div>
              <div class="lesson-status">
                <span class="status-icon status-${status} ${status === 'migrating' ? 'spinner' : ''}">
                  ${statusIcon}
                </span>
                <span>${statusText}</span>
              </div>
              <div class="lesson-details" id="details-${lesson.id}"></div>
            </div>
          `;
        }).join('');
      }

      async function loadLessons() {
        try {
          const supabase = initSupabase();
          const { data, error } = await supabase
            .from('seguros_lessons')
            .select('*')
            .eq('categoria_id', CATEGORIA_ID)
            .order('orden', { ascending: true });

          if (error) throw error;

          lessons = data || [];
          migrationStatus = {};

          lessons.forEach(lesson => {
            const isMigrated = lesson.video_url && lesson.video_url.includes('supabase.co/storage');
            migrationStatus[lesson.id] = isMigrated ? 'success' : 'pending';
          });

          updateStats();
          renderLessons();

        } catch (error) {
          console.error('Error loading lessons:', error);
          alert('Error al cargar lecciones: ' + error.message);
        }
      }

      function updateProgress(current, total, message) {
        const percentage = (current / total) * 100;
        document.getElementById('progressFill').style.width = percentage + '%';
        document.getElementById('progressText').textContent =
          `${message} (${current}/${total} - ${percentage.toFixed(0)}%)`;
      }

      async function startMigration() {
        if (isMigrating) {
          alert('La migración ya está en proceso');
          return;
        }

        const pendingLessons = lessons.filter(l => migrationStatus[l.id] === 'pending');

        if (pendingLessons.length === 0) {
          alert('No hay lecciones pendientes de migrar');
          return;
        }

        if (!confirm(`¿Deseas migrar ${pendingLessons.length} videos a Supabase Storage?`)) {
          return;
        }

        isMigrating = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('progressContainer').style.display = 'block';

        let completed = 0;
        const total = pendingLessons.length;

        for (const lesson of pendingLessons) {
          try {
            migrationStatus[lesson.id] = 'migrating';
            renderLessons();
            updateProgress(completed, total, `Migrando: ${lesson.titulo}`);

            const supabase = initSupabase();
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
              throw new Error('No hay sesión activa. Por favor inicia sesión.');
            }

            const response = await fetch(`${SUPABASE_URL}/functions/v1/migrate-video-to-storage`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${session.access_token}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                lessonId: lesson.id,
                videoUrl: lesson.video_url,
                thumbnailUrl: lesson.miniatura_url,
              }),
            });

            const result = await response.json();

            if (result.success) {
              migrationStatus[lesson.id] = 'success';
              const sizeInMB = (result.videoSize / 1024 / 1024).toFixed(2);
              document.getElementById(`details-${lesson.id}`).textContent =
                `Video: ${sizeInMB} MB | Migrado correctamente`;
            } else {
              throw new Error(result.error || 'Error desconocido');
            }

          } catch (error) {
            console.error(`Error migrating lesson ${lesson.id}:`, error);
            migrationStatus[lesson.id] = 'error';
            document.getElementById(`details-${lesson.id}`).textContent =
              `Error: ${error.message}`;
          }

          completed++;
          renderLessons();
          updateStats();
          updateProgress(completed, total, completed < total ? 'Continuando...' : '¡Migración completada!');

          await new Promise(resolve => setTimeout(resolve, 1000));
        }

        isMigrating = false;
        document.getElementById('startBtn').disabled = false;
        alert(`Migración completada!\n\nMigradas: ${Object.values(migrationStatus).filter(s => s === 'success').length}\nErrores: ${Object.values(migrationStatus).filter(s => s === 'error').length}`);
      }

      window.addEventListener('DOMContentLoaded', function() {
        document.getElementById('startBtn').addEventListener('click', startMigration);
        document.getElementById('loadBtn').addEventListener('click', loadLessons);
        document.getElementById('clearBtn').addEventListener('click', function() {
          window.location.reload();
        });

        loadLessons();
      });
    })();
  </script>
</body>
</html>

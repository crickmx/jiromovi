<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test GMM - Fix Página en Blanco</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2563eb;
      border-bottom: 3px solid #2563eb;
      padding-bottom: 10px;
    }
    h2 {
      color: #1e40af;
      margin-top: 30px;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.info { background: #dbeafe; color: #1e40af; }
    pre {
      background: #f9fafb;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid #e5e7eb;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    th {
      background: #f9fafb;
      font-weight: 600;
      color: #374151;
    }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      margin: 10px 0;
      background: #f9fafb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Test GMM - Fix Página en Blanco</h1>

    <div class="card">
      <h3>Objetivo del Test</h3>
      <p>Verificar que la función <code>calcularFormasDePago()</code> devuelve correctamente un array de objetos <code>PaymentPlanResult</code> y no un objeto plano.</p>
    </div>

    <div class="card">
      <button class="btn" onclick="runTest()">▶️ Ejecutar Test</button>
      <button class="btn" onclick="location.reload()">🔄 Recargar</button>
    </div>

    <div id="results"></div>
  </div>

  <script>
    // Simular las funciones del motor de cálculo V2
    function roundTo2Decimals(n) {
      return Math.round(n * 100) / 100;
    }

    function calcularFormasDePago(primaNetaTotal, gastosExpedicion, formasPagoSeleccionadas) {
      const plans = [];

      const formasPagoConfig = {
        'Anual': { recargo: 0, numRecibos: 1 },
        'Semestral': { recargo: 0.03, numRecibos: 2 },
        'Trimestral': { recargo: 0.05, numRecibos: 4 },
        'Mensual': { recargo: 0.07, numRecibos: 12 }
      };

      for (const formaPago of formasPagoSeleccionadas) {
        const config = formasPagoConfig[formaPago];
        if (!config) continue;

        const recargo = roundTo2Decimals(primaNetaTotal * config.recargo);
        const subtotal = roundTo2Decimals(primaNetaTotal + recargo + gastosExpedicion);
        const iva = roundTo2Decimals(subtotal * 0.16);
        const total = roundTo2Decimals(subtotal + iva);

        const primerRecibo = roundTo2Decimals(total / config.numRecibos);
        const recibosSubsecuentes = config.numRecibos > 1 ? primerRecibo : 0;

        plans.push({
          forma_pago: formaPago,
          recargo,
          gastos_expedicion: gastosExpedicion,
          subtotal,
          iva,
          total,
          primer_recibo: primerRecibo,
          recibos_subsecuentes: recibosSubsecuentes,
          num_recibos: config.numRecibos
        });
      }

      return plans;
    }

    function runTest() {
      const resultsDiv = document.getElementById('results');
      let html = '';

      html += '<h2>1️⃣ Test Básico</h2>';

      try {
        const primaNetaTotal = 10000;
        const gastosExpedicion = 150;
        const formasPago = ['Anual', 'Semestral', 'Trimestral', 'Mensual'];

        const result = calcularFormasDePago(primaNetaTotal, gastosExpedicion, formasPago);

        // Verificar que es un array
        if (!Array.isArray(result)) {
          html += '<div class="status error">❌ ERROR: El resultado NO es un array</div>';
          html += `<pre>Tipo recibido: ${typeof result}</pre>`;
          resultsDiv.innerHTML = html;
          return;
        }

        html += '<div class="status success">✅ El resultado es un array</div>';
        html += `<p>Total de planes: ${result.length}</p>`;

        // Verificar que cada elemento tiene la estructura correcta
        html += '<h2>2️⃣ Estructura de Payment Plans</h2>';

        const requiredFields = [
          'forma_pago',
          'recargo',
          'gastos_expedicion',
          'subtotal',
          'iva',
          'total',
          'primer_recibo',
          'recibos_subsecuentes',
          'num_recibos'
        ];

        let allValid = true;

        html += '<table>';
        html += '<tr><th>Plan</th><th>Campos</th><th>Estado</th></tr>';

        for (const plan of result) {
          const missingFields = requiredFields.filter(field => !(field in plan));
          const isValid = missingFields.length === 0;
          allValid = allValid && isValid;

          const statusClass = isValid ? 'success' : 'error';
          const statusText = isValid ? '✅ Válido' : `❌ Faltan: ${missingFields.join(', ')}`;

          html += `<tr>
            <td><strong>${plan.forma_pago}</strong></td>
            <td>${Object.keys(plan).length} campos</td>
            <td><span class="status ${statusClass}">${statusText}</span></td>
          </tr>`;
        }

        html += '</table>';

        // Verificar que .map() funciona
        html += '<h2>3️⃣ Test .map() (Código del Componente)</h2>';

        try {
          const mapped = result.map(plan => plan.forma_pago);
          html += '<div class="status success">✅ El método .map() funciona correctamente</div>';
          html += `<pre>Formas de pago: ${mapped.join(', ')}</pre>`;
        } catch (error) {
          html += `<div class="status error">❌ ERROR en .map(): ${error.message}</div>`;
          allValid = false;
        }

        // Mostrar datos detallados
        html += '<h2>4️⃣ Datos Calculados</h2>';

        html += '<table>';
        html += '<tr><th>Forma de Pago</th><th>Recargo</th><th>Subtotal</th><th>IVA</th><th>Total</th><th>Primer Recibo</th></tr>';

        for (const plan of result) {
          html += `<tr>
            <td><strong>${plan.forma_pago}</strong></td>
            <td>$${plan.recargo.toFixed(2)}</td>
            <td>$${plan.subtotal.toFixed(2)}</td>
            <td>$${plan.iva.toFixed(2)}</td>
            <td><strong>$${plan.total.toFixed(2)}</strong></td>
            <td>$${plan.primer_recibo.toFixed(2)}</td>
          </tr>`;
        }

        html += '</table>';

        // Resumen final
        html += '<h2>5️⃣ Resumen</h2>';

        if (allValid) {
          html += '<div class="status success" style="display:block; padding:20px; font-size:16px;">';
          html += '✅ TODOS LOS TESTS PASARON<br><br>';
          html += 'La función devuelve correctamente un array de PaymentPlanResult y el componente puede usar .map() sin errores.';
          html += '</div>';
        } else {
          html += '<div class="status error" style="display:block; padding:20px; font-size:16px;">';
          html += '❌ ALGUNOS TESTS FALLARON<br><br>';
          html += 'Revisar los detalles arriba.';
          html += '</div>';
        }

        // Test comparativo con estructura antigua (objeto)
        html += '<h2>6️⃣ Comparación con Estructura Antigua (Bug)</h2>';

        const oldStructure = {
          anual: { per_payment: 11596, total_anual: 11596 },
          semestral: { per_payment: 5972.66, total_anual: 11945.32 },
          trimestral: { per_payment: 3044.54, total_anual: 12178.16 },
          mensual: { per_payment: 1035.63, total_anual: 12427.56 }
        };

        html += '<div class="card">';
        html += '<h4>Estructura Antigua (Bug):</h4>';
        html += '<pre>' + JSON.stringify(oldStructure, null, 2) + '</pre>';
        html += '<p><strong>Problema:</strong> <code>oldStructure.map()</code> → <span class="status error">❌ TypeError: map is not a function</span></p>';
        html += '</div>';

        html += '<div class="card">';
        html += '<h4>Estructura Nueva (Fix):</h4>';
        html += '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
        html += '<p><strong>Solución:</strong> <code>newStructure.map()</code> → <span class="status success">✅ Funciona correctamente</span></p>';
        html += '</div>';

      } catch (error) {
        html += `<div class="status error">❌ ERROR GENERAL: ${error.message}</div>`;
        html += `<pre>${error.stack}</pre>`;
      }

      resultsDiv.innerHTML = html;
    }

    // Auto-ejecutar al cargar
    window.addEventListener('load', () => {
      runTest();
    });
  </script>
</body>
</html>

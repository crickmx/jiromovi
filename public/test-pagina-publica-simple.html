<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test: Página Pública Simple</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 { color: #1a202c; margin-bottom: 20px; }
    .status {
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .loading { background: #fef3c7; color: #92400e; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🧪 Test: Página Pública "ejemplo"</h1>
      <div id="status" class="status loading">⏳ Cargando datos...</div>
      <div id="result"></div>
    </div>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';

    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    async function testPublicPage() {
      try {
        console.log('🚀 Llamando a get_public_web_page_by_slug("ejemplo")...');

        const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_web_page_by_slug`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ p_slug: 'ejemplo' })
        });

        console.log('📡 Response status:', response.status);

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        console.log('✅ Datos recibidos:', data);

        if (!data) {
          throw new Error('La función devolvió null');
        }

        statusEl.className = 'status success';
        statusEl.textContent = '✅ Datos cargados correctamente';

        resultEl.innerHTML = `
          <h2>📦 Datos JSON Completos</h2>
          <pre>${JSON.stringify(data, null, 2)}</pre>

          <h2 style="margin-top: 30px;">🎯 Resumen</h2>
          <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-top: 10px;">
            <p><strong>Nombre:</strong> ${data.user?.name || 'N/A'}</p>
            <p><strong>Email:</strong> ${data.user?.email || 'N/A'}</p>
            <p><strong>Teléfono:</strong> ${data.user?.phone || 'N/A'}</p>
            <p><strong>Oficina:</strong> ${data.user?.office?.name || 'N/A'}</p>
            <p><strong>Publicado:</strong> ${data.config?.is_published ? '✅ Sí' : '❌ No'}</p>
            <p><strong>Color Primario:</strong> <span style="display: inline-block; width: 20px; height: 20px; background: ${data.config?.primary_color}; border-radius: 4px; vertical-align: middle;"></span> ${data.config?.primary_color || 'N/A'}</p>
            <p><strong>Aseguradoras:</strong> ${data.insurers?.length || 0}</p>
            <p><strong>Categorías:</strong> ${data.categories?.length || 0}</p>
          </div>

          <div style="margin-top: 30px;">
            <a href="/${data.user?.id ? 'ejemplo' : '#'}" class="btn" target="_blank">
              🔗 Ver Página Completa
            </a>
          </div>
        `;

      } catch (error) {
        console.error('❌ Error:', error);

        statusEl.className = 'status error';
        statusEl.textContent = '❌ Error al cargar datos';

        resultEl.innerHTML = `
          <h2>❌ Error</h2>
          <div style="background: #fee2e2; padding: 20px; border-radius: 12px; color: #991b1b; margin-top: 10px;">
            <strong>Mensaje:</strong> ${error.message}
          </div>
          <pre style="margin-top: 20px;">${error.stack || error.toString()}</pre>

          <h2 style="margin-top: 30px;">🔍 Diagnóstico</h2>
          <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-top: 10px;">
            <p><strong>URL:</strong> ${SUPABASE_URL}/rest/v1/rpc/get_public_web_page_by_slug</p>
            <p><strong>Método:</strong> POST</p>
            <p><strong>Body:</strong> { "p_slug": "ejemplo" }</p>
            <p><strong>Headers:</strong> apikey + Authorization</p>
          </div>
        `;
      }
    }

    testPublicPage();
  </script>
</body>
</html>

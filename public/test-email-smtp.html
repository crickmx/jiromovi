<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Envío SMTP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box p {
            color: #555;
            font-size: 13px;
            margin: 5px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .result h4 {
            margin-bottom: 8px;
            font-size: 16px;
        }

        .result pre {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Prueba de Envío SMTP</h1>
        <p class="subtitle">Configuración IONOS - noresponder@movi.digital</p>

        <div class="info-box">
            <h3>📧 Configuración Actual</h3>
            <p><strong>Servidor:</strong> smtp.ionos.mx</p>
            <p><strong>Puerto:</strong> 465 (SSL/TLS)</p>
            <p><strong>Usuario:</strong> noresponder@movi.digital</p>
            <p><strong>Remitente:</strong> MOVI Digital</p>
        </div>

        <form id="testForm">
            <div class="form-group">
                <label for="email">Correo de Destino *</label>
                <input
                    type="email"
                    id="email"
                    placeholder="ejemplo@correo.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="nombre">Nombre del Destinatario *</label>
                <input
                    type="text"
                    id="nombre"
                    placeholder="Juan Pérez"
                    required
                >
            </div>

            <div class="form-group">
                <label for="tipo">Tipo de Notificación *</label>
                <select id="tipo" required>
                    <option value="">Seleccionar...</option>
                    <option value="bienvenida">Bienvenida</option>
                    <option value="recuperacion_password">Recuperación de Contraseña</option>
                    <option value="nuevo_evento">Nuevo Evento</option>
                    <option value="cuenta_activada">Cuenta Activada</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">
                Enviar Correo de Prueba
            </button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://ohiltskmrmuwrxlrgfnx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oaWx0c2ttcm11d3J4bHJnZm54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NzA4MjAsImV4cCI6MjA0NTE0NjgyMH0.I1k-qKPUk5v5E7Yy4LvjD0WvU-8Yr_Nk_BThc_0JRJE';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('testForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const nombre = document.getElementById('nombre').value;
            const tipo = document.getElementById('tipo').value;

            // Limpiar resultado anterior
            resultDiv.className = 'result';
            resultDiv.innerHTML = '';

            // Deshabilitar botón y mostrar loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span>Enviando...';

            try {
                console.log('Enviando correo con tipo:', tipo);

                const { data, error } = await supabase.functions.invoke(
                    'enviar-correo-transaccional',
                    {
                        body: {
                            tipo: tipo,
                            destinatario: email,
                            datos: {
                                nombre: nombre,
                                apellidos: '',
                                email: email,
                                email_laboral: email,
                                rol: 'Usuario de Prueba',
                                titulo_evento: 'Evento de Prueba',
                                fecha_evento: new Date().toLocaleDateString('es-MX'),
                                hora_evento: '10:00 AM',
                                link_evento: 'https://movi.digital',
                                ponente: 'Equipo MOVI'
                            }
                        }
                    }
                );

                if (error) {
                    throw error;
                }

                console.log('Respuesta:', data);

                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h4>✅ ¡Correo Enviado Exitosamente!</h4>
                    <p>El correo ha sido enviado a: <strong>${email}</strong></p>
                    <p>Revisa tu bandeja de entrada (y spam si no lo ves)</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Error:', error);

                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h4>❌ Error al Enviar Correo</h4>
                    <p>${error.message || 'Error desconocido'}</p>
                    <pre>${JSON.stringify(error, null, 2)}</pre>
                `;
            } finally {
                // Rehabilitar botón
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Enviar Correo de Prueba';
            }
        });

        // Mensaje de bienvenida en consola
        console.log('%c🚀 Prueba de SMTP IONOS', 'font-size: 20px; color: #667eea; font-weight: bold;');
        console.log('Configuración: noresponder@movi.digital');
        console.log('Puerto 465 (SSL/TLS)');
    </script>
</body>
</html>

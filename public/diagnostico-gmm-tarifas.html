<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico GMM - Tarifas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2563eb;
      border-bottom: 3px solid #2563eb;
      padding-bottom: 10px;
    }
    h2 {
      color: #1e40af;
      margin-top: 30px;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.warning { background: #fef3c7; color: #92400e; }
    .status.info { background: #dbeafe; color: #1e40af; }
    pre {
      background: #f9fafb;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid #e5e7eb;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    th {
      background: #f9fafb;
      font-weight: 600;
      color: #374151;
    }
    tr:hover {
      background: #f9fafb;
    }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .section {
      margin: 30px 0;
      padding: 20px;
      background: #f9fafb;
      border-radius: 6px;
      border-left: 4px solid #2563eb;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Diagnóstico GMM - Sistema de Tarifas</h1>

    <div class="section">
      <button class="btn" onclick="runDiagnostic()">▶️ Ejecutar Diagnóstico</button>
      <button class="btn" onclick="location.reload()">🔄 Recargar</button>
    </div>

    <div id="results"></div>
  </div>

  <script>
    const supabaseUrl = import.meta.env?.VITE_SUPABASE_URL || 'https://gxivvpfvptwskxfchbkd.supabase.co';
    const supabaseKey = import.meta.env?.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4aXZ2cGZ2cHR3c2t4ZmNoYmtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NjE0NTYsImV4cCI6MjA0NTEzNzQ1Nn0.AoAs4F9zAwqa90-5vgvQw8gv17i5Q6SaEJ0fAaqe7Hs';

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function runDiagnostic() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="loading"></div> Ejecutando diagnóstico...';

      let html = '';

      try {
        // 1. Verificar autenticación
        html += '<h2>1️⃣ Autenticación</h2>';
        const { data: { user }, error: authError } = await supabase.auth.getUser();

        if (authError) {
          html += `<div class="status error">❌ Error de autenticación: ${authError.message}</div>`;
          resultsDiv.innerHTML = html;
          return;
        }

        if (!user) {
          html += '<div class="status error">❌ No hay usuario autenticado</div>';
          html += '<p>Por favor, inicia sesión en la aplicación principal y vuelve a esta página.</p>';
          resultsDiv.innerHTML = html;
          return;
        }

        html += `<div class="status success">✅ Usuario autenticado: ${user.email}</div>`;

        // 2. Verificar paquetes de tarifas
        html += '<h2>2️⃣ Paquetes de Tarifas</h2>';
        const { data: packages, error: pkgError } = await supabase
          .from('tariff_packages')
          .select('*')
          .order('created_at', { ascending: false });

        if (pkgError) {
          html += `<div class="status error">❌ Error al consultar tariff_packages: ${pkgError.message}</div>`;
          html += `<pre>${JSON.stringify(pkgError, null, 2)}</pre>`;
        } else if (!packages || packages.length === 0) {
          html += '<div class="status warning">⚠️ No hay paquetes de tarifas en el sistema</div>';
          html += '<p><strong>Acción requerida:</strong> Debe cargar un archivo Excel con las tarifas desde el panel de administración GMM.</p>';
        } else {
          html += `<div class="status info">📦 ${packages.length} paquete(s) encontrado(s)</div>`;

          html += '<table>';
          html += '<tr><th>Nombre</th><th>Estado</th><th>Archivo</th><th>Fecha creación</th></tr>';

          packages.forEach(pkg => {
            const statusClass = pkg.status === 'active' ? 'success' :
                               pkg.status === 'draft' ? 'info' :
                               pkg.status === 'failed' ? 'error' : 'warning';
            html += `<tr>
              <td>${pkg.name}</td>
              <td><span class="status ${statusClass}">${pkg.status}</span></td>
              <td>${pkg.source_filename}</td>
              <td>${new Date(pkg.created_at).toLocaleString('es-MX')}</td>
            </tr>`;
          });
          html += '</table>';

          // Verificar paquete activo
          const activePackage = packages.find(p => p.status === 'active');

          if (!activePackage) {
            html += '<div class="status warning">⚠️ No hay paquete ACTIVO</div>';
            html += '<p><strong>Acción requerida:</strong> Debe activar un paquete de tarifas desde el panel de administración.</p>';
          } else {
            html += `<div class="status success">✅ Paquete activo: ${activePackage.name}</div>`;

            // 3. Verificar tablas del paquete activo
            html += '<h2>3️⃣ Tablas del Paquete Activo</h2>';
            const { data: tables, error: tablesError } = await supabase
              .from('tariff_tables')
              .select('*')
              .eq('tariff_package_id', activePackage.id)
              .order('table_key');

            if (tablesError) {
              html += `<div class="status error">❌ Error al consultar tariff_tables: ${tablesError.message}</div>`;
            } else if (!tables || tables.length === 0) {
              html += '<div class="status error">❌ El paquete activo NO tiene tablas</div>';
              html += '<p>Esto indica un problema en la importación del Excel.</p>';
            } else {
              html += `<div class="status success">✅ ${tables.length} tabla(s) cargada(s)</div>`;

              html += '<table>';
              html += '<tr><th>Clave de Tabla</th><th>Filas</th><th>Muestra</th></tr>';

              tables.forEach(table => {
                const rowCount = table.row_count || (Array.isArray(table.data_json) ? table.data_json.length : 0);
                const sample = Array.isArray(table.data_json) && table.data_json.length > 0
                  ? JSON.stringify(table.data_json[0]).substring(0, 100) + '...'
                  : 'Sin datos';

                html += `<tr>
                  <td><strong>${table.table_key}</strong></td>
                  <td>${rowCount}</td>
                  <td><small>${sample}</small></td>
                </tr>`;
              });
              html += '</table>';

              // 4. Verificar tablas requeridas
              html += '<h2>4️⃣ Validación de Tablas Requeridas</h2>';
              const requiredTables = [
                'base_intermedia_edad_sexo',
                'factor_estado',
                'factor_nivel_hospitalario',
                'factor_tabulador',
                'factor_suma_asegurada',
                'factor_deducible',
                'factor_coaseguro',
                'denominador_cargas',
                'forma_pago'
              ];

              const tableKeys = tables.map(t => t.table_key);
              const missingTables = requiredTables.filter(req => !tableKeys.includes(req));

              if (missingTables.length === 0) {
                html += '<div class="status success">✅ Todas las tablas requeridas están presentes</div>';
              } else {
                html += '<div class="status error">❌ Faltan tablas requeridas:</div>';
                html += '<ul>';
                missingTables.forEach(mt => {
                  html += `<li><strong>${mt}</strong></li>`;
                });
                html += '</ul>';
                html += '<p><strong>Acción requerida:</strong> Verificar que el Excel tenga todas las hojas y rangos necesarios.</p>';
              }

              // 5. Verificar coeficientes
              html += '<h2>5️⃣ Coeficientes de Coberturas</h2>';
              const coefficients = [
                'coef_medicamentos',
                'coef_preexistentes',
                'coef_complicaciones',
                'coef_vip',
                'coef_antiguedad',
                'coef_emergencia_ext',
                'coef_enf_graves_ext',
                'coef_ayuda_diaria',
                'coef_ampliacion_servicios'
              ];

              html += '<table>';
              html += '<tr><th>Coeficiente</th><th>Valor</th><th>Estado</th></tr>';

              coefficients.forEach(coef => {
                const table = tables.find(t => t.table_key === coef);
                let value = 'No encontrado';
                let statusClass = 'error';

                if (table && Array.isArray(table.data_json) && table.data_json.length > 0) {
                  value = table.data_json[0].col_0 || 'Sin valor';
                  statusClass = value !== 'Sin valor' && value !== 'No encontrado' ? 'success' : 'warning';
                }

                html += `<tr>
                  <td>${coef}</td>
                  <td>${value}</td>
                  <td><span class="status ${statusClass}">${statusClass === 'success' ? '✅' : '⚠️'}</span></td>
                </tr>`;
              });
              html += '</table>';
            }
          }
        }

        // 6. Resumen final
        html += '<h2>6️⃣ Resumen y Acciones</h2>';
        html += '<div class="section">';

        if (packages && packages.length > 0) {
          const activePackage = packages.find(p => p.status === 'active');

          if (activePackage) {
            html += '<div class="status success">✅ Sistema GMM funcionando correctamente</div>';
            html += '<p>El sistema tiene tarifas activas y puede usarse para cotizar.</p>';
          } else {
            html += '<div class="status warning">⚠️ Hay tarifas pero ninguna activa</div>';
            html += '<p><strong>Siguiente paso:</strong> Ir a "GMM Tarifas Admin" y activar un paquete.</p>';
          }
        } else {
          html += '<div class="status error">❌ No hay tarifas en el sistema</div>';
          html += '<p><strong>Siguiente paso:</strong> Ir a "GMM Tarifas Admin" y cargar un archivo Excel con las tarifas BX+.</p>';
        }

        html += '</div>';

      } catch (error) {
        html += `<div class="status error">❌ Error general: ${error.message}</div>`;
        html += `<pre>${error.stack}</pre>`;
      }

      resultsDiv.innerHTML = html;
    }

    // Auto-ejecutar al cargar
    window.addEventListener('load', () => {
      runDiagnostic();
    });
  </script>
</body>
</html>

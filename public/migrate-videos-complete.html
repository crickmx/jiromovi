<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migración Videos - Seguros Education</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #2563eb; margin-top: 0; }
    h2 { color: #1e40af; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-top: 30px; }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 10px 10px 0;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .success { background: #dcfce7; border-left: 4px solid #16a34a; padding: 15px; margin: 10px 0; border-radius: 4px; }
    .error { background: #fee; border-left: 4px solid #dc2626; padding: 15px; margin: 10px 0; border-radius: 4px; }
    .warning { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 15px; margin: 10px 0; border-radius: 4px; }
    .info { background: #dbeafe; border-left: 4px solid #2563eb; padding: 15px; margin: 10px 0; border-radius: 4px; }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
    }
    tr:hover { background: #f8fafc; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success { background: #dcfce7; color: #15803d; }
    .badge-warning { background: #fef3c7; color: #a16207; }
    .badge-error { background: #fee; color: #b91c1c; }
    .progress {
      width: 100%;
      height: 24px;
      background: #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Migración de Videos - Seguros Education</h1>

    <div class="info">
      <strong>📋 Sistema de Migración Completo</strong><br>
      Este sistema verifica y migra automáticamente los videos desde Storage a la base de datos.
    </div>

    <h2>1️⃣ Diagnóstico del Sistema</h2>
    <button class="btn" id="btnDiagnostic">▶️ Ejecutar Diagnóstico Completo</button>
    <div id="diagnosticResult"></div>

    <h2>2️⃣ Migración Automática</h2>
    <button class="btn" id="btnMigration">🚀 Iniciar Migración Automática</button>
    <div id="migrationProgress"></div>
    <div id="migrationResult"></div>

    <h2>3️⃣ Verificación Post-Migración</h2>
    <button class="btn" id="btnVerify">✓ Verificar Lecciones</button>
    <div id="verificationResult"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1MjkzMzAsImV4cCI6MjA0NTEwNTMzMH0.ybuGuC_CD8Wg0IP95wDLVi8VS6ms_gQb_B1EVhorXh0';

    let supabaseClient;

    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', function() {
      // Verificar que Supabase esté cargado
      if (typeof window.supabase === 'undefined') {
        document.getElementById('diagnosticResult').innerHTML =
          '<div class="error">❌ Error: Supabase no se cargó correctamente. Recarga la página.</div>';
        return;
      }

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Asignar event listeners
      document.getElementById('btnDiagnostic').addEventListener('click', runDiagnostic);
      document.getElementById('btnMigration').addEventListener('click', runAutoMigration);
      document.getElementById('btnVerify').addEventListener('click', verifyMigration);
    });

    // Normalizar nombres de archivo
    function normalizeFilename(filename) {
      return filename
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .replace(/miniatura|minatura|minuatura|invitacion/gi, '')
        .trim();
    }

    // Encontrar thumbnail para un video
    function findThumbnail(videoName, thumbnails) {
      const videoNorm = normalizeFilename(videoName.replace('.mp4', ''));

      for (const thumb of thumbnails) {
        const thumbNorm = normalizeFilename(thumb.name.replace(/\.(png|jpg|jpeg)$/i, ''));

        // Match exacto
        if (thumbNorm === videoNorm) return thumb;

        // Match parcial (al menos 60% de similitud)
        const similarity = calculateSimilarity(videoNorm, thumbNorm);
        if (similarity > 0.6) return thumb;
      }

      return null;
    }

    // Calcular similitud entre dos strings
    function calculateSimilarity(str1, str2) {
      const longer = str1.length > str2.length ? str1 : str2;
      const shorter = str1.length > str2.length ? str2 : str1;

      if (longer.length === 0) return 1.0;

      const editDistance = getEditDistance(longer, shorter);
      return (longer.length - editDistance) / longer.length;
    }

    function getEditDistance(str1, str2) {
      const matrix = Array(str2.length + 1).fill(null).map(() =>
        Array(str1.length + 1).fill(null)
      );

      for (let i = 0; i <= str1.length; i++) matrix[0][i] = i;
      for (let j = 0; j <= str2.length; j++) matrix[j][0] = j;

      for (let j = 1; j <= str2.length; j++) {
        for (let i = 1; i <= str1.length; i++) {
          const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
          matrix[j][i] = Math.min(
            matrix[j][i - 1] + 1,
            matrix[j - 1][i] + 1,
            matrix[j - 1][i - 1] + indicator
          );
        }
      }

      return matrix[str2.length][str1.length];
    }

    // Diagnóstico completo
    async function runDiagnostic() {
      const resultDiv = document.getElementById('diagnosticResult');
      resultDiv.innerHTML = '<div class="info">⏳ Ejecutando diagnóstico...</div>';

      try {
        // 1. Verificar Storage
        const { data: videos, error: videosError } = await supabaseClient.storage
          .from('videos-seguros-education')
          .list();

        const { data: thumbnails, error: thumbsError } = await supabaseClient.storage
          .from('thumbnails-seguros-education')
          .list();

        if (videosError || thumbsError) {
          resultDiv.innerHTML = `<div class="error">❌ Error al acceder a Storage: ${videosError?.message || thumbsError?.message}</div>`;
          return;
        }

        // 2. Verificar categorías
        const { data: categories, error: catError } = await supabaseClient
          .from('seguros_education_categories')
          .select('*')
          .order('orden');

        // 3. Verificar lecciones
        const { data: lessons, error: lessonsError } = await supabaseClient
          .from('seguros_education_lessons')
          .select('*, seguros_education_categories(nombre)');

        const validVideos = videos.filter(v => v.name.endsWith('.mp4'));
        const validThumbs = thumbnails.filter(t => /\.(png|jpg|jpeg)$/i.test(t.name));

        let html = '<div class="success">✓ Diagnóstico completado</div>';

        html += `
          <table>
            <tr>
              <th>Recurso</th>
              <th>Estado</th>
              <th>Cantidad</th>
            </tr>
            <tr>
              <td>Videos en Storage</td>
              <td><span class="badge badge-success">✓ OK</span></td>
              <td>${validVideos.length} archivos</td>
            </tr>
            <tr>
              <td>Thumbnails en Storage</td>
              <td><span class="badge badge-success">✓ OK</span></td>
              <td>${validThumbs.length} archivos</td>
            </tr>
            <tr>
              <td>Categorías</td>
              <td><span class="badge ${categories?.length > 0 ? 'badge-success' : 'badge-warning'}">
                ${categories?.length > 0 ? '✓ OK' : '⚠ Vacío'}
              </span></td>
              <td>${categories?.length || 0} categorías</td>
            </tr>
            <tr>
              <td>Lecciones en BD</td>
              <td><span class="badge ${lessons?.length > 0 ? 'badge-success' : 'badge-warning'}">
                ${lessons?.length > 0 ? '✓ OK' : '⚠ Vacío'}
              </span></td>
              <td>${lessons?.length || 0} lecciones</td>
            </tr>
          </table>
        `;

        // Análisis de matching
        let matchedCount = 0;
        const matches = [];

        for (const video of validVideos) {
          const thumb = findThumbnail(video.name, validThumbs);
          if (thumb) {
            matchedCount++;
            matches.push({ video: video.name, thumbnail: thumb.name });
          }
        }

        html += `
          <div class="info">
            <strong>📊 Análisis de Matching:</strong><br>
            ${matchedCount} de ${validVideos.length} videos tienen thumbnail asociado (${Math.round(matchedCount/validVideos.length*100)}%)
          </div>
        `;

        if (!categories?.length) {
          html += `
            <div class="warning">
              <strong>⚠️ Acción Requerida:</strong><br>
              No hay categorías en la base de datos. Se creará la categoría "Academia de Negocios 2025" automáticamente durante la migración.
            </div>
          `;
        }

        resultDiv.innerHTML = html;

      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
      }
    }

    // Migración automática
    async function runAutoMigration() {
      const btn = document.getElementById('btnMigration');
      const progressDiv = document.getElementById('migrationProgress');
      const resultDiv = document.getElementById('migrationResult');

      btn.disabled = true;
      resultDiv.innerHTML = '';
      progressDiv.innerHTML = '<div class="info">⏳ Iniciando migración...</div>';

      try {
        // 1. Obtener archivos de Storage
        const { data: videos } = await supabaseClient.storage
          .from('videos-seguros-education')
          .list();

        const { data: thumbnails } = await supabaseClient.storage
          .from('thumbnails-seguros-education')
          .list();

        const validVideos = videos.filter(v => v.name.endsWith('.mp4'));
        const validThumbs = thumbnails.filter(t => /\.(png|jpg|jpeg)$/i.test(t.name));

        // 2. Verificar/Crear categoría
        let { data: categories } = await supabaseClient
          .from('seguros_education_categories')
          .select('*')
          .eq('nombre', 'Academia de Negocios 2025')
          .single();

        if (!categories) {
          progressDiv.innerHTML += '<div class="info">📁 Creando categoría "Academia de Negocios 2025"...</div>';

          const { data: newCat, error: catError } = await supabaseClient
            .from('seguros_education_categories')
            .insert({
              nombre: 'Academia de Negocios 2025',
              descripcion: 'Capacitaciones y formación para agentes de seguros 2025',
              orden: 1,
              visible: true
            })
            .select()
            .single();

          if (catError) throw catError;
          categories = newCat;

          progressDiv.innerHTML += '<div class="success">✓ Categoría creada exitosamente</div>';
        }

        // 3. Migrar videos
        progressDiv.innerHTML += `<div class="info">🎬 Migrando ${validVideos.length} videos...</div>`;

        let createdCount = 0;
        let skippedCount = 0;
        let errorCount = 0;
        const errors = [];

        for (let i = 0; i < validVideos.length; i++) {
          const video = validVideos[i];
          const progress = Math.round((i / validVideos.length) * 100);

          progressDiv.innerHTML = `
            <div class="progress">
              <div class="progress-bar" style="width: ${progress}%">${progress}%</div>
            </div>
            <div class="info">Procesando: ${video.name} (${i + 1}/${validVideos.length})</div>
          `;

          try {
            // Verificar si ya existe
            const { data: existing } = await supabaseClient
              .from('seguros_education_lessons')
              .select('id')
              .eq('titulo', video.name.replace('.mp4', ''))
              .single();

            if (existing) {
              skippedCount++;
              continue;
            }

            // Encontrar thumbnail
            const thumbnail = findThumbnail(video.name, validThumbs);

            // Obtener URL pública del video
            const { data: videoUrl } = supabaseClient.storage
              .from('videos-seguros-education')
              .getPublicUrl(video.name);

            // Obtener URL pública del thumbnail (si existe)
            let thumbnailUrl = null;
            if (thumbnail) {
              const { data: thumbData } = supabaseClient.storage
                .from('thumbnails-seguros-education')
                .getPublicUrl(thumbnail.name);
              thumbnailUrl = thumbData.publicUrl;
            }

            // Insertar lección
            const { error: insertError } = await supabaseClient
              .from('seguros_education_lessons')
              .insert({
                categoria_id: categories.id,
                titulo: video.name.replace('.mp4', ''),
                descripcion: `Lección migrada automáticamente desde Storage`,
                video_url: videoUrl.publicUrl,
                miniatura_url: thumbnailUrl,
                duracion_minutos: 0,
                orden: i + 1,
                publicado: true,
                es_destacado: false
              });

            if (insertError) {
              errorCount++;
              errors.push({ video: video.name, error: insertError.message });
            } else {
              createdCount++;
            }

          } catch (err) {
            errorCount++;
            errors.push({ video: video.name, error: err.message });
          }

          // Pequeña pausa para no sobrecargar
          await new Promise(resolve => setTimeout(resolve, 100));
        }

        // Resultado final
        let html = '<div class="success">✓ Migración completada</div>';
        html += `
          <table>
            <tr>
              <th>Resultado</th>
              <th>Cantidad</th>
            </tr>
            <tr>
              <td>✓ Lecciones creadas</td>
              <td><strong>${createdCount}</strong></td>
            </tr>
            <tr>
              <td>⊘ Lecciones omitidas (ya existen)</td>
              <td>${skippedCount}</td>
            </tr>
            <tr>
              <td>✗ Errores</td>
              <td>${errorCount}</td>
            </tr>
          </table>
        `;

        if (errors.length > 0) {
          html += '<div class="warning"><strong>⚠️ Errores encontrados:</strong><pre>' +
                  JSON.stringify(errors, null, 2) + '</pre></div>';
        }

        progressDiv.innerHTML = '';
        resultDiv.innerHTML = html;

      } catch (error) {
        progressDiv.innerHTML = '';
        resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    // Verificar migración
    async function verifyMigration() {
      const resultDiv = document.getElementById('verificationResult');
      resultDiv.innerHTML = '<div class="info">⏳ Verificando lecciones...</div>';

      try {
        const { data: lessons, error } = await supabaseClient
          .from('seguros_education_lessons')
          .select('*, seguros_education_categories(nombre)')
          .order('orden');

        if (error) throw error;

        if (!lessons || lessons.length === 0) {
          resultDiv.innerHTML = '<div class="warning">⚠️ No hay lecciones en la base de datos</div>';
          return;
        }

        let html = `<div class="success">✓ ${lessons.length} lecciones encontradas</div>`;
        html += `
          <table>
            <tr>
              <th>#</th>
              <th>Título</th>
              <th>Categoría</th>
              <th>Video</th>
              <th>Thumbnail</th>
              <th>Estado</th>
            </tr>
        `;

        lessons.forEach((lesson, index) => {
          const hasVideo = lesson.video_url ? '✓' : '✗';
          const hasThumb = lesson.miniatura_url ? '✓' : '✗';
          const status = lesson.publicado ? 'Publicado' : 'Borrador';

          html += `
            <tr>
              <td>${index + 1}</td>
              <td>${lesson.titulo}</td>
              <td>${lesson.seguros_education_categories?.nombre || 'Sin categoría'}</td>
              <td>${hasVideo}</td>
              <td>${hasThumb}</td>
              <td><span class="badge ${lesson.publicado ? 'badge-success' : 'badge-warning'}">${status}</span></td>
            </tr>
          `;
        });

        html += '</table>';

        const withThumbs = lessons.filter(l => l.miniatura_url).length;
        html += `
          <div class="info">
            <strong>📊 Estadísticas:</strong><br>
            • ${lessons.length} lecciones totales<br>
            • ${withThumbs} con thumbnail (${Math.round(withThumbs/lessons.length*100)}%)<br>
            • ${lessons.filter(l => l.publicado).length} publicadas
          </div>
        `;

        resultDiv.innerHTML = html;

      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>

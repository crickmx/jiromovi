<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico GMM - Valores en BD</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #1a202c;
      border-bottom: 3px solid #3b82f6;
      padding-bottom: 10px;
    }
    h2 {
      color: #2d3748;
      margin-top: 30px;
      padding: 10px;
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
    }
    .result {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 15px;
      margin: 10px 0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }
    .error {
      background: #fff5f5;
      border-color: #fc8181;
      color: #c53030;
    }
    .success {
      background: #f0fff4;
      border-color: #68d391;
      color: #2f855a;
    }
    .warning {
      background: #fffaf0;
      border-color: #f6ad55;
      color: #c05621;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 12px;
      text-align: left;
    }
    th {
      background: #edf2f7;
      font-weight: 600;
      color: #2d3748;
    }
    tr:nth-child(even) {
      background: #f7fafc;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      margin: 10px 5px;
    }
    button:hover {
      background: #2563eb;
    }
    button:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
    }
    .diagnostic-box {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 20px;
      margin: 15px 0;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
    }
    .badge-ok {
      background: #c6f6d5;
      color: #22543d;
    }
    .badge-error {
      background: #fed7d7;
      color: #742a2a;
    }
    .badge-unknown {
      background: #e2e8f0;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Diagnóstico GMM BX+ - Valores en Base de Datos</h1>

    <div class="diagnostic-box">
      <p><strong>Propósito:</strong> Esta herramienta verifica si los valores de las tablas de tarifas en la base de datos coinciden con los del Excel original "Únikuz BX+".</p>
      <p><strong>Problema detectado:</strong> Las primas adicionales calculan ~9% en lugar de ~61.64% de la prima base.</p>
    </div>

    <button id="btnDiagnosticar" onclick="diagnosticar()">🚀 Iniciar Diagnóstico</button>

    <div id="resultados"></div>
  </div>

  <script>
    const supabaseUrl = 'https://ypsrdzqcgjyuxwmxhxzv.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwc3JkenFjZ2p5dXh3bXhoeHp2Iiwicm9sZSI6ImFub25fa2V5IiwiaWF0IjoxNzI5NjQyMjM3LCJleHAiOjIwNDUyMTgyMzd9.qxZ0OnBtvx-uKHy7y48qqTY5nlBd6JKCu6fRcmyoBzA';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function diagnosticar() {
      const resultados = document.getElementById('resultados');
      resultados.innerHTML = '<div class="result">⏳ Ejecutando diagnóstico...</div>';
      document.getElementById('btnDiagnosticar').disabled = true;

      try {
        // 1. Verificar paquete activo
        resultados.innerHTML += '<h2>1️⃣ Paquete de Tarifas Activo</h2>';

        const { data: pkg, error: pkgError } = await supabase
          .from('tariff_packages')
          .select('id, name, status, created_at')
          .eq('status', 'active')
          .maybeSingle();

        if (pkgError) throw pkgError;

        if (!pkg) {
          resultados.innerHTML += `
            <div class="result error">
              ❌ <strong>NO HAY PAQUETE ACTIVO</strong><br><br>
              <strong>Solución:</strong><br>
              1. Ir a: <strong>Administración → Tarifas GMM</strong><br>
              2. Subir el archivo Excel original: <code>unikuzdic25.xlsm</code><br>
              3. Activar el paquete subido<br>
              4. Volver a ejecutar este diagnóstico
            </div>
          `;
          return;
        }

        resultados.innerHTML += `
          <div class="result success">
            ✅ Paquete activo encontrado<br>
            <strong>Nombre:</strong> ${pkg.name}<br>
            <strong>ID:</strong> ${pkg.id}<br>
            <strong>Fecha:</strong> ${new Date(pkg.created_at).toLocaleString('es-MX')}
          </div>
        `;

        // 2. Obtener tablas
        resultados.innerHTML += '<h2>2️⃣ Coeficientes de Coberturas Adicionales</h2>';

        const { data: tables, error: tablesError } = await supabase
          .from('tariff_tables')
          .select('table_key, data_json')
          .eq('tariff_package_id', pkg.id);

        if (tablesError) throw tablesError;

        const getTable = (key) => tables?.find(t => t.table_key === key)?.data_json;

        // Coeficientes simples
        const coefMedicamentos = getTable('coef_medicamentos')?.[0]?.col_0 || 0;
        const coefVip = getTable('coef_vip')?.[0]?.col_0 || 0;
        const coefEmergenciaExt = getTable('coef_emergencia_ext')?.[0]?.col_0 || 0;

        resultados.innerHTML += `
          <table>
            <thead>
              <tr>
                <th>Cobertura</th>
                <th>Key en BD</th>
                <th>Celda Excel</th>
                <th>Valor Actual</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Medicamentos Fuera</td>
                <td><code>coef_medicamentos</code></td>
                <td>AJ3</td>
                <td><strong>${coefMedicamentos}</strong></td>
              </tr>
              <tr>
                <td>VIP</td>
                <td><code>coef_vip</code></td>
                <td>BI3</td>
                <td><strong>${coefVip}</strong></td>
              </tr>
              <tr>
                <td>Emergencia Extranjero</td>
                <td><code>coef_emergencia_ext</code></td>
                <td>AW3</td>
                <td><strong>${coefEmergenciaExt}</strong></td>
              </tr>
            </tbody>
          </table>
        `;

        // 3. Eliminación Deducible
        resultados.innerHTML += '<h2>3️⃣ Tabla Eliminación Deducible por Accidente</h2>';

        const dedKeys = getTable('deducible_accidente_keys') || [];
        const dedFactors = getTable('deducible_accidente_factors') || [];
        const idx35k = dedKeys.findIndex(k => k === 35000);
        const factor35k = idx35k >= 0 ? dedFactors[idx35k] : 'NO ENCONTRADO';

        resultados.innerHTML += `
          <div class="result">
            <strong>Deducible 35,000:</strong> ${factor35k}<br>
            <small>Celda Excel: AW15:AW23 (verificar valor exacto en Excel)</small>
          </div>
        `;

        // 4. Multiregión
        resultados.innerHTML += '<h2>4️⃣ Tabla Multiregión - QUERETARO</h2>';

        const multiData = getTable('multiregion_carga_sistema') || [];
        const qro = multiData.find(r => r.col_0 === 'QUERETARO');

        if (qro) {
          resultados.innerHTML += `
            <table>
              <thead>
                <tr>
                  <th>Columna</th>
                  <th>Valor</th>
                  <th>¿Se usa?</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><code>col_0</code> (Estado)</td>
                  <td>${qro.col_0}</td>
                  <td>-</td>
                </tr>
                <tr>
                  <td><code>col_1</code> 🎯</td>
                  <td><strong>${qro.col_1}</strong></td>
                  <td><span class="status-badge badge-ok">✓ CORRECTO (ahora usa col_1)</span></td>
                </tr>
                <tr>
                  <td><code>col_2</code></td>
                  <td>${qro.col_2}</td>
                  <td><span class="status-badge badge-error">✗ YA NO SE USA</span></td>
                </tr>
              </tbody>
            </table>
          `;
        } else {
          resultados.innerHTML += `
            <div class="result error">
              ❌ Estado QUERETARO no encontrado en la tabla multiregion_carga_sistema
            </div>
          `;
        }

        // 5. Análisis de Suma
        resultados.innerHTML += '<h2>5️⃣ Análisis de Suma de Factores</h2>';

        const sumaCoefs = coefMedicamentos + coefVip + coefEmergenciaExt + (factor35k !== 'NO ENCONTRADO' ? Number(factor35k) : 0) + (qro ? Number(qro.col_1) : 0);
        const objetivo = 0.616394;
        const diferencia = Math.abs(sumaCoefs - objetivo);
        const esCorrecto = diferencia < 0.001;

        resultados.innerHTML += `
          <div class="diagnostic-box">
            <h3>Suma de Factores (las 5 coberturas activas en el PDF)</h3>
            <p>
              <strong>Medicamentos:</strong> ${coefMedicamentos}<br>
              <strong>VIP:</strong> ${coefVip}<br>
              <strong>Emergencia Extranjero:</strong> ${coefEmergenciaExt}<br>
              <strong>Eliminación Deducible (35k):</strong> ${factor35k}<br>
              <strong>Multiregión (QRO col_1):</strong> ${qro ? qro.col_1 : 'N/A'}<br>
              ──────────────────────<br>
              <strong style="font-size: 18px;">SUMA TOTAL: ${sumaCoefs.toFixed(6)}</strong>
            </p>
            <p>
              <strong>Objetivo (del Excel):</strong> 0.616394 (61.6394%)<br>
              <strong>Diferencia:</strong> ${diferencia.toFixed(6)}
            </p>
            ${esCorrecto ? `
              <div class="result success">
                ✅ <strong>¡SUMA CORRECTA!</strong><br>
                Los valores en la base de datos coinciden con el Excel original.
              </div>
            ` : `
              <div class="result error">
                ❌ <strong>SUMA INCORRECTA</strong><br>
                Los valores NO coinciden con el Excel original.<br><br>
                <strong>Acción requerida:</strong><br>
                1. Subir el Excel original <code>unikuzdic25.xlsm</code> en Admin → Tarifas GMM<br>
                2. O verificar manualmente cada valor en el Excel y actualizar en la BD
              </div>
            `}
          </div>
        `;

        // 6. Gastos de Expedición
        resultados.innerHTML += '<h2>6️⃣ Gastos de Expedición</h2>';

        const gastosExp = getTable('gastos_expedicion')?.[0]?.col_0 || 0;
        const gastosOk = gastosExp === 300;

        resultados.innerHTML += `
          <div class="result ${gastosOk ? 'success' : 'warning'}">
            <strong>Valor actual:</strong> $${gastosExp}<br>
            <strong>Valor correcto (del Excel celda O67):</strong> $300<br>
            ${gastosOk ? '✅ Correcto' : '⚠️ Incorrecto - debe ser $300'}
          </div>
        `;

        // Resumen final
        resultados.innerHTML += '<h2>📊 Resumen del Diagnóstico</h2>';

        const problemas = [];
        if (!esCorrecto) problemas.push('Suma de factores incorrecta');
        if (!gastosOk) problemas.push('Gastos de expedición incorrectos');
        if (factor35k === 'NO ENCONTRADO') problemas.push('Factor deducible 35k no encontrado');

        if (problemas.length === 0) {
          resultados.innerHTML += `
            <div class="result success">
              ✅ <strong>¡TODO CORRECTO!</strong><br>
              Los valores en la base de datos coinciden con el Excel original.<br>
              Las cotizaciones deben calcular correctamente.
            </div>
          `;
        } else {
          resultados.innerHTML += `
            <div class="result error">
              ❌ <strong>Problemas encontrados:</strong><br>
              ${problemas.map(p => `• ${p}`).join('<br>')}
              <br><br>
              <strong>Solución:</strong><br>
              1. Subir el Excel original en: <strong>Administración → Tarifas GMM</strong><br>
              2. Archivo: <code>unikuzdic25.xlsm</code><br>
              3. Activar el paquete subido<br>
              4. Crear una cotización de prueba para validar
            </div>
          `;
        }

      } catch (error) {
        resultados.innerHTML += `
          <div class="result error">
            ❌ <strong>Error:</strong> ${error.message}
          </div>
        `;
      } finally {
        document.getElementById('btnDiagnosticar').disabled = false;
      }
    }
  </script>
</body>
</html>

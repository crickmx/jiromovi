<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test: Página Pública - Ejemplo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #1a202c;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .status {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .status.loading {
      background: #fef3c7;
      color: #92400e;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .card h2 {
      color: #2563eb;
      margin-bottom: 20px;
      font-size: 24px;
      border-bottom: 3px solid #2563eb;
      padding-bottom: 10px;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .data-item {
      background: #f8fafc;
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid #2563eb;
    }

    .data-item label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 8px;
    }

    .data-item .value {
      font-size: 16px;
      color: #1e293b;
      font-weight: 500;
      word-break: break-word;
    }

    .insurers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .insurer-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .insurer-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border-color: #2563eb;
    }

    .insurer-card img {
      max-width: 100%;
      max-height: 60px;
      object-fit: contain;
      margin-bottom: 12px;
      filter: grayscale(100%);
      transition: filter 0.3s ease;
    }

    .insurer-card:hover img {
      filter: grayscale(0%);
    }

    .insurer-card .name {
      font-size: 14px;
      color: #475569;
      font-weight: 600;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .category-card {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border-radius: 12px;
      padding: 24px;
      color: white;
      transition: all 0.3s ease;
    }

    .category-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
    }

    .category-card h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .category-card p {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.95;
    }

    code {
      background: #1e293b;
      color: #fbbf24;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 14px;
    }

    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      margin-top: 20px;
      font-size: 13px;
      line-height: 1.6;
    }

    .btn {
      background: #2563eb;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
      text-decoration: none;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .alert {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .alert.info {
      background: #dbeafe;
      color: #1e40af;
      border-left: 4px solid #2563eb;
    }

    .alert.success {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid #10b981;
    }

    .alert.warning {
      background: #fef3c7;
      color: #92400e;
      border-left: 4px solid #f59e0b;
    }

    .alert.error {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧪 Test: Página Pública - Ejemplo</h1>
      <div id="status" class="status loading">
        <span class="loading-spinner"></span> Cargando datos...
      </div>
      <p style="color: #64748b; margin-top: 10px;">
        Prueba de la función <code>get_public_web_page_by_slug('ejemplo')</code>
      </p>
    </div>

    <div id="alerts"></div>

    <div id="content"></div>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';

    const statusEl = document.getElementById('status');
    const alertsEl = document.getElementById('alerts');
    const contentEl = document.getElementById('content');

    function showAlert(type, message) {
      const alert = document.createElement('div');
      alert.className = `alert ${type}`;
      alert.textContent = message;
      alertsEl.appendChild(alert);
    }

    async function testPublicPage() {
      try {
        console.log('🚀 Iniciando prueba...');

        // Llamada directa a la función RPC
        const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_web_page_by_slug`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ p_slug: 'ejemplo' })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        console.log('✅ Datos recibidos:', data);

        if (!data || Object.keys(data).length === 0) {
          throw new Error('No se encontró la página o no está publicada');
        }

        // Actualizar status
        statusEl.className = 'status success';
        statusEl.innerHTML = '✅ Datos cargados correctamente';

        showAlert('success', '¡La función RPC funciona correctamente! La página pública está lista.');

        // Mostrar datos del usuario
        const user = data.user;
        const config = data.config;
        const insurers = data.insurers || [];
        const categories = data.categories || [];

        let html = `
          <div class="card">
            <h2>👤 Datos del Usuario</h2>
            <div class="data-grid">
              <div class="data-item">
                <label>Nombre</label>
                <div class="value">${user.name}</div>
              </div>
              <div class="data-item">
                <label>Email</label>
                <div class="value">${user.email}</div>
              </div>
              <div class="data-item">
                <label>Teléfono</label>
                <div class="value">${user.phone}</div>
              </div>
              <div class="data-item">
                <label>Oficina</label>
                <div class="value">${user.office?.name || 'N/A'}</div>
              </div>
            </div>
          </div>

          <div class="card">
            <h2>🎨 Configuración de Página</h2>
            <div class="data-grid">
              <div class="data-item">
                <label>Color Primario</label>
                <div class="value">
                  <span style="display: inline-block; width: 30px; height: 30px; background: ${config.primary_color}; border-radius: 6px; vertical-align: middle; margin-right: 8px; border: 2px solid #e2e8f0;"></span>
                  ${config.primary_color}
                </div>
              </div>
              <div class="data-item">
                <label>Color Secundario</label>
                <div class="value">
                  <span style="display: inline-block; width: 30px; height: 30px; background: ${config.secondary_color}; border-radius: 6px; vertical-align: middle; margin-right: 8px; border: 2px solid #e2e8f0;"></span>
                  ${config.secondary_color}
                </div>
              </div>
              <div class="data-item">
                <label>Estado</label>
                <div class="value">${config.is_published ? '✅ Publicada' : '❌ No publicada'}</div>
              </div>
            </div>
          </div>
        `;

        if (insurers.length > 0) {
          html += `
            <div class="card">
              <h2>🏢 Aseguradoras (${insurers.length})</h2>
              <div class="insurers-grid">
                ${insurers.map(ins => `
                  <div class="insurer-card">
                    <img src="${ins.logo_url}" alt="${ins.name}" onerror="this.style.display='none'">
                    <div class="name">${ins.name}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }

        if (categories.length > 0) {
          html += `
            <div class="card">
              <h2>📋 Categorías de Seguro (${categories.length})</h2>
              <div class="categories-grid">
                ${categories.map(cat => `
                  <div class="category-card">
                    <h3>${cat.card_title || cat.name}</h3>
                    <p>${cat.card_description || 'Sin descripción'}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }

        html += `
          <div class="card">
            <h2>🔗 URL de Acceso</h2>
            <div class="alert info">
              <strong>URL Producción:</strong><br>
              <code style="background: white; color: #2563eb; padding: 8px 12px; display: inline-block; margin-top: 8px; border-radius: 6px;">
                https://agentedeseguros.online/ejemplo
              </code>
            </div>
            <div style="margin-top: 20px;">
              <p style="color: #64748b; margin-bottom: 12px;">
                Esta página se puede acceder directamente sin autenticación. Es pública para que clientes potenciales puedan ver la información del asesor.
              </p>
              <a href="https://agentedeseguros.online/ejemplo" class="btn" target="_blank">
                🌐 Abrir Página Pública
              </a>
            </div>
          </div>

          <div class="card">
            <h2>📊 Respuesta JSON Completa</h2>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;

        contentEl.innerHTML = html;

      } catch (error) {
        console.error('❌ Error:', error);
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Error al cargar datos';

        showAlert('error', `Error: ${error.message}`);

        contentEl.innerHTML = `
          <div class="card">
            <h2>❌ Error</h2>
            <div class="alert error">
              <strong>No se pudieron cargar los datos:</strong><br>
              ${error.message}
            </div>
            <pre>${error.stack || error.toString()}</pre>
          </div>
        `;
      }
    }

    // Ejecutar la prueba
    testPublicPage();
  </script>
</body>
</html>

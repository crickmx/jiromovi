<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52" fill="none">
  <defs>
    <!-- Icon background -->
    <linearGradient id="ibg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#061828"/>
    </linearGradient>
    <!-- Teal gradient for icon elements -->
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#00C8F0"/>
    </linearGradient>
    <!-- Teal ring -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A8CC"/>
    </linearGradient>
    <!-- Core gradient -->
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5C0"/>
      <stop offset="100%" stop-color="#0097B2"/>
    </linearGradient>
    <!-- Wordmark white -->
    <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C0DDF8"/>
    </linearGradient>
    <!-- AI badge -->
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#00C8F0"/>
    </linearGradient>
    <radialGradient id="iglow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="idrop">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- ── Icon square ── -->
  <rect x="1" y="1" width="50" height="50" rx="14" fill="url(#ibg)" filter="url(#idrop)"/>
  <rect x="1" y="1" width="50" height="50" rx="14" fill="none" stroke="rgba(0,212,170,0.18)" stroke-width="1"/>

  <!-- Glow -->
  <circle cx="26" cy="26" r="20" fill="url(#iglow)"/>

  <!-- Orbit ring -->
  <circle cx="26" cy="26" r="14" stroke="url(#ring)" stroke-width="1.2" stroke-dasharray="3.5 2.5" fill="none" opacity="0.45"/>

  <!-- Neural nodes -->
  <circle cx="26" cy="12" r="1.8" fill="url(#teal)" opacity="0.9"/>
  <circle cx="37.1" cy="19" r="1.4" fill="url(#teal)" opacity="0.75"/>
  <circle cx="37.1" cy="33" r="1.4" fill="url(#teal)" opacity="0.75"/>
  <circle cx="14.9" cy="19" r="1.8" fill="url(#teal)" opacity="0.9"/>
  <circle cx="14.9" cy="33" r="1.4" fill="url(#teal)" opacity="0.75"/>

  <!-- Connector lines -->
  <line x1="26" y1="12" x2="26" y2="18" stroke="#00FFCC" stroke-width="0.7" opacity="0.35"/>
  <line x1="37.1" y1="19" x2="32" y2="22" stroke="#00FFCC" stroke-width="0.7" opacity="0.35"/>
  <line x1="37.1" y1="33" x2="32" y2="30" stroke="#00FFCC" stroke-width="0.7" opacity="0.35"/>
  <line x1="14.9" y1="19" x2="20" y2="22" stroke="#00FFCC" stroke-width="0.7" opacity="0.35"/>
  <line x1="14.9" y1="33" x2="20" y2="30" stroke="#00FFCC" stroke-width="0.7" opacity="0.35"/>

  <!-- "C" lettermark -->
  <path d="M 31 19 Q 26 15.5 21.5 18 Q 17 20.5 17 26 Q 17 31.5 21.5 34 Q 26 36.5 31 33"
    stroke="url(#core)" stroke-width="3.8" fill="none" stroke-linecap="round" filter="url(#idrop)"/>

  <!-- Center core -->
  <circle cx="26" cy="26" r="3.5" fill="url(#teal)" filter="url(#idrop)"/>
  <circle cx="26" cy="26" r="1.6" fill="white" opacity="0.95"/>

  <!-- AI badge (top-right of icon) -->
  <rect x="34" y="4" width="14" height="8.5" rx="3" fill="url(#badge)" opacity="0.92"/>
  <text x="41" y="10.8" font-family="'SF Pro Display','Inter',Arial,sans-serif"
    font-size="5.5" font-weight="900" letter-spacing="0.4"
    text-anchor="middle" fill="#061828">AI</text>

  <!-- ── Wordmark ── -->
  <!-- "Chava" bold white -->
  <text x="63" y="33" font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="26" font-weight="800" letter-spacing="-0.5"
    fill="url(#wgrad)">Chava</text>

  <!-- "AI" teal badge pill -->
  <rect x="170" y="10" width="30" height="18" rx="6" fill="url(#badge)" opacity="0.92"/>
  <text x="185" y="23" font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="11" font-weight="900" letter-spacing="0.5"
    text-anchor="middle" fill="#061828">AI</text>

  <!-- Tagline -->
  <text x="63" y="46" font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="10.5" font-weight="500" letter-spacing="0.2"
    fill="#00D4AA" opacity="0.7">agentedeseguros.ai</text>
</svg>

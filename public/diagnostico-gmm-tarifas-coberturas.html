<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico GMM - Coberturas Adicionales</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Courier New', monospace;
      margin: 20px;
      background: #1a1a1a;
      color: #00ff00;
    }
    .section {
      background: #000;
      border: 2px solid #00ff00;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
    }
    .title {
      color: #00ffff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      border-bottom: 2px solid #00ffff;
      padding-bottom: 10px;
    }
    .label {
      color: #ffff00;
      font-weight: bold;
    }
    .value {
      color: #00ff00;
    }
    .error {
      color: #ff0000;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    th, td {
      border: 1px solid #00ff00;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #003300;
      color: #00ffff;
    }
    .calculation {
      background: #001a1a;
      padding: 10px;
      margin: 10px 0;
      border-left: 4px solid #00ffff;
    }
    button {
      background: #003300;
      color: #00ff00;
      border: 2px solid #00ff00;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover {
      background: #00ff00;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="title">🔍 DIAGNÓSTICO GMM - COBERTURAS ADICIONALES</div>
    <button onclick="runDiagnostic()">🚀 Ejecutar Diagnóstico</button>
    <button onclick="calculateReverse()">🔄 Ingeniería Inversa</button>
  </div>

  <div id="results"></div>

  <script>
    const SUPABASE_URL = 'https://ypsrdzqcgjyuxwmxhxzv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwc3JkenFjZ2p5dXh3bXhoeHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk2NDIyMzcsImV4cCI6MjA0NTIxODIzN30.TlihgKe7fZKP6LIbIvqE6yb-3XBalLFu9Qe3SOXmh70';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function runDiagnostic() {
      const output = document.getElementById('results');
      output.innerHTML = '<div class="section"><div class="label">⏳ Cargando tarifas activas...</div></div>';

      try {
        // Obtener paquete de tarifas activo
        const { data: packages, error: pkgError } = await supabase
          .from('tariff_packages')
          .select('id, name, status')
          .eq('status', 'active')
          .limit(1)
          .single();

        if (pkgError) throw pkgError;
        if (!packages) throw new Error('No hay tarifas activas');

        // Obtener todas las tablas
        const { data: tables, error: tablesError } = await supabase
          .from('tariff_tables')
          .select('*')
          .eq('tariff_package_id', packages.id);

        if (tablesError) throw tablesError;

        const tableMap = {};
        tables.forEach(t => {
          tableMap[t.table_key] = t.data_json;
        });

        // Mostrar información de coberturas
        let html = `
          <div class="section">
            <div class="title">📦 Paquete Activo: ${packages.name}</div>
          </div>

          <div class="section">
            <div class="title">📊 COEFICIENTES DE COBERTURAS ADICIONALES</div>
            <table>
              <tr>
                <th>Cobertura</th>
                <th>Clave Excel</th>
                <th>Valor Actual</th>
                <th>% Base</th>
              </tr>
              <tr>
                <td>Medicamentos Fuera</td>
                <td>AJ3</td>
                <td class="value">${tableMap.coef_medicamentos?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_medicamentos?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Padecimientos Preexistentes</td>
                <td>AJ7</td>
                <td class="value">${tableMap.coef_preexistentes?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_preexistentes?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Complicaciones</td>
                <td>AJ11</td>
                <td class="value">${tableMap.coef_complicaciones?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_complicaciones?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>VIP</td>
                <td>BI3</td>
                <td class="value">${tableMap.coef_vip?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_vip?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Reconocimiento Antigüedad</td>
                <td>BI7</td>
                <td class="value">${tableMap.coef_antiguedad?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_antiguedad?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Emergencia Extranjero</td>
                <td>AW3</td>
                <td class="value">${tableMap.coef_emergencia_ext?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_emergencia_ext?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Enfermedades Graves Extranjero</td>
                <td>AW7</td>
                <td class="value">${tableMap.coef_enf_graves_ext?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_enf_graves_ext?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Ayuda Diaria</td>
                <td>BC3</td>
                <td class="value">${tableMap.coef_ayuda_diaria?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_ayuda_diaria?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
              <tr>
                <td>Ampliación Servicios</td>
                <td>BC7</td>
                <td class="value">${tableMap.coef_ampliacion_servicios?.[0]?.col_0 || 'N/A'}</td>
                <td>${((tableMap.coef_ampliacion_servicios?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
            </table>
          </div>

          <div class="section">
            <div class="title">🌎 MULTIREGIÓN - QUERÉTARO</div>
            <table>
              <tr>
                <th>Estado</th>
                <th>col_0</th>
                <th>col_1</th>
                <th>col_2 (usado)</th>
              </tr>
        `;

        const qroData = tableMap.multiregion_carga_sistema?.find(r => r.col_0 === 'QUERETARO');
        if (qroData) {
          html += `
              <tr>
                <td class="value">${qroData.col_0}</td>
                <td>${qroData.col_1 || 'null'}</td>
                <td>${qroData.col_1 || 'null'}</td>
                <td class="value">${qroData.col_2 || 'null'}</td>
              </tr>
          `;
        }

        html += `
            </table>
            <div class="calculation">
              <div class="label">📝 Nota:</div>
              Actualmente se usa <span class="value">col_2</span> para el factor de Multiregión<br>
              Verificar si debería usar <span class="value">col_1</span> en su lugar
            </div>
          </div>

          <div class="section">
            <div class="title">🔢 ELIMINACIÓN DEDUCIBLE POR ACCIDENTE</div>
            <table>
              <tr>
                <th>Deducible</th>
                <th>Factor</th>
              </tr>
        `;

        const deducibleKeys = tableMap.deducible_accidente_keys || [];
        const deducibleFactors = tableMap.deducible_accidente_factors || [];

        deducibleKeys.forEach((key, idx) => {
          const highlight = key === 35000 ? 'style="background: #003300;"' : '';
          html += `
              <tr ${highlight}>
                <td>${key}</td>
                <td class="value">${deducibleFactors[idx] || 'null'}</td>
              </tr>
          `;
        });

        html += `
            </table>
          </div>

          <div class="section">
            <div class="title">💰 GASTOS Y CARGAS</div>
            <table>
              <tr>
                <th>Concepto</th>
                <th>Clave</th>
                <th>Valor</th>
              </tr>
              <tr>
                <td>Gastos de Expedición (por asegurado)</td>
                <td>Cotizacion!O67</td>
                <td class="value">$${tableMap.gastos_expedicion?.[0]?.col_0 || 'N/A'}</td>
              </tr>
              <tr>
                <td>IVA</td>
                <td>Cotizacion!O69</td>
                <td class="value">${((tableMap.iva?.[0]?.col_0 || 0) * 100).toFixed(2)}%</td>
              </tr>
            </table>

            <div class="calculation">
              <div class="label">⚠️ Problema Detectado:</div>
              Excel muestra $900 en gastos de expedición (3 × $300)<br>
              Sistema tiene: $${tableMap.gastos_expedicion?.[0]?.col_0 || 150} × 3 = $${(tableMap.gastos_expedicion?.[0]?.col_0 || 150) * 3}<br>
              <span class="error">Diferencia: El valor en O67 debería ser $300, no $${tableMap.gastos_expedicion?.[0]?.col_0 || 150}</span>
            </div>

            <div class="calculation">
              <div class="label">📊 Denominador de Cargas (L4:L6):</div>
        `;

        const denominador = tableMap.denominador_cargas || [];
        denominador.forEach((val, idx) => {
          html += `<div>Carga ${idx + 1}: ${val}</div>`;
        });

        const sumDenominador = denominador.reduce((acc, val) => acc + (val || 0), 0);
        html += `
              <div class="value">SUMA: ${sumDenominador.toFixed(5)} (${(sumDenominador * 100).toFixed(2)}%)</div>
              <div>Divisor: 1 - ${sumDenominador} = ${(1 - sumDenominador).toFixed(5)}</div>
            </div>
          </div>
        `;

        output.innerHTML = html;

      } catch (error) {
        output.innerHTML = `<div class="section"><div class="error">❌ Error: ${error.message}</div></div>`;
        console.error(error);
      }
    }

    async function calculateReverse() {
      const output = document.getElementById('results');
      output.innerHTML += `
        <div class="section">
          <div class="title">🔄 INGENIERÍA INVERSA - Cálculo desde PDF Real</div>
          <div class="calculation">
            <div class="label">📄 Datos del Excel Real (Hombre 40 años, Querétaro):</div>
            <div>Prima Base (Cobertura Básica): $11,509.57</div>
            <div>Prima Adicionales: $7,094.43</div>
            <div>Prima Total: $18,604.00</div>
            <br>
            <div class="label">🧮 Coberturas Activas:</div>
            <div>✅ Medicamentos Fuera del Hospital</div>
            <div>✅ Eliminación Deducible por Accidente</div>
            <div>✅ Multiregión</div>
            <div>✅ Beneficio VIP</div>
            <div>✅ Emergencia Médica en el Extranjero</div>
            <br>
            <div class="label">📊 Ratio de Adicionales:</div>
            <div class="value">$7,094.43 / $11,509.57 = ${(7094.43 / 11509.57).toFixed(5)} = ${((7094.43 / 11509.57) * 100).toFixed(2)}%</div>
            <br>
            <div class="label">🔍 Análisis:</div>
            <div>Las coberturas adicionales representan el <span class="value">61.64%</span> de la prima base.</div>
            <div>Esto significa que la suma de todos los factores de coberturas debe ser ~0.6164</div>
            <br>
            <div class="label">💡 Hipótesis:</div>
            <div>Si cada cobertura usa la prima base CON cargas ($11,509.57):</div>
            <div>  • Medicamentos: $11,509.57 × factor_med = ?</div>
            <div>  • Multiregión: $11,509.57 × factor_multi = ?</div>
            <div>  • VIP: $11,509.57 × factor_vip = ?</div>
            <div>  • Emergencia Ext: $11,509.57 × factor_emerg = ?</div>
            <div>  • Elim. Deducible: $11,509.57 × factor_deducible = ?</div>
            <div class="value">  SUMA = $7,094.43</div>
            <br>
            <div class="label">🎯 Factores Necesarios:</div>
            <div>Para que sume $7,094.43, la suma de factores debe ser:</div>
            <div class="value">$7,094.43 / $11,509.57 = 0.61636</div>
            <br>
            <div class="label">⚠️ Conclusión:</div>
            <div class="error">Los coeficientes actuales en la base de datos NO suman 0.61636</div>
            <div class="error">Verificar valores exactos en el Excel (celdas AJ3, BI3, AW3, AW15:AW23, AQ42:AS74)</div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>

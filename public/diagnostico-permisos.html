<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico de Permisos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h1 { color: #1a1a1a; margin-top: 0; }
    h2 { color: #333; font-size: 1.3em; margin-top: 0; border-bottom: 2px solid #e5e5e5; padding-bottom: 10px; }
    .result { margin: 10px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; font-family: monospace; font-size: 13px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-right: 10px;
    }
    button:hover { background: #0056b3; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }
    .property { margin: 8px 0; }
    .property strong { color: #0066cc; display: inline-block; min-width: 180px; }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Diagnóstico de Permisos y Sesión</h1>
    <p>Esta herramienta verifica tu sesión actual, permisos y roles en el sistema.</p>
  </div>

  <div class="card">
    <h2>1. Información de Sesión Supabase Auth</h2>
    <div id="authInfo">Cargando...</div>
  </div>

  <div class="card">
    <h2>2. Información de Usuario (tabla usuarios)</h2>
    <div id="userInfo">Cargando...</div>
  </div>

  <div class="card">
    <h2>3. Verificación de Permisos</h2>
    <div id="permissionsInfo">Cargando...</div>
  </div>

  <div class="card">
    <h2>4. Acciones</h2>
    <button onclick="location.reload()">🔄 Refrescar Diagnóstico</button>
    <button onclick="window.location.href='/comisiones/upload-nuevo'">📤 Ir a Cargar Comisiones</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://syjbniobmrvsrcgcjdnf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5amJuaW9ibXJ2c3JjZ2NqZG5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NTExMDksImV4cCI6MjA0NTEyNzEwOX0.TyQMvR2DaHJgYhm-L13sKMxBCzGNqJnPvjKEfyNFgdw';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAuth() {
      const authDiv = document.getElementById('authInfo');

      try {
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          authDiv.innerHTML = `<div class="result error">❌ Error al obtener sesión: ${sessionError.message}</div>`;
          return null;
        }

        if (!session) {
          authDiv.innerHTML = `<div class="result warning">⚠️ No hay sesión activa. <a href="/login">Ir a Login</a></div>`;
          return null;
        }

        const { data: { user }, error: userError } = await supabase.auth.getUser();

        if (userError || !user) {
          authDiv.innerHTML = `<div class="result error">❌ Error al obtener usuario: ${userError?.message || 'Usuario no encontrado'}</div>`;
          return null;
        }

        authDiv.innerHTML = `
          <div class="result success">
            ✅ Sesión activa
            <div class="property"><strong>User ID:</strong> ${user.id}</div>
            <div class="property"><strong>Email:</strong> ${user.email || 'N/A'}</div>
            <div class="property"><strong>Última conexión:</strong> ${new Date(user.last_sign_in_at).toLocaleString()}</div>
            <div class="property"><strong>Metadata:</strong> <pre>${JSON.stringify(user.user_metadata, null, 2)}</pre></div>
          </div>
        `;

        return user.id;
      } catch (error) {
        authDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
        return null;
      }
    }

    async function checkUserRecord(userId) {
      const userDiv = document.getElementById('userInfo');

      if (!userId) {
        userDiv.innerHTML = `<div class="result warning">⚠️ No se puede verificar usuario sin sesión activa</div>`;
        return null;
      }

      try {
        const { data: usuario, error } = await supabase
          .from('usuarios')
          .select('*')
          .eq('id', userId)
          .maybeSingle();

        if (error) {
          userDiv.innerHTML = `<div class="result error">❌ Error al consultar usuario: ${error.message}</div>`;
          return null;
        }

        if (!usuario) {
          userDiv.innerHTML = `<div class="result error">❌ Usuario no encontrado en la tabla usuarios</div>`;
          return null;
        }

        if (!usuario.activo) {
          userDiv.innerHTML = `<div class="result warning">⚠️ Usuario inactivo</div>`;
        }

        if (usuario.is_deleted) {
          userDiv.innerHTML = `<div class="result error">❌ Usuario marcado como eliminado</div>`;
        }

        userDiv.innerHTML = `
          <div class="result ${usuario.activo && !usuario.is_deleted ? 'success' : 'warning'}">
            ${usuario.activo && !usuario.is_deleted ? '✅' : '⚠️'} Registro de usuario encontrado
            <div class="property"><strong>ID:</strong> ${usuario.id}</div>
            <div class="property"><strong>Nombre completo:</strong> ${usuario.nombre_completo || 'N/A'}</div>
            <div class="property"><strong>ROL:</strong> <span style="background: #007bff; color: white; padding: 4px 12px; border-radius: 6px; font-weight: bold;">${usuario.rol || 'N/A'}</span></div>
            <div class="property"><strong>Puesto:</strong> ${usuario.puesto || 'N/A'}</div>
            <div class="property"><strong>Activo:</strong> ${usuario.activo ? '✅ Sí' : '❌ No'}</div>
            <div class="property"><strong>Eliminado:</strong> ${usuario.is_deleted ? '❌ Sí' : '✅ No'}</div>
            <div class="property"><strong>Email personal:</strong> ${usuario.email_personal || 'N/A'}</div>
            <div class="property"><strong>Email laboral:</strong> ${usuario.email_laboral || 'N/A'}</div>
            <div class="property"><strong>Oficina ID:</strong> ${usuario.oficina_id || 'N/A'}</div>
          </div>
        `;

        return usuario;
      } catch (error) {
        userDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
        return null;
      }
    }

    async function checkPermissions(usuario) {
      const permDiv = document.getElementById('permissionsInfo');

      if (!usuario) {
        permDiv.innerHTML = `<div class="result warning">⚠️ No se puede verificar permisos sin información de usuario</div>`;
        return;
      }

      const rol = usuario.rol;
      const isAdmin = rol === 'Administrador';
      const isGerente = rol === 'Gerente';
      const isAgente = rol === 'Agente';
      const isEmpleado = rol === 'Empleado';

      let html = `
        <div class="result ${isAdmin ? 'success' : 'info'}">
          <h3 style="margin-top: 0;">Rol actual: ${rol}</h3>

          <div style="margin: 20px 0;">
            <strong>Permisos disponibles:</strong>
          </div>

          <div class="property">
            ${isAdmin ? '✅' : '❌'} <strong>Administrador:</strong>
            ${isAdmin ? 'Acceso completo al sistema' : 'No tienes este permiso'}
          </div>

          <div class="property">
            ${isGerente || isAdmin ? '✅' : '❌'} <strong>Gerente:</strong>
            ${isGerente || isAdmin ? 'Puede gestionar su oficina' : 'No tienes este permiso'}
          </div>

          <div class="property">
            ${isEmpleado || isAdmin ? '✅' : '❌'} <strong>Empleado:</strong>
            ${isEmpleado || isAdmin ? 'Acceso a funciones internas' : 'No tienes este permiso'}
          </div>

          <div class="property">
            ${isAgente ? '✅' : '❌'} <strong>Agente:</strong>
            ${isAgente ? 'Acceso limitado a funciones de agente' : 'No tienes este permiso'}
          </div>

          <div style="margin-top: 25px; padding: 15px; background: ${isAdmin ? '#d4edda' : '#fff3cd'}; border-radius: 8px;">
            <strong>🔒 Acceso a "Cargar Archivo de Comisiones":</strong><br>
            ${isAdmin
              ? '✅ <strong style="color: #155724;">PERMITIDO</strong> - Tienes rol de Administrador'
              : '❌ <strong style="color: #856404;">DENEGADO</strong> - Esta función requiere rol de Administrador'
            }
          </div>

          ${!isAdmin ? `
            <div style="margin-top: 15px; padding: 15px; background: #f8d7da; border-radius: 8px; color: #721c24;">
              <strong>⚠️ Nota importante:</strong><br>
              Si crees que deberías tener acceso de Administrador, contacta con el administrador del sistema para que actualice tu rol.
            </div>
          ` : ''}
        </div>
      `;

      permDiv.innerHTML = html;
    }

    async function runDiagnostics() {
      console.log('🔍 Iniciando diagnóstico...');

      const userId = await checkAuth();
      console.log('User ID:', userId);

      const usuario = await checkUserRecord(userId);
      console.log('Usuario:', usuario);

      await checkPermissions(usuario);

      console.log('✅ Diagnóstico completo');
    }

    // Ejecutar diagnóstico al cargar la página
    runDiagnostics();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Actualizar Contraseña Usuario</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h1 { color: #1e293b; margin-top: 0; }
    label {
      display: block;
      font-weight: 600;
      margin: 12px 0 4px;
      color: #475569;
    }
    input, button {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      background: #3b82f6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover { background: #2563eb; }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee; color: #991b1b; }
    .info { background: #dbeafe; color: #1e40af; }
    .step {
      background: #f1f5f9;
      padding: 12px;
      border-left: 3px solid #3b82f6;
      margin: 12px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Test - Actualizar Contraseña</h1>
    <p style="color: #64748b; margin-top: 0;">
      Prueba el flujo completo de actualización de contraseña
    </p>

    <div class="step">
      <strong>Paso 1:</strong> Inicia sesión como Admin
    </div>

    <label>Email Admin:</label>
    <input type="email" id="adminEmail" value="admin@jiro.mx" />

    <label>Contraseña Admin:</label>
    <input type="password" id="adminPassword" value="" />

    <button onclick="login()">Iniciar Sesión</button>

    <div id="loginResult"></div>
  </div>

  <div class="card" id="updateSection" style="display: none;">
    <div class="step">
      <strong>Paso 2:</strong> Actualiza la contraseña de un usuario
    </div>

    <label>ID del Usuario a Actualizar:</label>
    <input type="text" id="userId" placeholder="UUID del usuario" />

    <label>Nueva Contraseña:</label>
    <input type="password" id="newPassword" value="NuevaPass123" />

    <button onclick="updatePassword()">Actualizar Contraseña</button>

    <div id="updateResult"></div>
  </div>

  <div class="card">
    <h2 style="font-size: 18px; margin-top: 0;">📋 Log de Eventos</h2>
    <div id="log" style="font-size: 13px; color: #64748b;"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jqcstvcvvrdbchplfdva.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxY3N0dmN2dnJkYmNocGxmZHZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk2NTEyMzgsImV4cCI6MjA0NTIyNzIzOH0.rV3L25UNzrU5Xn2eHR5b1ZSwWUJOPCLd5Lg3u98OsRY';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentSession = null;

    function addLog(message, type = 'info') {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#64748b';
      log.innerHTML += `<div style="color: ${color}; margin: 4px 0;">[${time}] ${message}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    async function login() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const resultDiv = document.getElementById('loginResult');

      if (!email || !password) {
        resultDiv.innerHTML = '<div class="result error">Por favor completa todos los campos</div>';
        return;
      }

      try {
        addLog('Iniciando sesión como admin...');

        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        currentSession = data.session;
        addLog('✅ Sesión iniciada correctamente', 'success');

        // Verificar que es admin
        const { data: userData, error: userError } = await supabaseClient
          .from('usuarios')
          .select('rol, nombre, apellidos')
          .eq('email_laboral', email)
          .single();

        if (userError) throw userError;

        if (userData.rol !== 'Administrador') {
          throw new Error('Este usuario no es Administrador');
        }

        addLog(`Usuario: ${userData.nombre} ${userData.apellidos} (${userData.rol})`, 'success');

        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Sesión iniciada como <strong>${userData.nombre} ${userData.apellidos}</strong><br>
            Rol: ${userData.rol}
          </div>
        `;

        document.getElementById('updateSection').style.display = 'block';

        // Cargar lista de usuarios para facilitar la prueba
        loadUsers();

      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
        resultDiv.innerHTML = `<div class="result error">❌ ${error.message}</div>`;
      }
    }

    async function loadUsers() {
      try {
        const { data: users, error } = await supabaseClient
          .from('usuarios')
          .select('id, nombre, apellidos, email_laboral, rol')
          .neq('rol', 'Administrador')
          .order('nombre')
          .limit(10);

        if (error) throw error;

        if (users && users.length > 0) {
          const userSelect = document.createElement('select');
          userSelect.id = 'userSelect';
          userSelect.style.width = '100%';
          userSelect.style.padding = '10px';
          userSelect.style.marginTop = '8px';
          userSelect.style.border = '1px solid #cbd5e1';
          userSelect.style.borderRadius = '6px';

          userSelect.innerHTML = '<option value="">Selecciona un usuario</option>' +
            users.map(u =>
              `<option value="${u.id}">${u.nombre} ${u.apellidos} (${u.email_laboral})</option>`
            ).join('');

          userSelect.onchange = (e) => {
            document.getElementById('userId').value = e.target.value;
          };

          const label = document.querySelector('label[for="userId"]');
          if (label.nextElementSibling?.id === 'userSelect') {
            label.nextElementSibling.remove();
          }
          label.insertAdjacentElement('afterend', userSelect);

          addLog(`${users.length} usuarios disponibles para prueba`);
        }
      } catch (error) {
        addLog(`Error al cargar usuarios: ${error.message}`, 'error');
      }
    }

    async function updatePassword() {
      const userId = document.getElementById('userId').value;
      const newPassword = document.getElementById('newPassword').value;
      const resultDiv = document.getElementById('updateResult');

      if (!userId || !newPassword) {
        resultDiv.innerHTML = '<div class="result error">Por favor completa todos los campos</div>';
        return;
      }

      if (!currentSession) {
        resultDiv.innerHTML = '<div class="result error">Debes iniciar sesión primero</div>';
        return;
      }

      try {
        addLog(`Actualizando contraseña para usuario ${userId}...`);

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/update-user-password`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${currentSession.access_token}`,
            },
            body: JSON.stringify({
              userId: userId,
              password: newPassword,
            }),
          }
        );

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Error al actualizar contraseña');
        }

        addLog('✅ Contraseña actualizada correctamente', 'success');

        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Contraseña actualizada correctamente<br>
            <small>El usuario ya puede usar la nueva contraseña para iniciar sesión</small>
          </div>
        `;

        // Obtener info del usuario actualizado
        const { data: user } = await supabaseClient
          .from('usuarios')
          .select('nombre, apellidos, email_laboral')
          .eq('id', userId)
          .single();

        if (user) {
          addLog(`Usuario actualizado: ${user.nombre} ${user.apellidos} (${user.email_laboral})`, 'success');
        }

      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
        resultDiv.innerHTML = `<div class="result error">❌ ${error.message}</div>`;
      }
    }

    addLog('Test listo. Inicia sesión como admin para comenzar.');
  </script>
</body>
</html>

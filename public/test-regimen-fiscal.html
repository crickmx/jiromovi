<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar Régimen Fiscal Unificado</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
    }

    h1 {
      color: #1a202c;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      margin-bottom: 1rem;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #results {
      margin-top: 2rem;
    }

    .result-item {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .result-item.success {
      background: #c6f6d5;
      border-left: 4px solid #38a169;
      color: #22543d;
    }

    .result-item.error {
      background: #fed7d7;
      border-left: 4px solid #e53e3e;
      color: #742a2a;
    }

    .result-item.info {
      background: #bee3f8;
      border-left: 4px solid #3182ce;
      color: #2c5282;
    }

    .result-item.warning {
      background: #feebc8;
      border-left: 4px solid #dd6b20;
      color: #7c2d12;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background: #2d3748;
      color: white;
      font-weight: 600;
    }

    tr:hover {
      background: #f7fafc;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.resico {
      background: #bee3f8;
      color: #2c5282;
    }

    .badge.honorarios {
      background: #c6f6d5;
      color: #22543d;
    }

    .badge.asimilados {
      background: #feebc8;
      color: #7c2d12;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Régimen Fiscal Unificado</h1>
    <p class="subtitle">Verificación del campo regimen_fiscal_id en usuarios</p>

    <button class="button" onclick="verificarMigracion()">
      Verificar Migración de Datos
    </button>

    <button class="button" onclick="verificarUsuarios()">
      Ver Usuarios con Régimen Fiscal
    </button>

    <button class="button" onclick="verificarRegimenes()">
      Ver Regímenes Fiscales Disponibles
    </button>

    <button class="button" onclick="sincronizarAgentes()">
      Sincronizar Agentes de Comisiones
    </button>

    <div id="results"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bhchvbuhfsdpjgugqzjc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoY2h2YnVoZnNkcGpndWdxempjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzA4NDA4NjIsImV4cCI6MjA0NjQxNjg2Mn0.oN-sGLY3uSKdWRTLFuhZG-_2PFPp_tWBGr_TqtFd0NM';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showResult(message, type = 'info') {
      const results = document.getElementById('results');
      const div = document.createElement('div');
      div.className = `result-item ${type}`;
      div.innerHTML = message;
      results.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearResults() {
      document.getElementById('results').innerHTML = '';
    }

    async function verificarMigracion() {
      clearResults();
      showResult('Verificando migración...', 'info');

      try {
        const { data, error } = await supabase.rpc('exec_sql', {
          query: `
            SELECT
              column_name,
              data_type,
              is_nullable
            FROM information_schema.columns
            WHERE table_name = 'usuarios'
            AND column_name IN ('esquema_pago_id', 'regimen_fiscal_id')
            ORDER BY column_name;
          `
        });

        if (error) {
          showResult('⚠️ Usando consulta alternativa...', 'warning');

          const { data: usuarios, error: error2 } = await supabase
            .from('usuarios')
            .select('regimen_fiscal_id')
            .limit(1);

          if (error2) {
            showResult('❌ Error: El campo regimen_fiscal_id no existe aún', 'error');
          } else {
            showResult('✅ Migración exitosa! Campo regimen_fiscal_id existe en tabla usuarios', 'success');

            const { count } = await supabase
              .from('usuarios')
              .select('*', { count: 'exact', head: true })
              .not('regimen_fiscal_id', 'is', null);

            showResult(`📊 ${count} usuarios tienen régimen fiscal asignado`, 'info');
          }
        }

      } catch (error) {
        showResult(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    async function verificarUsuarios() {
      clearResults();
      showResult('Consultando usuarios...', 'info');

      try {
        const { data: usuarios, error } = await supabase
          .from('usuarios')
          .select(`
            id,
            nombre_completo,
            email_personal,
            regimen_fiscal_id,
            banco,
            clabe
          `)
          .not('regimen_fiscal_id', 'is', null)
          .limit(20);

        if (error) throw error;

        if (!usuarios || usuarios.length === 0) {
          showResult('⚠️ No se encontraron usuarios con régimen fiscal', 'warning');
          return;
        }

        const { data: regimenes } = await supabase
          .from('commission_fiscal_regimes')
          .select('*');

        const regimenesMap = new Map(regimenes?.map(r => [r.id, r]) || []);

        showResult(`✅ Encontrados ${usuarios.length} usuarios:`, 'success');

        const table = document.createElement('div');
        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Régimen Fiscal</th>
                <th>Banco</th>
              </tr>
            </thead>
            <tbody>
              ${usuarios.map(u => {
                const regimen = regimenesMap.get(u.regimen_fiscal_id);
                const badgeClass = regimen?.name.toLowerCase().includes('resico') ? 'resico' :
                                  regimen?.name.toLowerCase().includes('honorario') ? 'honorarios' : 'asimilados';
                return `
                  <tr>
                    <td>${u.nombre_completo || 'Sin nombre'}</td>
                    <td>${u.email_personal || 'Sin email'}</td>
                    <td>
                      <span class="badge ${badgeClass}">
                        ${regimen?.name || 'Sin régimen'}
                      </span>
                    </td>
                    <td>${u.banco || '-'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;

        document.getElementById('results').appendChild(table);

      } catch (error) {
        showResult(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    async function verificarRegimenes() {
      clearResults();
      showResult('Consultando regímenes fiscales...', 'info');

      try {
        const { data, error } = await supabase
          .from('commission_fiscal_regimes')
          .select('*')
          .order('name');

        if (error) throw error;

        if (!data || data.length === 0) {
          showResult('❌ No hay regímenes fiscales configurados', 'error');
          return;
        }

        showResult(`✅ Encontrados ${data.length} regímenes fiscales:`, 'success');

        const table = document.createElement('div');
        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Régimen</th>
                <th>ISR</th>
                <th>IVA Trasladado</th>
                <th>IVA Retenido</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(r => `
                <tr>
                  <td><strong>${r.name}</strong></td>
                  <td>${(r.isr * 100).toFixed(2)}%</td>
                  <td>${(r.iva_trasladado * 100).toFixed(2)}%</td>
                  <td>${(r.iva_retenido * 100).toFixed(2)}%</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        document.getElementById('results').appendChild(table);

      } catch (error) {
        showResult(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    async function sincronizarAgentes() {
      clearResults();
      showResult('Sincronizando agentes de comisiones...', 'info');

      try {
        const { data: usuarios, error: usuariosError } = await supabase
          .from('usuarios')
          .select('email_personal, email_laboral, regimen_fiscal_id, nombre_completo')
          .not('regimen_fiscal_id', 'is', null);

        if (usuariosError) throw usuariosError;

        showResult(`📊 Encontrados ${usuarios.length} usuarios con régimen fiscal`, 'info');

        const { data: agentes, error: agentesError } = await supabase
          .from('commission_agents')
          .select('*');

        if (agentesError) throw agentesError;

        showResult(`📊 Encontrados ${agentes.length} agentes de comisiones`, 'info');

        let actualizados = 0;
        let noEncontrados = 0;

        for (const agente of agentes) {
          const usuario = usuarios.find(u =>
            u.email_personal === agente.email || u.email_laboral === agente.email
          );

          if (usuario) {
            const { error } = await supabase
              .from('commission_agents')
              .update({
                fiscal_regime_id: usuario.regimen_fiscal_id,
                name: usuario.nombre_completo
              })
              .eq('id', agente.id);

            if (!error) {
              actualizados++;
              showResult(`✅ Sincronizado: ${agente.email}`, 'success');
            }
          } else {
            noEncontrados++;
            showResult(`⚠️ Usuario no encontrado para agente: ${agente.email}`, 'warning');
          }
        }

        showResult(`✅ Sincronización completada: ${actualizados} actualizados, ${noEncontrados} no encontrados`, 'success');

      } catch (error) {
        showResult(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }
  </script>
</body>
</html>

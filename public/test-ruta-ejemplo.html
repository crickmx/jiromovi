<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico: Ruta /ejemplo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 { color: #1a202c; margin-bottom: 10px; }
    h2 { color: #1a202c; margin: 30px 0 15px; font-size: 20px; }
    .step {
      background: #f8fafc;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      border-left: 4px solid #3b82f6;
    }
    .step h3 { color: #3b82f6; margin-bottom: 10px; font-size: 16px; }
    .status {
      padding: 12px 20px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: 600;
      display: inline-block;
    }
    .loading { background: #fef3c7; color: #92400e; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
    .info { background: #dbeafe; color: #1e40af; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      margin: 5px;
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-2px); }
    .btn.secondary { background: #64748b; }
    .btn.secondary:hover { background: #475569; }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 10px;
    }
    .warning {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .code {
      background: #1e293b;
      color: #e2e8f0;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🔍 Diagnóstico: app.movi.digital/ejemplo</h1>
      <p style="color: #64748b; margin-top: 10px;">Esta herramienta diagnostica por qué la página pública aparece en blanco</p>

      <div id="status-container"></div>

      <h2>📋 Pasos del Diagnóstico</h2>
      <div id="steps"></div>

      <h2>🎯 Acciones</h2>
      <a href="/ejemplo" class="btn" target="_blank">🔗 Abrir /ejemplo</a>
      <a href="/login" class="btn secondary" target="_blank">🔐 Ir a Login</a>
      <button onclick="runDiagnostics()" class="btn">🔄 Re-ejecutar Diagnóstico</button>
    </div>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3MjA5OTAsImV4cCI6MjA3NzI5Njk5MH0.bIlGsgeAC6oxGUalODg0C5-l6KaJip0wWa9IbQ7MjTQ';

    const stepsEl = document.getElementById('steps');
    const statusEl = document.getElementById('status-container');

    let allPassed = true;

    function addStep(title, status, details, code = null) {
      const step = document.createElement('div');
      step.className = 'step';

      const statusClass = status === 'success' ? '✅' : status === 'error' ? '❌' : status === 'warning' ? '⚠️' : 'ℹ️';

      step.innerHTML = `
        <h3>${statusClass} ${title}</h3>
        <p>${details}</p>
        ${code ? `<pre>${code}</pre>` : ''}
      `;

      stepsEl.appendChild(step);

      if (status === 'error') {
        allPassed = false;
      }
    }

    async function runDiagnostics() {
      stepsEl.innerHTML = '';
      allPassed = true;

      statusEl.innerHTML = '<div class="status loading">⏳ Ejecutando diagnóstico...</div>';

      // Paso 1: Verificar función RPC
      try {
        addStep('Paso 1: Llamar a la función RPC', 'info', 'Llamando a get_public_web_page_by_slug("ejemplo")...');

        const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_web_page_by_slug`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ p_slug: 'ejemplo' })
        });

        if (!response.ok) {
          const errorText = await response.text();
          addStep('Paso 1: Función RPC', 'error', `La función RPC falló con HTTP ${response.status}`, errorText);
        } else {
          const data = await response.json();

          if (!data) {
            addStep('Paso 1: Función RPC', 'error', 'La función devolvió null (el usuario no existe o no está publicado)');
          } else {
            addStep('Paso 1: Función RPC', 'success', `La función RPC funciona correctamente. Usuario: ${data.user?.name}`, JSON.stringify(data, null, 2));
          }
        }
      } catch (error) {
        addStep('Paso 1: Función RPC', 'error', `Error al llamar a la función: ${error.message}`);
      }

      // Paso 2: Verificar routing de React
      addStep('Paso 2: Routing de React', 'info', 'Verificando si la ruta /:slug está configurada...',
        'La ruta debe estar al final de todas las rutas en App.tsx:\n<Route path="/:slug" element={<PaginaPublicaAsesor />} />');

      // Paso 3: Verificar si hay sesión activa
      try {
        const sessionResponse = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (sessionResponse.ok) {
          const userData = await sessionResponse.json();
          if (userData && userData.id) {
            addStep('Paso 3: Sesión de Usuario', 'warning',
              'Hay una sesión activa. Esto NO debería afectar las páginas públicas, pero podrías probar en modo incógnito.',
              JSON.stringify(userData, null, 2));
          } else {
            addStep('Paso 3: Sesión de Usuario', 'success', 'No hay sesión activa (correcto para páginas públicas)');
          }
        } else {
          addStep('Paso 3: Sesión de Usuario', 'success', 'No hay sesión activa (correcto para páginas públicas)');
        }
      } catch (error) {
        addStep('Paso 3: Sesión de Usuario', 'warning', `No se pudo verificar la sesión: ${error.message}`);
      }

      // Paso 4: Verificar políticas RLS
      addStep('Paso 4: Políticas RLS', 'info',
        'Las políticas RLS deben permitir que anon lea usuarios publicados...',
        'Verificar en Supabase que existan políticas para:\n- usuarios (Public can view published user profiles)\n- user_web_pages (Public can view published web pages)\n- web_page_insurers (Public can view active insurers)\n- web_page_categories (Public can view active categories)');

      // Paso 5: Verificar que el usuario tenga página publicada
      try {
        const userCheckResponse = await fetch(
          `${SUPABASE_URL}/rest/v1/usuarios?select=id,nombre_completo,web_slug,estado,user_web_pages!inner(is_published)&web_slug=eq.ejemplo&user_web_pages.is_published=eq.true`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
              'Accept': 'application/json'
            }
          }
        );

        if (userCheckResponse.ok) {
          const users = await userCheckResponse.json();
          if (users && users.length > 0) {
            addStep('Paso 5: Usuario Publicado', 'success',
              `El usuario "ejemplo" existe y tiene página publicada.`,
              JSON.stringify(users[0], null, 2));
          } else {
            addStep('Paso 5: Usuario Publicado', 'error',
              'El usuario "ejemplo" NO existe o NO tiene página publicada. Este es el problema principal.');
          }
        } else {
          const errorText = await userCheckResponse.text();
          addStep('Paso 5: Usuario Publicado', 'error',
            `Error al verificar usuario: HTTP ${userCheckResponse.status}`,
            errorText);
        }
      } catch (error) {
        addStep('Paso 5: Usuario Publicado', 'error', `Error: ${error.message}`);
      }

      // Paso 6: Verificar build y deploy
      addStep('Paso 6: Build y Deploy', 'info',
        'Verificar que el último build se haya deployado correctamente...',
        'Ejecutar: npm run build\nVerificar que dist/ contenga:\n- index.html\n- 404.html (copia de index.html)\n- _redirects (para Netlify)');

      // Resumen final
      if (allPassed) {
        statusEl.innerHTML = '<div class="status success">✅ Todos los tests pasaron - La página debería funcionar</div>';
      } else {
        statusEl.innerHTML = '<div class="status error">❌ Se encontraron problemas - Revisar pasos arriba</div>';
      }
    }

    // Ejecutar automáticamente al cargar
    window.runDiagnostics = runDiagnostics;
    runDiagnostics();
  </script>
</body>
</html>

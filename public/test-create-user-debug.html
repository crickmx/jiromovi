<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug: Create User</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    .success { color: green; }
    .error { color: red; }
    input, select {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🔍 Debug: Create User Function</h1>

  <div>
    <h2>Datos del Usuario</h2>
    <label>Nombre:</label>
    <input type="text" id="nombre" value="Juan">

    <label>Apellidos:</label>
    <input type="text" id="apellidos" value="Pérez">

    <label>Email Laboral:</label>
    <input type="email" id="email" value="juan.perez@test.com">

    <label>Password:</label>
    <input type="password" id="password" value="TestPass123!">

    <label>Rol:</label>
    <select id="rol">
      <option value="Empleado">Empleado</option>
      <option value="Agente">Agente</option>
      <option value="Gerente">Gerente</option>
      <option value="Administrador">Administrador</option>
    </select>

    <label>Puesto:</label>
    <input type="text" id="puesto" value="Prueba">
  </div>

  <button onclick="testCreateUser()">Crear Usuario de Prueba</button>
  <button onclick="clearResults()">Limpiar Resultados</button>

  <h2>Resultado:</h2>
  <pre id="output">Esperando acción...</pre>

  <script>
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NDEyNDMsImV4cCI6MjA0NTExNzI0M30.NrTu2kfxHGKBzjU9R0YGUjAHJWOkDDc5Pzc0-WfpECo';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function log(message, isError = false) {
      const output = document.getElementById('output');
      const timestamp = new Date().toLocaleTimeString();
      const className = isError ? 'error' : 'success';
      output.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
    }

    function clearResults() {
      document.getElementById('output').innerHTML = 'Esperando acción...\n';
    }

    async function testCreateUser() {
      clearResults();
      log('=== INICIANDO TEST DE CREATE USER ===');

      try {
        // 1. Verificar sesión
        log('1. Verificando sesión...');
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          log(`❌ Error al obtener sesión: ${sessionError.message}`, true);
          return;
        }

        if (!session) {
          log('❌ No hay sesión activa. Por favor inicia sesión primero.', true);
          return;
        }

        log(`✅ Sesión activa para: ${session.user.email}`);

        // 2. Obtener datos del usuario actual
        log('2. Obteniendo datos del usuario actual...');
        const { data: currentUser, error: userError } = await supabase
          .from('usuarios')
          .select('id, rol, nombre, apellidos')
          .eq('id', session.user.id)
          .single();

        if (userError) {
          log(`❌ Error al obtener usuario: ${userError.message}`, true);
          return;
        }

        log(`✅ Usuario: ${currentUser.nombre} ${currentUser.apellidos} (${currentUser.rol})`);

        // 3. Preparar datos del nuevo usuario
        const userData = {
          nombre: document.getElementById('nombre').value,
          apellidos: document.getElementById('apellidos').value,
          email_laboral: document.getElementById('email').value,
          rol: document.getElementById('rol').value,
          puesto: document.getElementById('puesto').value,
          oficina_id: null,
          fecha_nacimiento: null,
          fecha_ingreso: null,
          celular_personal: '',
          email_personal: '',
          celular_laboral: '',
          extension_telefonica: '',
          web_slug: null,
          regimen_fiscal_id: null,
          banco: '',
          clabe: '',
          dias_vacaciones_disponibles: 15,
        };

        const password = document.getElementById('password').value;

        log('3. Datos preparados:');
        log(JSON.stringify({ password: '***', userData }, null, 2));

        // 4. Llamar a la función edge
        log('4. Llamando a create-user...');
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/create-user`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ password, userData }),
          }
        );

        log(`Status: ${response.status} ${response.statusText}`);

        // 5. Procesar respuesta
        const result = await response.json();

        if (!response.ok) {
          log('❌ ERROR EN LA RESPUESTA:', true);
          log(JSON.stringify(result, null, 2), true);

          // Intentar obtener más detalles
          const headers = {};
          response.headers.forEach((value, key) => {
            headers[key] = value;
          });
          log('Headers de respuesta:', true);
          log(JSON.stringify(headers, null, 2), true);
        } else {
          log('✅ USUARIO CREADO EXITOSAMENTE:');
          log(JSON.stringify(result, null, 2));

          // 6. Verificar que el usuario se creó en la base de datos
          log('5. Verificando usuario en base de datos...');
          const { data: newUser, error: checkError } = await supabase
            .from('usuarios')
            .select('*')
            .eq('id', result.userId)
            .single();

          if (checkError) {
            log(`❌ Error al verificar usuario: ${checkError.message}`, true);
          } else {
            log('✅ Usuario encontrado en base de datos:');
            log(JSON.stringify(newUser, null, 2));

            // Limpiar usuario de prueba
            log('6. Limpiando usuario de prueba...');
            const { error: deleteError } = await supabase.rpc('safe_delete_user', {
              target_user_id: result.userId
            });

            if (deleteError) {
              log(`⚠️ No se pudo eliminar el usuario de prueba: ${deleteError.message}`);
            } else {
              log('✅ Usuario de prueba eliminado');
            }
          }
        }

      } catch (error) {
        log(`❌ EXCEPCIÓN CAPTURADA: ${error.message}`, true);
        log(`Stack trace: ${error.stack}`, true);
      }

      log('=== TEST FINALIZADO ===');
    }
  </script>
</body>
</html>

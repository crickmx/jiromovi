<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Asistente Simple</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
    .result { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .success { background: #d4edda; }
    .error { background: #f8d7da; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 10px 0; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>🧪 Test Asistente - Diagnóstico Simple</h1>

  <div>
    <label>Email: <input type="text" id="email" value="test@test.com" style="padding: 5px; width: 300px;"></label><br><br>
    <label>Password: <input type="password" id="password" value="test123456" style="padding: 5px; width: 300px;"></label><br><br>
    <label>Mensaje: <input type="text" id="mensaje" value="¿Cuánto he ganado este mes?" style="padding: 5px; width: 300px;"></label><br><br>
    <button onclick="testAssistant()">Probar Asistente</button>
  </div>

  <div id="result"></div>

  <script>
    const SUPABASE_URL = 'https://qhwvuuyjhcennqccgvse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFod3Z1dXlqaGNlbm5xY2NndnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NTc3NzYsImV4cCI6MjA0NTEzMzc3Nn0.7SviNfSb-JKqV6v8p-kM9hF5GEnr1iPu0hKkwOW77CA';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function testAssistant() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<p>Ejecutando prueba...</p>';

      try {
        // 1. Login
        console.log('1. Login...');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (authError) throw new Error(`Login failed: ${authError.message}`);
        console.log('✓ Login OK');

        // 2. Get or create conversation
        console.log('2. Get/Create conversation...');
        let conversation;

        const { data: existingConv } = await supabase
          .from('conversaciones_chatgpt')
          .select('*')
          .eq('usuario_id', authData.user.id)
          .eq('es_asistente', true)
          .order('updated_at', { ascending: false })
          .limit(1)
          .maybeSingle();

        if (existingConv) {
          conversation = existingConv;
          console.log('✓ Using existing conversation:', conversation.id);
        } else {
          const { data: newConv, error: convError } = await supabase
            .from('conversaciones_chatgpt')
            .insert({
              usuario_id: authData.user.id,
              titulo: 'Test Simple',
              es_asistente: true,
              modulo_origen: 'dashboard'
            })
            .select()
            .single();

          if (convError) throw new Error(`Create conversation failed: ${convError.message}`);
          conversation = newConv;
          console.log('✓ New conversation created:', conversation.id);
        }

        // 3. Send message to edge function
        console.log('3. Sending message to edge function...');
        const mensaje = document.getElementById('mensaje').value;

        const requestBody = {
          conversacion_id: conversation.id,
          mensaje: mensaje,
          modulo: 'dashboard',
          ruta: '/dashboard',
          parametros: {}
        };

        console.log('Request body:', requestBody);

        const { data, error } = await supabase.functions.invoke('assistant-send-message', {
          body: requestBody
        });

        if (error) {
          console.error('Edge function error:', error);
          throw new Error(`Edge function error: ${error.message}\n${JSON.stringify(error, null, 2)}`);
        }

        console.log('✓ Edge function response:', data);

        // Success
        resultDiv.innerHTML = `
          <div class="result success">
            <h3>✅ Prueba exitosa</h3>
            <p><strong>Conversación ID:</strong> ${data.conversacion_id}</p>
            <p><strong>Mensaje ID:</strong> ${data.mensaje_id}</p>
            <p><strong>Respuesta:</strong></p>
            <pre>${data.respuesta}</pre>
            <p><strong>Respuesta estructurada:</strong></p>
            <pre>${JSON.stringify(data.respuesta_estructurada, null, 2)}</pre>
          </div>
        `;

      } catch (error) {
        console.error('Test failed:', error);
        resultDiv.innerHTML = `
          <div class="result error">
            <h3>❌ Error en la prueba</h3>
            <p><strong>Error:</strong> ${error.message}</p>
            <p><strong>Stack:</strong></p>
            <pre>${error.stack || 'No stack available'}</pre>
          </div>
        `;
      }
    }
  </script>
</body>
</html>

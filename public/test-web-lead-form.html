<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Formulario Web Lead</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0066cc;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #0052a3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        .result h3 {
            margin-top: 0;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test - Formulario Web Lead</h1>
        <p class="subtitle">Prueba el sistema de generación de leads desde Mi Página Web</p>

        <div class="info">
            <strong>Instrucciones:</strong><br>
            1. Ingresa un slug válido de un usuario (ej: "movi" si existe)<br>
            2. Completa todos los campos<br>
            3. Haz clic en "Enviar Lead"<br>
            4. Verifica que se creó el contacto y la tarea en el CRM
        </div>

        <form id="leadForm">
            <div class="form-group">
                <label for="slug">Slug del Agente *</label>
                <input type="text" id="slug" required placeholder="ej: movi">
            </div>

            <div class="form-group">
                <label for="nombre">Nombre Completo *</label>
                <input type="text" id="nombre" required placeholder="Juan Pérez">
            </div>

            <div class="form-group">
                <label for="celular">Celular *</label>
                <input type="tel" id="celular" required placeholder="55 1234 5678">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required placeholder="juan@example.com">
            </div>

            <div class="form-group">
                <label for="seguro_interes">Seguro de Interés *</label>
                <select id="seguro_interes" required>
                    <option value="">Selecciona un seguro</option>
                    <option value="Autos">Autos</option>
                    <option value="Gastos Médicos Mayores">Gastos Médicos Mayores</option>
                    <option value="Vida">Vida</option>
                    <option value="Daños">Daños</option>
                    <option value="Ahorro">Ahorro</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Enviar Lead</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://kuiddbhsjfxbvyebvxdc.supabase.co';

        const form = document.getElementById('leadForm');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                slug: document.getElementById('slug').value.trim(),
                nombre: document.getElementById('nombre').value.trim(),
                celular: document.getElementById('celular').value.trim(),
                email: document.getElementById('email').value.trim(),
                seguro_interes: document.getElementById('seguro_interes').value
            };

            console.log('📤 Enviando lead:', formData);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/submit-web-lead`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                console.log('📥 Respuesta:', data);

                if (response.ok && data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Lead Enviado Correctamente</h3>
                        <p><strong>Contacto ID:</strong> ${data.contactId}</p>
                        <p><strong>Mensaje:</strong> ${data.message}</p>
                        <p>✔️ Contacto creado en el CRM<br>
                        ✔️ Tarea de seguimiento creada<br>
                        ✔️ Notificaciones enviadas (campanita, email, WhatsApp)</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    form.reset();
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Error al Enviar Lead</h3>
                        <p><strong>Error:</strong> ${data.error || 'Error desconocido'}</p>
                        ${data.details ? `<p><strong>Detalles:</strong> ${data.details}</p>` : ''}
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('❌ Error:', error);
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Error de Conexión</h3>
                    <p>${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Lead';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Listar Videos y Thumbnails - Seguros Education</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Listar Videos y Thumbnails - Seguros Education</h1>
  <button onclick="listFiles()">Listar Archivos</button>
  <div id="output"></div>

  <script>
    const supabaseUrl = 'https://lcsjaejpenwecoitbthb.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxjc2phZWpwZW53ZWNvaXRidGhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk1NjA2OTIsImV4cCI6MjA0NTEzNjY5Mn0.oFKP1lK8LRr4HMVhDYgGwf2-sqgMu8qZWD74Xrz9Oqo';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function listFiles() {
      const output = document.getElementById('output');
      output.innerHTML = '<p>Listando archivos...</p>';

      try {
        // Listar videos
        const { data: videos, error: videosError } = await supabase
          .storage
          .from('videos-seguros-education')
          .list('', { limit: 1000, sortBy: { column: 'name', order: 'asc' } });

        if (videosError) {
          output.innerHTML += `<p style="color: red;">Error videos: ${videosError.message}</p>`;
        } else {
          output.innerHTML += `<h2>Videos (${videos.length}):</h2>`;
          output.innerHTML += '<ul>';
          videos.forEach(file => {
            output.innerHTML += `<li>${file.name} (${(file.metadata?.size / 1024 / 1024).toFixed(2)} MB)</li>`;
          });
          output.innerHTML += '</ul>';
          console.log('Videos:', videos);
        }

        // Listar thumbnails
        const { data: thumbnails, error: thumbnailsError } = await supabase
          .storage
          .from('thumbnails-seguros-education')
          .list('', { limit: 1000, sortBy: { column: 'name', order: 'asc' } });

        if (thumbnailsError) {
          output.innerHTML += `<p style="color: red;">Error thumbnails: ${thumbnailsError.message}</p>`;
        } else {
          output.innerHTML += `<h2>Thumbnails (${thumbnails.length}):</h2>`;
          output.innerHTML += '<ul>';
          thumbnails.forEach(file => {
            output.innerHTML += `<li>${file.name}</li>`;
          });
          output.innerHTML += '</ul>';
          console.log('Thumbnails:', thumbnails);
        }

        // Generar JSON para matching
        const matching = videos.map(video => {
          const videoBase = video.name.replace(/\.[^/.]+$/, ''); // Remove extension
          const matchingThumbnail = thumbnails.find(thumb => {
            const thumbBase = thumb.name.replace(/\.[^/.]+$/, '');
            return thumbBase.toLowerCase() === videoBase.toLowerCase();
          });

          return {
            video: video.name,
            thumbnail: matchingThumbnail ? matchingThumbnail.name : null,
            videoUrl: `${supabaseUrl}/storage/v1/object/public/videos-seguros-education/${video.name}`,
            thumbnailUrl: matchingThumbnail
              ? `${supabaseUrl}/storage/v1/object/public/thumbnails-seguros-education/${matchingThumbnail.name}`
              : null
          };
        });

        output.innerHTML += '<h2>Matching:</h2>';
        output.innerHTML += '<pre>' + JSON.stringify(matching, null, 2) + '</pre>';
        console.log('Matching:', matching);

      } catch (error) {
        output.innerHTML += `<p style="color: red;">Error: ${error.message}</p>`;
        console.error('Error:', error);
      }
    }
  </script>
</body>
</html>

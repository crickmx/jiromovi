<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Directo - MOVI Digital</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo img {
      height: 64px;
      object-fit: contain;
    }

    h1 {
      text-align: center;
      color: #1a202c;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      font-size: 16px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #2d3748;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.2s;
      background: #f7fafc;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.5;
    }

    .alert-error {
      background: #fed7d7;
      border: 1px solid #fc8181;
      color: #742a2a;
    }

    .alert-success {
      background: #c6f6d5;
      border: 1px solid #9ae6b4;
      color: #22543d;
    }

    .alert-info {
      background: #bee3f8;
      border: 1px solid #90cdf4;
      color: #2c5282;
    }

    .diagnostic {
      margin-top: 32px;
      padding: 20px;
      background: #f7fafc;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
    }

    .diagnostic h3 {
      color: #2d3748;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .diagnostic-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
    }

    .diagnostic-item:last-child {
      border-bottom: none;
    }

    .diagnostic-label {
      color: #718096;
      font-weight: 500;
    }

    .diagnostic-value {
      color: #2d3748;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }

    .status-ok {
      color: #38a169;
      font-weight: 600;
    }

    .status-error {
      color: #e53e3e;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: #a0aec0;
      font-size: 13px;
    }

    .quick-login {
      margin-top: 16px;
      padding: 16px;
      background: #edf2f7;
      border-radius: 12px;
      border: 2px dashed #cbd5e0;
    }

    .quick-login p {
      margin: 0 0 12px 0;
      color: #4a5568;
      font-size: 13px;
      font-weight: 600;
    }

    .quick-login button {
      background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
      box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
      margin-top: 8px;
    }

    .quick-login button:hover {
      box-shadow: 0 6px 20px rgba(72, 187, 120, 0.5);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://movi.digital/wp-content/uploads/2023/06/cropped-logonew.png" alt="MOVI Digital">
    </div>

    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresa a tu cuenta para continuar</p>

    <div id="alerts"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-Mail Laboral</label>
        <input
          type="email"
          id="email"
          placeholder="nombre@jiro.mx"
          value="test@jiro.mx"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" id="loginBtn">Iniciar Sesión</button>
    </form>

    <div class="quick-login">
      <p>🧪 Usuario de Prueba</p>
      <div style="font-size: 12px; color: #718096; margin-bottom: 8px;">
        Email: <code style="background: white; padding: 2px 6px; border-radius: 4px; color: #2d3748;">test@jiro.mx</code><br>
        Password: <code style="background: white; padding: 2px 6px; border-radius: 4px; color: #2d3748;">Test123456!</code>
      </div>
      <button type="button" onclick="loginQuick()">Login Rápido con Usuario de Prueba</button>
    </div>

    <div class="diagnostic">
      <h3>📊 Estado del Sistema</h3>
      <div class="diagnostic-item">
        <span class="diagnostic-label">Origen:</span>
        <span class="diagnostic-value" id="origin">-</span>
      </div>
      <div class="diagnostic-item">
        <span class="diagnostic-label">Supabase URL:</span>
        <span class="diagnostic-value" id="supabaseUrl">-</span>
      </div>
      <div class="diagnostic-item">
        <span class="diagnostic-label">Cliente:</span>
        <span class="diagnostic-value" id="clientStatus">-</span>
      </div>
      <div class="diagnostic-item">
        <span class="diagnostic-label">Conexión:</span>
        <span class="diagnostic-value" id="connectionStatus">Probando...</span>
      </div>
    </div>

    <p class="footer">Intranet JIRO by MOVI Digital</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://akkbisolbjkusbuihrad.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFra2Jpc29sYmprdXNidWlocmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwNzkwNDAsImV4cCI6MjA3NjY1NTA0MH0.iJf04oJv0ERuyWyY0gLpd7ntP6bITJ8LWxGFKJNSLvQ';

    let supabase;

    function showAlert(message, type = 'info') {
      const alerts = document.getElementById('alerts');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      alerts.innerHTML = '';
      alerts.appendChild(alert);

      setTimeout(() => {
        alert.style.transition = 'opacity 0.3s';
        alert.style.opacity = '0';
        setTimeout(() => alert.remove(), 300);
      }, 5000);
    }

    function updateDiagnostic() {
      document.getElementById('origin').textContent = window.location.origin;
      document.getElementById('supabaseUrl').textContent = SUPABASE_URL;
    }

    async function initSupabase() {
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            autoRefreshToken: true,
            persistSession: true,
            detectSessionInUrl: true,
            storage: window.localStorage,
            storageKey: 'movi-auth-directo',
          }
        });

        document.getElementById('clientStatus').innerHTML = '<span class="status-ok">✓ Inicializado</span>';

        const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (response.ok) {
          document.getElementById('connectionStatus').innerHTML = '<span class="status-ok">✓ Conectado</span>';
          showAlert('Sistema listo. Puedes iniciar sesión.', 'success');
        } else {
          document.getElementById('connectionStatus').innerHTML = '<span class="status-error">✗ Error ' + response.status + '</span>';
          showAlert('Hay un problema de conexión con Supabase', 'error');
        }
      } catch (error) {
        document.getElementById('clientStatus').innerHTML = '<span class="status-error">✗ Error</span>';
        document.getElementById('connectionStatus').innerHTML = '<span class="status-error">✗ Sin conexión</span>';
        showAlert('Error al inicializar: ' + error.message, 'error');
      }
    }

    async function loginQuick() {
      document.getElementById('email').value = 'test@jiro.mx';
      document.getElementById('password').value = 'Test123456!';
      showAlert('Credenciales de prueba cargadas. Click en Iniciar Sesión.', 'info');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Iniciando sesión...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error('Error de login:', error);

          if (error.message.includes('Invalid login credentials')) {
            showAlert('Credenciales incorrectas. Verifica tu email y contraseña.', 'error');
          } else if (error.message.includes('Email not confirmed')) {
            showAlert('Debes confirmar tu correo electrónico primero.', 'error');
          } else {
            showAlert(`Error: ${error.message}`, 'error');
          }

          loginBtn.disabled = false;
          loginBtn.textContent = 'Iniciar Sesión';
          return;
        }

        showAlert('¡Login exitoso! Verificando usuario...', 'success');

        const { data: usuario, error: usuarioError } = await supabase
          .from('usuarios')
          .select('*')
          .eq('id', data.user.id)
          .eq('activo', true)
          .maybeSingle();

        if (usuarioError || !usuario) {
          showAlert('Usuario no encontrado en la base de datos.', 'error');
          await supabase.auth.signOut();
          loginBtn.disabled = false;
          loginBtn.textContent = 'Iniciar Sesión';
          return;
        }

        showAlert(`¡Bienvenido ${usuario.nombre}! Redirigiendo...`, 'success');

        setTimeout(() => {
          window.location.href = '/';
        }, 1500);

      } catch (error) {
        console.error('Error inesperado:', error);
        showAlert('Error inesperado: ' + error.message, 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Iniciar Sesión';
      }
    });

    updateDiagnostic();
    initSupabase();

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      showAlert('Ya tienes una sesión activa. Redirigiendo...', 'info');
      setTimeout(() => {
        window.location.href = '/';
      }, 1500);
    }
  </script>
</body>
</html>

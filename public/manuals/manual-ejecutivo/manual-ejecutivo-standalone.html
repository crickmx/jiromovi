  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"utf-8\">\n<title>JIRO · Manual Corporativo Ejecutivo<\u002Ftitle>\n<style>/* ============================================================\n   JIRO · Manuals internos — Sistema editorial\n   Print: 8.5\" × 11\" (Letter, US). Screen: scaled with margin.\n   ============================================================ */\n/* ============================================================\n   JIRO SEGUROS — Color & Type tokens\n   Brand: JIRO y Asociados, Agente de Seguros y Fianzas\n   ============================================================ */\n\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"18b71f1d-2e86-43eb-b3ad-f500ab59261f\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"2dcfa323-a5f3-492f-a0ac-e85302eca77f\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* -------- Brand palette (raw) -------- */\n  --jiro-blue:      #164281;  /* primary brand */\n  --jiro-navy:      #121A2D;  /* text / deep ink */\n  --jiro-cream:     #E2E1CC;  /* warm light backdrop */\n  --jiro-yellow:    #FFD62B;\n  --jiro-green:     #93C01F;\n  --jiro-orange:    #F4AD0F;\n  --jiro-mint:      #59D1AF;\n\n  /* Tints / shades derived in oklch-space for harmony */\n  --jiro-blue-700:  #0F305E;\n  --jiro-blue-500:  #164281;\n  --jiro-blue-300:  #6E8EBE;\n  --jiro-blue-100:  #DCE6F3;\n\n  --jiro-cream-200: #F2F1E2;\n  --jiro-cream-100: #F8F7EE;\n\n  /* -------- Semantic surfaces -------- */\n  --bg:             #FFFFFF;\n  --bg-soft:        var(--jiro-cream-100);\n  --bg-warm:        var(--jiro-cream);\n  --bg-inverse:     var(--jiro-navy);\n  --bg-brand:       var(--jiro-blue);\n\n  /* -------- Foreground / text -------- */\n  --fg:             var(--jiro-navy);\n  --fg-muted:       #4A546A;\n  --fg-soft:        #7A8298;\n  --fg-on-brand:    #FFFFFF;\n  --fg-on-cream:    var(--jiro-navy);\n  --fg-link:        var(--jiro-blue);\n\n  /* -------- Borders / dividers -------- */\n  --border:         #E4E6EE;\n  --border-strong:  #C9CDDB;\n  --border-on-dark: rgba(255,255,255,0.14);\n\n  /* -------- Categorical / product accents --\n     Used for the colored-block iconography. Each ramo\n     (line of insurance) gets one of the four accents. -- */\n  --accent-yellow:  var(--jiro-yellow);   /* Autos */\n  --accent-green:   var(--jiro-green);    /* Vida / Salud */\n  --accent-orange:  var(--jiro-orange);   /* Hogar / Empresarial */\n  --accent-mint:    var(--jiro-mint);     /* Fianzas / Ahorro */\n\n  /* -------- Status (derived from accents) -------- */\n  --status-success: var(--jiro-green);\n  --status-warning: var(--jiro-orange);\n  --status-info:    var(--jiro-blue);\n  --status-danger:  #D64545;\n\n  /* -------- Radius -------- */\n  --radius-xs:      6px;\n  --radius-sm:      10px;\n  --radius-md:      14px;\n  --radius-lg:      20px;\n  --radius-xl:      28px;\n  --radius-pill:    999px;\n  --radius-block:   18px; /* canonical block-icon radius */\n\n  /* -------- Shadow -------- */\n  --shadow-xs:      0 1px 2px rgba(18, 26, 45, 0.06);\n  --shadow-sm:      0 2px 6px rgba(18, 26, 45, 0.07);\n  --shadow-md:      0 8px 24px -8px rgba(18, 26, 45, 0.16);\n  --shadow-lg:      0 20px 48px -16px rgba(18, 26, 45, 0.22);\n  --shadow-block:   0 6px 0 0 rgba(18, 26, 45, 0.08); /* offset card shadow, paleta-style */\n\n  /* -------- Spacing scale (4pt) -------- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* -------- Type tokens -------- */\n  --font-sans:    \"Gotham\", \"Montserrat\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-display: \"Gotham\", \"Montserrat\", system-ui, sans-serif;\n\n  --fw-book:    400;\n  --fw-bold:    700;\n\n  /* Type scale — display heavy, body comfortable */\n  --fs-display-xl: clamp(56px, 7vw, 96px);\n  --fs-display:    clamp(44px, 5.4vw, 72px);\n  --fs-h1:         clamp(36px, 4vw, 52px);\n  --fs-h2:         clamp(28px, 3vw, 38px);\n  --fs-h3:         24px;\n  --fs-h4:         20px;\n  --fs-body-lg:    18px;\n  --fs-body:       16px;\n  --fs-body-sm:    14px;\n  --fs-caption:    12px;\n  --fs-eyebrow:    12px;\n\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-normal:  1.5;\n  --lh-relaxed: 1.65;\n\n  --tracking-tight:   -0.02em;\n  --tracking-normal:  0;\n  --tracking-wide:    0.06em;\n  --tracking-eyebrow: 0.14em;\n}\n\n/* ============================================================\n   Semantic element styles\n   ============================================================ */\n\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--fg);\n  background: var(--bg);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.display-xl,\nh1.display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-display-xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--jiro-navy);\n}\n\nh1 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-h1);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--jiro-navy);\n}\n\nh2 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-h2);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-tight);\n  color: var(--jiro-navy);\n}\n\nh3 {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-h3);\n  line-height: var(--lh-snug);\n  color: var(--jiro-navy);\n}\n\nh4, .h4 {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-h4);\n  line-height: var(--lh-snug);\n  color: var(--jiro-navy);\n}\n\np, .body {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-book);\n  font-size: var(--fs-body);\n  line-height: var(--lh-relaxed);\n  color: var(--fg);\n}\n\n.body-lg { font-size: var(--fs-body-lg); line-height: var(--lh-relaxed); }\n.body-sm { font-size: var(--fs-body-sm); line-height: var(--lh-normal); }\n.caption { font-size: var(--fs-caption); color: var(--fg-muted); }\n\n.eyebrow {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-eyebrow);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--jiro-blue);\n}\n\na {\n  color: var(--fg-link);\n  text-decoration: none;\n  border-bottom: 1px solid currentColor;\n  transition: color .15s ease;\n}\na:hover { color: var(--jiro-blue-700); }\n\nstrong, b { font-weight: var(--fw-bold); }\n\n\n* { box-sizing: border-box; }\n\n/* ---------- Page frame ---------- */\n:root {\n  --page-w: 8.5in;\n  --page-h: 11in;\n  --margin-x: 0.6in;\n  --margin-y: 0.7in;\n  --col-gap: 0.3in;\n  --body-fs: 10.5pt;\n}\n\nhtml, body { margin: 0; padding: 0; background: #ECEEF5; font-family: var(--font-sans); color: var(--jiro-navy); }\n\n.doc {\n  display: flex; flex-direction: column; align-items: center; gap: 28px;\n  padding: 40px 20px 80px;\n}\n\n.page {\n  width: var(--page-w);\n  height: var(--page-h);\n  background: #fff;\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 18px 40px -16px rgba(18,26,45,.25);\n  page-break-after: always;\n  break-after: page;\n  color: var(--jiro-navy);\n  font-size: var(--body-fs);\n  line-height: 1.55;\n}\n\n/* ---------- Watermark icon (subtle, content-related) ---------- */\n.page[data-wm]::before {\n  content: \"\";\n  position: absolute;\n  right: -0.4in; bottom: -0.6in;\n  width: 5.5in; height: 5.5in;\n  background: currentColor;\n  -webkit-mask-position: center; mask-position: center;\n  -webkit-mask-size: contain; mask-size: contain;\n  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;\n  opacity: 0.045;\n  pointer-events: none;\n  z-index: 0;\n}\n.page[data-wm=\"flag\"]::before    { -webkit-mask-image: url(\"783149cb-0886-4a5d-b314-eb59a479c000\");    mask-image: url(\"783149cb-0886-4a5d-b314-eb59a479c000\"); }\n.page[data-wm=\"gears\"]::before   { -webkit-mask-image: url(\"2f768aeb-1102-475c-8707-e208eae96101\");           mask-image: url(\"2f768aeb-1102-475c-8707-e208eae96101\"); }\n.page[data-wm=\"clock\"]::before   { -webkit-mask-image: url(\"2763c802-00f9-45f7-85e7-23b51ef5731a\");      mask-image: url(\"2763c802-00f9-45f7-85e7-23b51ef5731a\"); }\n.page[data-wm=\"chat\"]::before    { -webkit-mask-image: url(\"342d58df-7866-4325-bca1-e0326876c3db\");   mask-image: url(\"342d58df-7866-4325-bca1-e0326876c3db\"); }\n.page[data-wm=\"car\"]::before     { -webkit-mask-image: url(\"fa9ad1be-60d5-417b-bb77-bc486c73e6a1\");           mask-image: url(\"fa9ad1be-60d5-417b-bb77-bc486c73e6a1\"); }\n.page[data-wm=\"health\"]::before  { -webkit-mask-image: url(\"5796adc9-8c05-4e04-9c6b-93d221b4596f\");   mask-image: url(\"5796adc9-8c05-4e04-9c6b-93d221b4596f\"); }\n.page[data-wm=\"home\"]::before    { -webkit-mask-image: url(\"67456b01-fb66-438b-b2d6-22df5cc0d752\");          mask-image: url(\"67456b01-fb66-438b-b2d6-22df5cc0d752\"); }\n.page[data-wm=\"building\"]::before{ -webkit-mask-image: url(\"20fdbe6e-7b3f-4ad9-80d0-7d9f5344485f\");          mask-image: url(\"20fdbe6e-7b3f-4ad9-80d0-7d9f5344485f\"); }\n.page[data-wm=\"box\"]::before     { -webkit-mask-image: url(\"5ad50557-1752-4b92-b184-e0c93e93a99b\");          mask-image: url(\"5ad50557-1752-4b92-b184-e0c93e93a99b\"); }\n.page[data-wm=\"eye\"]::before     { -webkit-mask-image: url(\"81d68a9c-e7ea-4929-81a3-4fa55c1d3b50\");           mask-image: url(\"81d68a9c-e7ea-4929-81a3-4fa55c1d3b50\"); }\n.page[data-wm=\"doc\"]::before     { -webkit-mask-image: url(\"796ee923-d54c-4fb0-8ede-4538784ac867\");     mask-image: url(\"796ee923-d54c-4fb0-8ede-4538784ac867\"); }\n.page > * { position: relative; z-index: 1; }\n\n@media print {\n  html, body { background: #fff; }\n  .doc { padding: 0; gap: 0; }\n  .page { box-shadow: none; }\n  .page-jumper { display: none; }\n}\n\n/* ---------- Page chrome (running header/footer) ---------- */\n.page .chrome-top {\n  position: absolute; top: 0.4in; left: var(--margin-x); right: var(--margin-x);\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 8.5pt; font-weight: 700; color: var(--fg-soft);\n  letter-spacing: .08em; text-transform: uppercase;\n}\n.page .chrome-top .mark {\n  width: 14px; height: 14px; background: var(--jiro-navy);\n  -webkit-mask: url(\"4dc2fd76-3978-4cab-a37b-9c69675fba54\") center/contain no-repeat;\n          mask: url(\"4dc2fd76-3978-4cab-a37b-9c69675fba54\") center/contain no-repeat;\n  /* placeholder triangle */\n}\n.page .chrome-bot {\n  position: absolute; bottom: 0.4in; left: var(--margin-x); right: var(--margin-x);\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 8.5pt; font-weight: 700; color: var(--fg-soft);\n}\n.page .chrome-bot .page-no { font-family: var(--font-display); font-size: 11pt; color: var(--jiro-navy); }\n.page .chrome-bot .crumb { letter-spacing: .08em; text-transform: uppercase; }\n\n/* Side ribbon (chapter color tab on outer edge) */\n.page .side-ribbon {\n  position: absolute; top: 0; bottom: 0; right: 0; width: 0.32in;\n  background: var(--jiro-blue);\n}\n.page .side-ribbon .label {\n  position: absolute; top: 50%; left: 50%;\n  transform: translate(-50%, -50%) rotate(90deg);\n  white-space: nowrap;\n  font-weight: 700; letter-spacing: .14em; text-transform: uppercase;\n  font-size: 9pt; color: #fff;\n}\n\n/* Chapter color variants */\n.ch-yellow .side-ribbon { background: var(--jiro-yellow); }\n.ch-yellow .side-ribbon .label { color: var(--jiro-navy); }\n.ch-green  .side-ribbon { background: var(--jiro-green); }\n.ch-orange .side-ribbon { background: var(--jiro-orange); }\n.ch-mint   .side-ribbon { background: var(--jiro-mint); }\n.ch-mint   .side-ribbon .label { color: var(--jiro-navy); }\n\n/* ---------- Content area ---------- */\n.content {\n  position: absolute;\n  top: 0.95in; bottom: 0.95in;\n  left: var(--margin-x); right: calc(var(--margin-x) + 0.18in);\n}\n\n/* ---------- Type ---------- */\n.eyebrow {\n  font-family: var(--font-sans); font-weight: 700; font-size: 8.5pt;\n  letter-spacing: .14em; text-transform: uppercase;\n  color: var(--jiro-blue); margin: 0 0 10px;\n}\n.h-display {\n  font-family: var(--font-display); font-weight: 700;\n  font-size: 56pt; line-height: .95; letter-spacing: -.02em;\n  margin: 0; color: var(--jiro-navy);\n}\n.h-1 {\n  font-family: var(--font-display); font-weight: 700;\n  font-size: 30pt; line-height: 1.02; letter-spacing: -.015em;\n  margin: 0 0 14pt; color: var(--jiro-navy);\n}\n.h-2 {\n  font-family: var(--font-display); font-weight: 700;\n  font-size: 18pt; line-height: 1.1; letter-spacing: -.01em;\n  margin: 0 0 8pt; color: var(--jiro-navy);\n}\n.h-3 {\n  font-family: var(--font-sans); font-weight: 700; font-size: 12pt;\n  margin: 0 0 6pt; color: var(--jiro-navy);\n}\n.lead {\n  font-size: 13pt; line-height: 1.5; color: var(--fg-muted); margin: 0 0 16pt;\n  max-width: 36em;\n}\np { margin: 0 0 8pt; }\n.body-sm { font-size: 9.5pt; color: var(--fg-muted); }\n\n/* ---------- Cover ---------- */\n.cover {\n  width: 100%; height: 100%; position: relative;\n  background: var(--jiro-yellow); color: var(--jiro-navy);\n  display: flex; flex-direction: column; padding: 0.7in 0.7in;\n}\n.cover .topline { display: flex; justify-content: space-between; align-items: center; }\n.cover .topline .logo { height: 0.42in; }\n.cover .topline .meta { font-size: 9pt; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }\n.cover .stack { margin-top: auto; }\n.cover h1 {\n  font-family: var(--font-display); font-weight: 700;\n  font-size: 72pt; line-height: .92; letter-spacing: -.025em;\n  margin: 0 0 0.3in; text-transform: uppercase;\n}\n.cover h1 .chip {\n  background: var(--jiro-cream-100); padding: 0 18pt 4pt; border-radius: 6pt;\n  display: inline-block;\n}\n.cover .kicker { font-size: 14pt; font-weight: 400; max-width: 30ch; line-height: 1.3; margin: 0 0 0.4in; }\n.cover .footline { display: flex; justify-content: space-between; align-items: flex-end; gap: 32pt; }\n.cover .footline .version {\n  font-family: var(--font-display); font-size: 18pt; font-weight: 700; letter-spacing: -.01em;\n}\n.cover .footline .small {\n  font-size: 8.5pt; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;\n  text-align: left; line-height: 1.5;\n}\n.cover .deco-circle {\n  position: absolute; right: -3in; top: -2.2in; width: 8in; height: 8in;\n  border-radius: 50%; background: rgba(255,255,255,.18);\n}\n\n/* ---------- Welcome page ---------- */\n.welcome .hero-block {\n  background: var(--jiro-blue); color: #fff;\n  border-radius: 18pt; padding: 30pt 32pt;\n  margin-bottom: 20pt;\n}\n.welcome .hero-block h2 {\n  font-family: var(--font-display); font-weight: 700; font-size: 28pt; line-height: 1.05;\n  letter-spacing: -.015em; margin: 0 0 10pt; color: #fff;\n}\n.welcome .hero-block p { color: rgba(255,255,255,.85); max-width: 32em; margin: 0; font-size: 12pt; }\n\n.welcome .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12pt; margin-top: 12pt; }\n.welcome .pillar {\n  background: var(--jiro-cream-100); border-radius: 14pt; padding: 18pt;\n}\n.welcome .pillar .block-icon {\n  width: 32pt; height: 32pt; border-radius: 9pt; display: flex; align-items: center; justify-content: center;\n  margin-bottom: 12pt; box-shadow: 0 4pt 0 0 rgba(18,26,45,.08);\n}\n.welcome .pillar .block-icon svg { width: 18pt; height: 18pt; color: #fff; }\n.welcome .pillar h3 { font-size: 11pt; margin: 0 0 4pt; }\n.welcome .pillar p  { font-size: 9pt; color: var(--fg-muted); margin: 0; line-height: 1.4; }\n\n/* ---------- Index / TOC ---------- */\n.toc-list { list-style: none; margin: 0; padding: 0; }\n.toc-item {\n  display: grid; grid-template-columns: auto 1fr auto auto;\n  align-items: center; gap: 14pt;\n  padding: 12pt 0; border-bottom: 1px dashed var(--border);\n}\n.toc-item .num {\n  font-family: var(--font-display); font-weight: 700; font-size: 18pt;\n  letter-spacing: -.01em; color: var(--jiro-blue); min-width: 36pt;\n}\n.toc-item .title { font-weight: 700; font-size: 12pt; }\n.toc-item .title small { display: block; font-weight: 400; font-size: 9pt; color: var(--fg-muted); margin-top: 2pt; }\n.toc-item .dot {\n  width: 10pt; height: 10pt; border-radius: 3pt;\n}\n.toc-item:hover { background: var(--jiro-cream-100); }\n.toc-item a, .toc-item a:hover { color: inherit; text-decoration: none; border: none; }\n.toc-item { transition: background .12s ease; cursor: pointer; padding-left: 8pt; padding-right: 8pt; border-radius: 6pt; }\n\n/* ---------- Chapter divider ---------- */\n.chapter-divider {\n  width: 100%; height: 100%;\n  display: flex; flex-direction: column; padding: 0.7in;\n  position: relative; color: var(--jiro-navy);\n}\n.chapter-divider .num {\n  font-family: var(--font-display); font-weight: 700; font-size: 220pt;\n  line-height: .8; letter-spacing: -.05em;\n  color: var(--jiro-cream-100); margin: -0.3in 0 -0.4in -0.1in;\n}\n.chapter-divider .eyebrow-big {\n  font-size: 11pt; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;\n  margin: 0 0 0.2in;\n}\n.chapter-divider h1 {\n  font-family: var(--font-display); font-weight: 700;\n  font-size: 60pt; line-height: .95; letter-spacing: -.02em; margin: 0 0 0.3in;\n  color: inherit;\n}\n.chapter-divider .desc { color: inherit; }\n.chapter-divider.cd-blue, .chapter-divider.cd-blue h1, .chapter-divider.cd-blue .desc { color: #fff; }\n.chapter-divider.cd-navy { background: var(--jiro-navy); color: #fff; }\n.chapter-divider.cd-navy h1, .chapter-divider.cd-navy .desc { color: #fff; }\n.chapter-divider.cd-navy .num { color: rgba(255,255,255,.14); }\n.chapter-divider.cd-navy .eyebrow-big { color: var(--jiro-yellow); }\n.chapter-divider.cd-blue .eyebrow-big { color: var(--jiro-yellow); }\n.chapter-divider .desc { font-size: 14pt; max-width: 32em; line-height: 1.35; margin: 0; }\n.chapter-divider.cd-yellow { background: var(--jiro-yellow); }\n.chapter-divider.cd-green  { background: var(--jiro-green); color: var(--jiro-navy); }\n.chapter-divider.cd-orange { background: var(--jiro-orange); }\n.chapter-divider.cd-mint   { background: var(--jiro-mint); }\n.chapter-divider.cd-blue   { background: var(--jiro-blue); color: #fff; }\n.chapter-divider.cd-blue .num { color: rgba(255,255,255,.16); }\n.chapter-divider .footmark { position: absolute; bottom: 0.5in; left: 0.7in; right: auto; height: 0.28in; opacity: .85; }\n.chapter-divider .footmark img { height: 100%; }\n.chapter-divider .chapter-illu {\n  position: absolute;\n  bottom: 0.55in;\n  right: 0.7in;\n  width: 1.5in;\n  height: 1.5in;\n  pointer-events: none;\n}\n.chapter-divider .chapter-illu svg { width: 100%; height: 100%; display: block; overflow: visible; }\n/* Paper-cut: each top-level shape gets a soft offset shadow behind it */\n.chapter-divider .chapter-illu svg > path,\n.chapter-divider .chapter-illu svg > rect,\n.chapter-divider .chapter-illu svg > circle,\n.chapter-divider .chapter-illu svg > polygon {\n  filter: drop-shadow(0 3px 3px rgba(18, 26, 45, 0.22));\n}\n/* Dark backgrounds (blue / navy) — soften shadows so they read as depth, not noise */\n.chapter-divider.cd-blue .chapter-illu svg > *,\n.chapter-divider.cd-navy .chapter-illu svg > * {\n  filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.35));\n}\n\n/* ---------- Two-column body ---------- */\n.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--col-gap); }\n.cols-3-7 { display: grid; grid-template-columns: 30% 1fr; gap: var(--col-gap); }\n\n/* ---------- Protocol / steps ---------- */\n.steps-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10pt; }\n.steps-list .step {\n  display: grid; grid-template-columns: 38pt 1fr; gap: 14pt;\n  background: var(--jiro-cream-100); border-radius: 12pt; padding: 14pt 16pt 14pt 16pt;\n  position: relative;\n}\n.steps-list .step.has-tag { padding-right: 86pt; }\n.steps-list .step .num {\n  font-family: var(--font-display); font-weight: 700; font-size: 22pt;\n  color: var(--jiro-blue); letter-spacing: -.01em; line-height: 1; padding-top: 2pt;\n}\n.steps-list .step h4 { margin: 0 0 4pt; font-size: 11pt; font-weight: 700; }\n.steps-list .step p  { margin: 0; font-size: 9.5pt; color: var(--fg-muted); line-height: 1.45; }\n.steps-list .step .tag {\n  position: absolute; top: 14pt; right: 16pt;\n  font-size: 8pt; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;\n  background: #fff; padding: 3pt 8pt; border-radius: 99pt; color: var(--jiro-blue);\n}\n\n/* ---------- Checklist ---------- */\n.checklist { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6pt; }\n.checklist li {\n  display: grid; grid-template-columns: 16pt 1fr; gap: 10pt; align-items: flex-start;\n  padding: 8pt 12pt; background: #fff; border: 1px solid var(--border); border-radius: 8pt;\n  font-size: 10pt;\n}\n.checklist li .check {\n  width: 14pt; height: 14pt; border-radius: 4pt; border: 1.5pt solid var(--border-strong);\n  display: flex; align-items: center; justify-content: center; margin-top: 1pt;\n}\n.checklist li.done { background: rgba(147,192,31,.08); border-color: rgba(147,192,31,.4); }\n.checklist li.done .check { background: var(--jiro-green); border-color: var(--jiro-green); color: #fff; font-weight: 700; font-size: 10pt; }\n.checklist li b { font-weight: 700; }\n.checklist li small { display: block; color: var(--fg-soft); font-size: 8.5pt; margin-top: 2pt; }\n\n/* ---------- Callouts ---------- */\n.callout {\n  border-radius: 12pt; padding: 14pt 16pt; margin: 0 0 10pt;\n  display: grid; grid-template-columns: 26pt 1fr; gap: 10pt font-weight: 700; }\n.annex-card .pg { font-family: var(--font-display); font-weight: 700; font-size: 14pt; color: var(--jiro-blue); }\n\n/* ---------- Block icon helper ---------- */\n.bi {\n  border-radius: 9pt; display: inline-flex; align-items: center; justify-content: center;\n  background: var(--jiro-yellow);\n}\n.bi.green  { background: var(--jiro-green); }\n.bi.blue   { background: var(--jiro-blue); }\n.bi.orange { background: var(--jiro-orange); }\n.bi.mint   { background: var(--jiro-mint); }\n.bi svg { color: #fff; }\n\n/* ---------- WhatsApp script animations ---------- */\n.wa-script .typing {\n  display: flex; align-items: center; gap: 4pt;\n  background: #fff; padding: 8pt 12pt; border-radius: 12pt;\n  border-top-left-radius: 4pt; width: max-content; max-width: 60pt;\n  box-shadow: 0 2pt 4pt rgba(0,0,0,.04);\n  margin-bottom: 6pt;\n}\n.wa-script .typing .dot {\n  width: 6pt; height: 6pt; border-radius: 50%; background: #99A0AC;\n  animation: jiro-typing 1.2s infinite ease-in-out;\n}\n.wa-script .typing .dot:nth-child(2) { animation-delay: .2s; }\n.wa-script .typing .dot:nth-child(3) { animation-delay: .4s; }\n@keyframes jiro-typing {\n  0%, 60%, 100% { transform: translateY(0); opacity: .4; }\n  30% { transform: translateY(-3pt); opacity: 1; }\n}\n\n/* Bubble entrance — paused by default; only animates after IntersectionObserver fires */\n.wa-script .bubble,\n.wa-script .bubble li {\n  opacity: 0;\n  animation-play-state: paused;\n}\n.wa-script.play .bubble { animation: jiro-bubble-in .35s cubic-bezier(.2,.8,.2,1) both; animation-play-state: running; }\n.wa-script.play .bubble li { animation: jiro-bubble-in .25s cubic-bezier(.2,.8,.2,1) both; animation-play-state: running; }\n.wa-script.play .bubble li:nth-child(1) { animation-delay: .15s; }\n.wa-script.play .bubble li:nth-child(2) { animation-delay: .30s; }\n.wa-script.play .bubble li:nth-child(3) { animation-delay: .45s; }\n.wa-script.play .bubble li:nth-child(4) { animation-delay: .60s; }\n.wa-scrip ass=\"chrome-top\"><span>Manual Ejecutivo<\u002Fspan><span>Bienvenida e índice · 02<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">02<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Bienvenida<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">BIENVENIDA · ÍNDICE<\u002Fp>\n    <h1 class=\"h-1\">No solo emitimos pólizas:<br>generamos confianza.<\u002Fh1>\n    <p class=\"lead\">Cada interacción con un agente, cliente o aseguradora <em style=\"font-style:normal;color:var(--jiro-blue);\">es la empresa<\u002Fem>. Este manual es tu compañero diario para que esa interacción se sienta cercana, profesional y resolutiva.<\u002Fp>\n    <ul class=\"toc-list\" style=\"margin-top: 14pt;\">\n      <li class=\"toc-item\"><a href=\"#p03\" style=\"display:contents; border:none;\"><span class=\"num\">01<\u002Fspan><span class=\"title\">Marco general<small>Objetivo, alcance, filosofía y perfil del ejecutivo.<\u002Fsmall><\u002Fspan><span class=\"dot\" style=\"background: var(--jiro-yellow);\"><\u002Fspan><span class=\"pg\">03<\u002Fspan><\u002Fa><\u002Fli>\n      <li class=\"toc-item\"><a href=\"#p06\" style=\"display:contents; border:none;\"><span class=\"num\">02<\u002Fspan><span class=\"title\">Operación &amp; control<small>Plataformas, trámites, escalamiento, seguimiento, emisión.<\u002Fsmall><\u002Fspan><span class=\"dot\" style=\"background: var(--jiro-green);\"><\u002Fspan><span class=\"pg\">06<\u002Fspan><\u002Fa><\u002Fli>\n      <li class=\"toc-item\"><a href=\"#p09\" style=\"display:contents; border:none;\"><span class=\"num\">03<\u002Fspan><span class=\"title\">Comunicación &amp; atención<small>Tiempos, frases sí/no, protocolo Premium, situaciones difíciles.<\u002Fsmall><\u002Fspan><span class=\"dot\" style=\"background: var(--jiro-orange);\"><\u002Fspan><span class=\"pg\">09<\u002Fspan><\u002Fa><\u002Fli>\n      <li class=\"toc-item\"><a href=\"#p12\" style=\"display:contents; border:none;\"><span class=\"num\">04<\u002Fspan><span class=\"title\">Guiones de perfilamiento<small>Auto · GMM · Casa · Daños · Transporte · Accidentes · RC Profesional.<\u002Fsmall><\u002Fspan><span class=\"dot\" style=\"background: var(--jiro-mint);\"><\u002Fspan><span class=\"pg\">12<\u002Fspan><\u002Fa><\u002Fli>\n      <li class=\"toc-item\"><a href=\"#p18\" style=\"display:contents; border:none;\"><span class=\"num\">05<\u002Fspan><span class=\"title\">Profesionalismo &amp; desempeño<small>Imagen, KPIs, confidencialidad y ética.<\u002Fsmall><\u002Fspan><span class=\"dot\" style=\"background: var(--jiro-blue);\"><\u002Fspan><span class=\"pg\">18<\u002Fspan><\u002Fa><\u002Fli>\n      <li class=\"toc-item\"><a href=\"#p20\" style=\"display:contents; border:none;\"><span class=\"num\">06<\u002Fspan><span class=\"title\">Anexos &amp; disposiciones finales<small>Checklist operativo y filosofía de cierre.<\u002Fsmall><\u002Fspan><span class=\"dot\" style=\"background: var(--jiro-navy);\"><\u002Fspan><span class=\"pg\">20<\u002Fspan><\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p03\">\n  <div class=\"chapter-divider cd-yellow\">\n    <div class=\"eyebrow-big\">Capítulo<\u002Fdiv>\n    <div class=\"num\">01<\u002Fdiv>\n    <h1>Marco<br>general.<\u002Fh1>\n    <p class=\"desc\">Objetivo, alcance, filosofía de servicio y el perfil que esperamos de cada Ejecutivo JIRO.<\u002Fp>\n    <img class=\"footmark\" src=\"4dc2fd76-3978-4cab-a37b-9c69675fba54\" alt=\"Jiro\">\n    <div class=\"chapter-illu\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n        <path d=\"M60 12 L100 22 L100 60 Q100 92 60 108 Q20 92 20 60 L20 22 Z\" fill=\"#121A2D\"><\u002Fpath>\n        <path d=\"M60 24 L88 32 L88 60 Q88 82 60 94 Q32 82 32 60 L32 32 Z\" fill=\"#F2F1E2\" opacity=\"0.18\"><\u002Fpath>\n        <path d=\"M44 62 L56 74 L80 50\" st    <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <hr style=\"border:none;border-top:1px solid var(--border);margin:14pt 0 10pt;\">\n    <h3 class=\"h-3\">Cada interacción genera confianza · cinco atributos no-negociables<\u002Fh3>\n    <div class=\"perfil-grid\" style=\"grid-template-columns: repeat(5, 1fr); gap: 6pt; margin-top: 6pt;\">\n      <div class=\"attr\" style=\"padding: 9pt 7pt; font-size: 8.5pt;\"><div class=\"bi blue\" style=\"width: 24pt; height: 24pt;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width: 13pt; height: 13pt;\"><path d=\"M13 2L3 14h9l-1 8 10-12h-9l1-8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Ágil<\u002Fdiv>\n      <div class=\"attr\" style=\"padding: 9pt 7pt; font-size: 8.5pt;\"><div class=\"bi green\" style=\"width: 24pt; height: 24pt;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width: 13pt; height: 13pt;\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg><\u002Fdiv>Profesional<\u002Fdiv>\n      <div class=\"attr\" style=\"padding: 9pt 7pt; font-size: 8.5pt;\"><div class=\"bi orange\" style=\"width: 24pt; height: 24pt;\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"width: 13pt; height: 13pt;\"><path d=\"M12 21s-7-4.35-9.5-9.06C.83 8.6 2.55 5 6 5c2 0 3.4 1.1 4 2.4C10.6 6.1 12 5 14 5c3.45 0 5.17 3.6 3.5 6.94C19 16.65 12 21 12 21z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Cercana<\u002Fdiv>\n      <div class=\"attr\" style=\"padding: 9pt 7pt; font-size: 8.5pt;\"><div class=\"bi mint\" style=\"width: 24pt; height: 24pt;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width: 13pt; height: 13pt;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>Resolutiva<\u002Fdiv>\n      <div class=\"attr\" style=\"padding: 9pt 7pt; font-size: 8.5pt;\"><div class=\"bi blue\" style=\"width: 24pt; height: 24pt;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width: 13pt; height: 13pt;\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21a8 8 0 0 1 16 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Humana<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout info\" style=\"margin-top: 12pt;\">\n      <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v5\"><\u002Fpath><circle cx=\"12\" cy=\"16.5\" r=\".5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <div><h4>Filosofía operativa<\u002Fh4><p style=\"font-style:italic;\">\"La calidad de una cotización comienza con la calidad de la información solicitada.\"<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-yellow\" id=\"p05\" data-wm=\"eye\">\n  \n  <div class=\"chrome-top\"><span>Cap. 01 · Marco general<\u002Fspan><span>Perfil del ejecutivo · 05<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">05<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 01 · Marco<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">4 · PERFIL DEL EJECUTIVO<\u002Fp>\n    <h1 class=\"h-1\">El ejecutivo representa<br>la imagen institucional.<\u002Fh1>\n    <p class=\"lead\">Todo Ejecutivo JIRO deberá conducirse con siete atributos. No son opcionales: son lo que define a la empresa frente a cualquier agente, asegurado o aseguradora.<\u002Fp>\n    <div class=\"perfil-grid\" style=\"margin-top: 12pt;\">\n      <div class=\"attr\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11l9-7 9 7\"><\u002Fpath><path d=\"M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Profesionalismo<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>Responsabilidad<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg><\u002Fdiv>Orden admin.<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi mint\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Excelente actitud<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Seguimiento<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Comunicación<\u002Fdiv>\n      <div class=\"attr\" style=\"grid-column: span 2;\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Discreción y confidencialidad<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout info\" style=\"margin-top: 14pt;\">\n      <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v5\"><\u002Fpath><circle cx=\"12\" cy=\"16.5\" r=\".5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <div><h4>Recuerda<\u002Fh4><p>Cuando hablas con un agente o cliente, no estás hablando como persona — estás hablando como JIRO. La forma en que respondes hoy define cómo te buscan mañana.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p06\">\n  <div class=\"chapter-divider cd-green\">\n    <div class=\"eyebrow-big\">Capítulo<\u002Fdiv>\n    <div class=\"num\">02<\u002Fdiv>\n    <h1>Operación<br>&amp; control.<\u002Fh1>\n    <p class=\"desc\">Los procesos diarios que sostienen la operación: acceso a plataformas, registro de trámites, escalamiento, seguimiento, emisión y validación.<\u002Fp>\n    <img class=\"footmark\" src=\"4dc2fd76-3978-4cab-a37b-9c69675fba54\" alt=\"Jiro\">\n    <div class=\"chapter-illu\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x=\"22\" y=\"22\" width=\"66\" height=\"82\" rx=\"6\" fill=\"#121A2D\" opacity=\"0.22\"><\u002Frect>\n        <rect x=\"18\" y=\"18\" width=\"66\" height=\"82\" rx=\"6\" fill=\"#F2F1E2\"><\u002Frect>\n        <rect x=\"38\" y=\"10\" width=\"28\" height=\"14\" rx=\"3\" fill=\"#121A2D\"><\u002Frect>\n        <rect x=\"28\" y=\"36\" width=\"46\" height=\"5\" rx=\"2.5\" fill=\"#121A2D\"><\u002Frect>\n        <rect x=\"28\" y=\"48\" width=\"38\" height=\"5\" rx=\"2.5\" fill=\"#121A2D\" opacity=\"0.5\"><\u002Frect>\n        <circle cx=\"82\" cy=\"86\" r=\"22\" fill=\"#121A2D\"><\u002Fcircle>\n        <path d=\"M72 86 L80 94 L92 78\" stroke=\"#F2F1E2\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-green\" id=\"p07\" data-wm=\"gears\">\n  \n  <div class=\"chrome-top\"><span>Cap. 02 · Operación &amp; control<\u002Fspan><span>Acceso · Registro de trámites · 07<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">07<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 02 · Operación<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">5 · LINEAMIENTOS &nbsp;·&nbsp; 6 · REGISTRO DE TRÁMITES<\u002Fp>\n    <h1 class=\"h-1\">Acceso a plataformas<br>y control de trámites.<\u002Fh1>\n    <p class=\"lead\">El ejecutivo deberá ingresar <b>siempre<\u002Fb> con las claves autorizadas para su zona o dirección, y registrar <b>toda<\u002Fb> solicitud en MOVI, bitácora interna y mesa de control. Estas dos disciplinas sostienen la operación.<\u002Fp>\n    <div class=\"cols-2\" style=\"margin-top: 12pt;\">\n      <div>\n        <h3 class=\"h-3\">En caso de bloqueo<\u002Fh3>\n        <ol class=\"steps-list\" style=\"gap: 6pt;\">\n          <li class=\"step\" style=\"padding: 10pt 12pt;\"><span class=\"num\">01<\u002Fspan><div><h4>Consultar accesos<\u002Fh4><p>MOVI o grupos oficiales autorizados.<\u002Fp><\u002Fdiv><\u002Fli>\n          <li class=\"step\" style=\"padding: 10pt 12pt;\"><span class=\"num\">02<\u002Fspan><div><h4>No reintentar<\u002Fh4><p>No más de 1 intento fallido.<\u002Fp><\u002Fdiv><\u002Fli>\n          <li class=\"step\" style=\"padding: 10pt 86pt 10pt 12pt;\"><span class=\"num\">03<\u002Fspan><div><h4>Esperar 20 min<\u002Fh4><p>Reactivación automática.<\u002Fp><\u002Fdiv><span class=\"tag\">20 min<\u002Fspan><\u002Fli>\n        <\u002Fol>\n        <div class=\"callout bad\" style=\"margin-top: 10pt;\">\n          <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 9l6 6M15 9l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><h4>Prohibido<\u002Fh4><p style=\"font-size:9pt;\">Compartir usuarios, contraseñas o información confidencial.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h3 class=\"h-3\">Información mínima de registro<\u002Fh3>\n        <table class=\"table\" style=\"font-size:8.5pt;\">\n          <thead><tr><th>Campo<\u002Fth><th style=\"text-align:right;\">Estatus<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td><b>Fecha y hora<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Ejecutivo responsable<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Agente solicitante<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Cliente<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Tipo de trámite<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Aseguradora<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Estatus (emitido / no emitido)<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Fecha compromiso<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td><b>Resultado final<\u002Fb><\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">SÍ<\u002Fspan><\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <div class=\"callout bad\" style=\"margin-top: 10pt;\">\n          <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v5\"><\u002Fpath><circle cx=\"12\" cy=\"16.5\" r=\".5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n          <div><h4>Política institucional<\u002Fh4><p style=\"font-size:9pt;\">Todo trámite sin registro será considerado <b>no ingresado<\u002Fb>. No genera comisión.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-green\" id=\"p08\" data-wm=\"clock\">\n  \n  <div class=\"chrome-top\"><span>Cap. 02 · Operación &amp; control<\u002Fspan><span>Escalamiento · Seguimiento · Emisión · 08<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">08<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 02 · Operación<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">7 · ESCALAMIENTO &nbsp;·&nbsp; 8 · SEGUIMIENTO &nbsp;·&nbsp; 12 / 13 · EMISIÓN<\u002Fp>\n    <h1 class=\"h-1\">Cuándo escalar.<br>Cuándo dar seguimiento.<br>Cómo emitir bien.<\u002Fh1>\n\n    <h3 class=\"h-3\" style=\"margin-top: 14pt;\">Escalamiento obligatorio<\u002Fh3>\n    <ul class=\"bullet-grid\">\n      <li>Prima neta supere <b>$50,000 MXN<\u002Fb>.<\u002Fli>\n      <li>Competencia entre despachos.<\u002Fli>\n      <li>Negocio estratégico.<\u002Fli>\n      <li>Condiciones especiales.<\u002Fli>\n      <li>El agente solicite atención prioritaria.<\u002Fli>\n      <li>Se requiera acompañamiento técnico.<\u002Fli>\n    <\u002Ful>\n\n    <h3 class=\"h-3\" style=\"margin-top: 14pt;\">Tiempos de seguimiento<\u002Fh3>\n    <div class=\"kpi-grid\">\n      <div class=\"kpi-card\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>Primer contacto<\u002Fh4><p>Dentro de las primeras <b>24 horas<\u002Fb>.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v8M8 12h8\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>Segundo seguimiento<\u002Fh4><p>A los <b>3 días<\u002Fb>, sin excepción.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\" style=\"grid-column: span 2;\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>Seguimiento continuo<\u002Fh4><p>Cada <b>7 días<\u002Fb> hasta cierre. El cliente o agente nunca deberá percibir abandono.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"h-3\" style=\"margin-top: 14pt;\">Emisión &amp; mesa de control<\u002Fh3>\n    <div class=\"cols-2\">\n      <div class=\"product-page\" style=\"display:block;\"><div class=\"panel\"><h4>✓ Antes de emitir<\u002Fh4><ul><li>Validar información completa.<\u002Fli><li>Revisar vigencias y sumas aseguradas.<\u002Fli><li>Validar método de pago y condiciones especiales.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n      <div class=\"product-page\" style=\"display:block;\"><div class=\"panel\"><h4>✓ Después de emitir<\u002Fh4><ul><li>Registrar en mesa de control.<\u002Fli><li>Enviar documentación y confirmar recepción.<\u002Fli><li>Integrar expediente <b>492<\u002Fb> y constancia fiscal si requiere factura.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p09\">\n  <div class=\"chapter-divider cd-orange\">\n    <div class=\"eyebrow-big\">Capítulo<\u002Fdiv>\n    <div class=\"num\">03<\u002Fdiv>\n    <h1>Comunicación<br>&amp; atención.<\u002Fh1>\n    <p class=\"desc\">Tiempos máximos de respuesta, frases recomendadas, el protocolo Premium de tres momentos y el manejo de situaciones difíciles.<\u002Fp>\n    <img class=\"footmark\" src=\"4dc2fd76-3978-4cab-a37b-9c69675fba54\" alt=\"Jiro\">\n    <div class=\"chapter-illu\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n        <path d=\"M28 16 Q18 16 18 26 L18 52 Q18 62 28 62 L40 62 L36 78 L52 62 L70 62 Q80 62 80 52 L80 26 Q80 16 70 16 Z\" fill=\"#F2F1E2\"><\u002Fpath>\n        <circle cx=\"34\" cy=\"39\" r=\"3.5\" fill=\"#121A2D\"><\u002Fcircle>\n        <circle cx=\"48\" cy=\"39\" r=\"3.5\" fill=\"#121A2D\"><\u002Fcircle>\n        <circle cx=\"62\" cy=\"39\" r=\"3.5\" fill=\"#121A2D\"><\u002Fcircle>\n        <path d=\"M54 50 Q44 50 44 60 L44 88 Q44 98 54 98 L90 98 L96 110 L96 98 Q104 96 104 88 L104 60 Q104 50 94 50 Z\" fill=\"#121A2D\"><\u002Fpath>\n        <path d=\"M60 74 L70 84 L92 62\" stroke=\"#F2F1E2\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-orange\" id=\"p10\" data-wm=\"chat\">\n  \n  <div class=\"chrome-top\"><span>Cap. 03 · Comunicación &amp; atención<\u002Fspan><span>Tiempos · Frases sí / no · 10<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">10<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 03 · Comunicación<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">9 · ESTÁNDARES &nbsp;·&nbsp; TIEMPOS &nbsp;·&nbsp; FRASES<\u002Fp>\n    <h1 class=\"h-1\">Lo que decimos y<br>cuánto tardamos en decirlo.<\u002Fh1>\n\n    <h3 class=\"h-3\" style=\"margin-top: 12pt;\">Tiempos máximos de respuesta<\u002Fh3>\n    <table class=\"table\" style=\"font-size: 9pt;\">\n      <thead><tr><th>Medio<\u002Fth><th>Tiempo máximo<\u002Fth><th style=\"text-align:right;\">Compromiso<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><b>WhatsApp<\u002Fb><\u002Ftd><td>15 a 30 minutos<\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">CRÍTICO<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><b>Correo electrónico<\u002Fb><\u002Ftd><td>2 horas hábiles<\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-o\">ALTO<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><b>Llamadas perdidas<\u002Fb><\u002Ftd><td>Devolver antes de 1 hora<\u002Ftd><td style=\"text-align:right;\"><span class=\"pill p-g\">CRÍTICO<\u002Fspan><\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"frase-grid\" style=\"margin-top: 14pt;\">\n      <div class=\"frase-card si\">\n        <h4>✓ Frases recomendadas<\u002Fh4>\n        <ul><li>Con gusto te apoyo.<\u002Fli><li>Permíteme validarlo.<\u002Fli><li>Quedo pendiente.<\u002Fli><li>Gracias por tu paciencia.<\u002Fli><li>Ya estamos trabajando en ello.<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n      <div class=\"frase-card no\">\n        <h4>✗ Frases no autorizadas<\u002Fh4>\n        <ul><li>No sé.<\u002Fli><li>Eso no me toca.<\u002Fli><li>No puedo hacer nada.<\u002Fli><li>La aseguradora no responde.<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout good\" style=\"margin-top: 12pt;\">\n      <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><h4>Sustitución institucional<\u002Fh4><p style=\"font-style:italic;\">\"Nos encontramos validando la información con la aseguradora para brindarte respuesta lo antes posible.\"<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-orange\" id=\"p11\" data-wm=\"chat\">\n  \n  <div class=\"chrome-top\"><span>Cap. 03 · Comunicación &amp; atención<\u002Fspan><span>Protocolo Premium · Situaciones difíciles · 11<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">11<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 03 · Comunicación<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">10 · PROTOCOLO PREMIUM &nbsp;·&nbsp; 11 · SITUACIONES DIFÍCILES<\u002Fp>\n    <h1 class=\"h-1\">Tres momentos.<br>Cinco reglas en conflicto.<\u002Fh1>\n\n    <h3 class=\"h-3\" style=\"margin-top: 10pt;\">Protocolo Premium · 3 momentos<\u002Fh3>\n    <ol class=\"steps-list\" style=\"gap: 6pt;\">\n      <li class=\"step\" style=\"padding: 10pt 86pt 10pt 12pt;\"><span class=\"num\">01<\u002Fspan><div><h4>Recibir<\u002Fh4><p>Transmite disposición inmediata y actitud positiva. Saluda por nombre.<\u002Fp><\u002Fdiv><span class=\"tag\">Apertura<\u002Fspan><\u002Fli>\n      <li class=\"step\" style=\"padding: 10pt 86pt 10pt 12pt;\"><span class=\"num\">02<\u002Fspan><div><h4>Resolver<\u002Fh4><p>Da seguimiento proactivo y mantén informado al cliente o agente — aunque no haya novedades.<\u002Fp><\u002Fdiv><span class=\"tag\">Desarrollo<\u002Fspan><\u002Fli>\n      <li class=\"step\" style=\"padding: 10pt 86pt 10pt 12pt;\"><span class=\"num\">03<\u002Fspan><div><h4>Despedir<\u002Fh4><p>Cierra cordialmente confirmando satisfacción y disponibilidad futura.<\u002Fp><\u002Fdiv><span class=\"tag\">Cierre<\u002Fspan><\u002Fli>\n    <\u002Fol>\n\n    <h3 class=\"h-3\" style=\"margin-top: 14pt;\">Cuando el cliente está enojado · 5 reglas<\u002Fh3>\n    <div class=\"kpi-grid\">\n      <div class=\"kpi-card\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21a8 8 0 0 1 16 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>1 · Escuchar<\u002Fh4><p>Deja terminar. Quien se siente escuchado se calma a la mitad.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 15s1.5 2 4 2 4-2 4-2\"><\u002Fpath><circle cx=\"9\" cy=\"9\" r=\"1\"><\u002Fcircle><circle cx=\"15\" cy=\"9\" r=\"1\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><h4>2 · Calma y respeto<\u002Fh4><p>Tu tono define el suyo.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 9l6 6M15 9l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>3 · No discutir<\u002Fh4><p>No responsabilices a otros equipos ni a la aseguradora.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi mint\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 21s-7-4.35-9.5-9.06C.83 8.6 2.55 5 6 5c2 0 3.4 1.1 4 2.4C10.6 6.1 12 5 14 5c3.45 0 5.17 3.6 3.5 6.94C19 16.65 12 21 12 21z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>4 · Empatía<\u002Fh4><p>\"Entiendo que esto es urgente para ti.\"<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout good\" style=\"margin-top: 10pt;\">\n      <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><h4>Respuesta sugerida<\u002Fh4><p style=\"font-style:italic;\">\"Entendemos la urgencia y ofrecemos una disculpa por la demora. Ya estamos dando seguimiento prioritario con la aseguradora y te mantendremos informado.\"<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p12\">\n  <div class=\"chapter-divider cd-mint\">\n    <div class=\"eyebrow-big\">Capítulo<\u002Fdiv>\n    <div class=\"num\">04<\u002Fdiv>\n    <h1>Guiones de<br>perfilamiento.<\u002Fh1>\n    <p class=\"desc\">La información que debes solicitar para cotizar correctamente cada ramo: Auto, GMM, Casa, Daños Empresariales, Transporte, Accidentes y RC Profesional.<\u002Fp>\n    <img class=\"footmark\" src=\"4dc2fd76-3978-4cab-a37b-9c69675fba54\" alt=\"Jiro\">\n    <div class=\"chapter-illu\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x=\"16\" y=\"22\" width=\"58\" height=\"78\" rx=\"6\" fill=\"#121A2D\"><\u002Frect>\n        <rect x=\"26\" y=\"34\" width=\"38\" height=\"4\" rx=\"2\" fill=\"#F2F1E2\"><\u002Frect>\n        <rect x=\"26\" y=\"44\" width=\"28\" height=\"4\" rx=\"2\" fill=\"#F2F1E2\"><\u002Frect>\n        <rect x=\"26\" y=\"58\" width=\"38\" height=\"4\" rx=\"2\" fill=\"#F2F1E2\" opacity=\"0.5\"><\u002Frect>\n        <rect x=\"26\" y=\"68\" width=\"22\" height=

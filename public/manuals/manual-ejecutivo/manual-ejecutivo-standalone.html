embalaje<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"panel warn\"><h4>Importancia<\u002Fh4><p style=\"font-size:9pt;margin:3pt 0 0;\">La ruta y el tipo de mercancía determinan: <b>riesgo<\u002Fb>, <b>prima<\u002Fb>, <b>restricciones<\u002Fb> y <b>aceptación<\u002Fb> del negocio.<\u002Fp><\u002Fdiv>\n        <div class=\"wa-script\"><div class=\"bubble\">¡Hola! Para cotizar transporte de mercancías necesito:<ul><li>Ruta completa (origen y destino)<\u002Fli><li>Tipo y valor de mercancía<\u002Fli><li>Frecuencia de viajes<\u002Fli><li>Horarios de traslado<\u002Fli><li>Medidas de seguridad<\u002Fli><\u002Ful><div class=\"time\">12:36 ✓✓<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-mint\" id=\"p17\" data-wm=\"doc\">\n  \n  <div class=\"chrome-top\"><span>Cap. 04 · Guiones de perfilamiento<\u002Fspan><span>18.6 Accidentes · 18.7 RC Profesional · 17<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">17<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 04 · Perfilamiento<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"product-page\">\n      <div>\n        <p class=\"eyebrow\">18.6 · ACCIDENTES PERSONALES<\u002Fp>\n        <h2 class=\"h-2\" style=\"margin-bottom: 10pt;\">Accidentes personales.<\u002Fh2>\n        <div class=\"panel\"><h4>Tipo de contratación<\u002Fh4><ul><li>Individual · Colectivo<\u002Fli><li>Licitación de gobierno · privada<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"panel\"><h4>Datos generales<\u002Fh4><ul><li>Número de asegurados · rangos de edad<\u002Fli><li>Actividad o giro<\u002Fli><li>Cobertura territorial · vigencia<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"panel\"><h4>Coberturas<\u002Fh4><ul><li>Suma asegurada · deducibles<\u002Fli><li>Coberturas deseadas<\u002Fli><li>Beneficios adicionales<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"panel warn\"><h4>En licitaciones validar<\u002Fh4><ul><li>Bases · requisitos técnicos<\u002Fli><li>Condiciones especiales<\u002Fli><li>Aseguradoras autorizadas<\u002Fli><\u002Ful><\u002Fdiv>\n        <h3 class=\"h-3\" style=\"margin-top: 8pt;\">Aseguradoras<\u002Fh3>\n        <div class=\"pill-row\"><span class=\"pill\">HIR<\u002Fspan><span class=\"pill\">QSalud<\u002Fspan><span class=\"pill\">GNP<\u002Fspan><span class=\"pill\">Chubb<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <p class=\"eyebrow\">18.7 · RC PROFESIONAL<\u002Fp>\n        <h2 class=\"h-2\" style=\"margin-bottom: 10pt;\">RC Profesional.<\u002Fh2>\n        <div class=\"panel warn\"><h4>RC Profesional · Base<\u002Fh4><p style=\"font-size:9pt;margin:3pt 0 0;\">Cubre daños ocasionados directamente por <b>errores, omisiones o actividades profesionales<\u002Fb>.<\u002Fp><\u002Fdiv>\n        <div class=\"panel\"><h4>Coberturas adicionales<\u002Fh4><ul><li>Daños al lugar donde se labora<\u002Fli><li>Daños por mantenimiento<\u002Fli><li>Actividades adicionales<\u002Fli><li>Responsabilidad cruzada<\u002Fli><li>Defensa legal ampliada<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"panel\"><h4>Información requerida<\u002Fh4><ul><li>Profesión · actividades específicas<\u002Fli><li>Número de empleados<\u002Fli><li>Lugar y experiencia profesional<\u002Fli><li>Historial de reclamaciones<\u002Fli><li>Coberturas adicionales requeridas<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"wa-script\"><div class=\"bubble\">¡Hola! Para cotizar RC Profesional necesito:<ul><li>Profesión y actividades<\u002Fli><li>Lugar donde laboras<\u002Fli><li>Número de empleados<\u002Fli><li>Cobertura requerida<\u002Fli><li>Si has tenido reclamaciones previas<\u002Fli><\u002Ful><p style=\"margin:5pt 0 0;font-size:9pt;\"><b>Importante:<\u002Fb> la RC base cubre daños ocasionados directamente por la actividad profesional.<\u002Fp><div class=\"time\">13:22 ✓✓<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p18\">\n  <div class=\"chapter-divider cd-blue\">\n    <div class=\"eyebrow-big\">Capítulo<\u002Fdiv>\n    <div class=\"num\">05<\u002Fdiv>\n    <h1>Profesionalismo<br>&amp; desempeño.<\u002Fh1>\n    <p class=\"desc\">La imagen institucional, los KPIs con los que serás evaluado y la confidencialidad que sostiene la relación con cada cliente y aseguradora.<\u002Fp>\n    <img class=\"footmark\" src=\"4dc2fd76-3978-4cab-a37b-9c69675fba54\" alt=\"Jiro\" style=\"filter: brightness(0) invert(1); opacity: .8;\">\n    <div class=\"chapter-illu\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n        <path d=\"M38 14 L38 58 L48 50 L58 58 L58 14 Z\" fill=\"#FFD62B\"><\u002Fpath>\n        <path d=\"M62 14 L62 58 L72 50 L82 58 L82 14 Z\" fill=\"#F2F1E2\"><\u002Fpath>\n        <circle cx=\"60\" cy=\"78\" r=\"28\" fill=\"#FFD62B\"><\u002Fcircle>\n        <circle cx=\"60\" cy=\"78\" r=\"20\" fill=\"#F2F1E2\"><\u002Fcircle>\n        <path d=\"M60 64 L64 74 L75 75 L66 82 L69 92 L60 86 L51 92 L54 82 L45 75 L56 74 Z\" fill=\"#164281\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page ch-blue\" id=\"p19\" data-wm=\"eye\">\n  \n  <div class=\"chrome-top\"><span>Cap. 05 · Profesionalismo &amp; desempeño<\u002Fspan><span>Imagen · KPIs · Confidencialidad · 19<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">19<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\"><span class=\"label\">Cap. 05 · Profesionalismo<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">14 · IMAGEN &nbsp;·&nbsp; 15 · KPI &nbsp;·&nbsp; 16 · CONFIDENCIALIDAD<\u002Fp>\n    <h1 class=\"h-1\">Lo que ven, lo que oyen,<br>lo que recuerdan.<\u002Fh1>\n\n    <h3 class=\"h-3\" style=\"margin-top: 12pt;\">Cinco estándares de imagen institucional<\u002Fh3>\n    <div class=\"perfil-grid\" style=\"grid-template-columns: repeat(3, 1fr); margin-top: 6pt;\">\n      <div class=\"attr\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21a8 8 0 0 1 16 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Presentación<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Lenguaje<\u002Fdiv>\n      <div class=\"attr\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Puntualidad<\u002Fdiv>\n      <div class=\"attr\" style=\"grid-column: span 1;\"><div class=\"bi mint\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11l9-7 9 7\"><\u002Fpath><path d=\"M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Respeto<\u002Fdiv>\n      <div class=\"attr\" style=\"grid-column: span 2;\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l8 3v6c0 4.5-3.5 8-8 9-4.5-1-8-4.5-8-9V6z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>Conducta ética<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"h-3\" style=\"margin-top: 14pt;\">Ocho KPIs · evaluación mensual<\u002Fh3>\n    <div class=\"kpi-grid\">\n      <div class=\"kpi-card\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>1 · Tiempo de respuesta<\u002Fh4><p>Velocidad de primer contacto, por canal.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><div><h4>2 · Tiempo de emisión<\u002Fh4><p>De solicitud a póliza emitida.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>3 · Nivel de seguimiento<\u002Fh4><p>% de trámites con seguimiento al día.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi mint\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>4 · Negocios emitidos<\u002Fh4><p>Volumen mensual de pólizas.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi blue\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 4v6h-6\"><\u002Fpath><path d=\"M20.49 15A9 9 0 1 1 18.36 5.64L23 10\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>5 · Índice de renovación<\u002Fh4><p>% renovadas vs. vencidas.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi green\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 9l6 6M15 9l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>6 · Errores operativos<\u002Fh4><p>Re-trabajos, reprocesos.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi orange\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>7 · Calidad de servicio<\u002Fh4><p>Encuestas de agentes y clientes.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"bi mint\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"3\" width=\"16\" height=\"18\" rx=\"1.5\"><\u002Frect><path d=\"M8 7h2M8 11h2M8 15h2M14 7h2M14 11h2M14 15h2\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><h4>8 · Registro en sistemas<\u002Fh4><p>Disciplina con MOVI y bitácoras.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout bad\" style=\"margin-top: 12pt;\">\n      <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 9l6 6M15 9l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><h4>Confidencialidad · queda prohibido<\u002Fh4><p>Compartir información sensible. Difundir datos internos. Utilizar información para fines ajenos a la operación. <b>El incumplimiento podrá derivar en sanciones administrativas.<\u002Fb><\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p20\">\n  <div class=\"chapter-divider cd-navy\">\n    <div class=\"eyebrow-big\">Capítulo final<\u002Fdiv>\n    <div class=\"num\">06<\u002Fdiv>\n    <h1>Anexos &amp;<br>disposiciones.<\u002Fh1>\n    <p class=\"desc\">El checklist operativo que cierra cada trámite y las disposiciones finales que rigen este manual.<\u002Fp>\n    <img class=\"footmark\" src=\"4dc2fd76-3978-4cab-a37b-9c69675fba54\" alt=\"Jiro\" style=\"filter: brightness(0) invert(1); opacity: .8;\">\n    <div class=\"chapter-illu\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n        <path d=\"M18 30 L40 30 L48 38 L102 38 L102 96 Q102 102 96 102 L24 102 Q18 102 18 96 Z\" fill=\"#FFD62B\"><\u002Fpath>\n        <rect x=\"30\" y=\"48\" width=\"64\" height=\"50\" rx=\"3\" fill=\"#F2F1E2\"><\u002Frect>\n        <rect x=\"38\" y=\"58\" width=\"36\" height=\"4\" rx=\"2\" fill=\"#121A2D\"><\u002Frect>\n        <rect x=\"38\" y=\"68\" width=\"46\" height=\"4\" rx=\"2\" fill=\"#121A2D\" opacity=\"0.5\"><\u002Frect>\n        <rect x=\"38\" y=\"78\" width=\"30\" height=\"4\" rx=\"2\" fill=\"#121A2D\" opacity=\"0.5\"><\u002Frect>\n        <circle cx=\"84\" cy=\"86\" r=\"11\" fill=\"#164281\"><\u002Fcircle>\n        <path d=\"M78 86 L82 90 L89 81\" stroke=\"#F2F1E2\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" id=\"p21\" data-wm=\"flag\">\n  \n  <div class=\"chrome-top\"><span>Cap. 06 · Anexos<\u002Fspan><span>Checklist · Disposiciones finales · 21<\u002Fspan><\u002Fdiv>\n  <div class=\"chrome-bot\"><span class=\"crumb\">JIRO · Manual Corporativo Ejecutivo<\u002Fspan><span class=\"page-no\">21<\u002Fspan><\u002Fdiv>\n  <div class=\"side-ribbon\" style=\"background: var(--jiro-navy);\"><span class=\"label\">Anexos<\u002Fspan><\u002Fdiv>\n  <div class=\"content\">\n    <p class=\"eyebrow\">17 · CHECKLIST OPERATIVO &nbsp;·&nbsp; 19 · DISPOSICIONES<\u002Fp>\n    <h1 class=\"h-1\">Antes de cerrar un trámite,<br>valida cada punto.<\u002Fh1>\n\n    <div class=\"cols-2\" style=\"margin-top: 12pt;\">\n      <ul class=\"checklist\">\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Solicitud registrada<\u002Fb><small>MOVI + bitácora interna<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Documentación completa<\u002Fb><small>Cliente, vehículo o riesgo<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Cotización enviada<\u002Fb><small>Con tiempo compromiso<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Seguimiento realizado<\u002Fb><small>Conforme Cap. 02<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Emisión correcta<\u002Fb><small>Vigencia, suma, cobertura<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Registro en mesa de control<\u002Fb><small>Producción integrada<\u002Fsmall><\u002Fdiv><\u002Fli>\n      <\u002Ful>\n      <ul class=\"checklist\">\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Documentos enviados<\u002Fb><small>Póliza, condiciones, recibo<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Confirmación de recepción<\u002Fb><small>Sin acuse, no cierra<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Producción validada<\u002Fb><small>Coincide con condiciones<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Expediente 492 integrado<\u002Fb><small>Regulatorio completo<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Constancia fiscal adjunta<\u002Fb><small>Si requiere facturación<\u002Fsmall><\u002Fdiv><\u002Fli>\n        <li tabindex=\"0\"><span class=\"check\"><\u002Fspan><div><b>Trámite cerrado<\u002Fb><small>Estatus final actualizado<\u002Fsmall><\u002Fdiv><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"pullquote\" style=\"margin-top: 14pt; background: var(--jiro-yellow); padding: 22pt 28pt;\">\n      <blockquote style=\"font-size: 22pt; line-height: 1.1;\">No solo emitimos pólizas:<br><em style=\"font-style:normal;color:var(--jiro-blue);\">generamos confianza.<\u002Fem><\u002Fblockquote>\n      <div class=\"attribution\">— Filosofía JIRO<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"text-align: center; font-size: 9pt; margin-top: 12pt; max-width: 38em; align-self: center; line-height: 1.5; color: var(--fg-muted);\">\n      Este manual tiene carácter obligatorio para todo el personal involucrado en operación y atención. La Dirección podrá actualizarlo conforme a necesidades operativas, regulatorias o comerciales.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n<script>\n  // ============ WhatsApp typing -> bubble animation ============\n  // Each .wa-script gets: 1) typing indicator prepended; 2) bubble revealed after delay.\n  // Triggered by IntersectionObserver so it plays as the user scrolls each guion into view.\n  (function () {\n    const scripts = document.querySelectorAll(\".wa-script\");\n    if (!(\"IntersectionObserver\" in window)) {\n      // Fallback: just reveal everything.\n      scripts.forEach(s => s.classList.add(\"play\"));\n      return;\n    }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (!entry.isIntersecting) return;\n        const wa = entry.target;\n        if (wa.dataset.played) return;\n        wa.dataset.played = \"1\";\n\n        // Inject typing indicator BEFORE the bubble.\n        const bubble = wa.querySelector(\".bubble\");\n        if (!bubble) return;\n        const typing = document.createElement(\"div\");\n        typing.className = \"typing\";\n        typing.innerHTML = '<span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan>';\n        wa.insertBefore(typing, bubble);\n\n        // After 1100ms, remove typing and reveal bubble.\n        setTimeout(() => {\n          typing.remove();\n          wa.classList.add(\"play\");\n        }, 1100);\n\n        io.unobserve(wa);\n      });\n    }, { threshold: 0.25 });\n\n    scripts.forEach(s => io.observe(s));\n  })();\n\n  // ============ Smooth scroll on TOC clicks ============\n  document.querySelectorAll('.toc-item a[href^=\"#\"]').forEach(a => {\n    a.addEventListener(\"click\", (e) => {\n      const id = a.getAttribute(\"href\").slice(1);\n      const target = document.getElementById(id);\n      if (!target) return;\n      e.preventDefault();\n      target.scrollIntoView({ behavior: \"smooth\", block: \"start\" });\n      history.replaceState(null, \"\", \"#\" + id);\n    });\n  });\n  // ============ Interactive checklist (Cap. 06) ============\n  // Click any checklist row to toggle its \"done\" state; persists in localStorage.\n  (function () {\n    const STORAGE_KEY = \"jiro-manual-ejec-checklist\";\n    const items = document.querySelectorAll(\".checklist li\");\n    if (!items.length) return;\n    let state = {};\n    try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || \"{}\"); } catch (e) { state = {}; }\n\n    items.forEach((li, i) => {\n      const key = \"item-\" + i;\n      const check = li.querySelector(\".check\");\n      const apply = (done) => {\n        if (done) { li.classList.add(\"done\"); check.textContent = \"✓\"; }\n        else { li.classList.remove(\"done\"); check.textContent = \"\"; }\n      };\n      apply(!!state[key]);\n      li.style.cursor = \"pointer\";\n      li.addEventListener(\"click\", () => {\n        state[key] = !state[key];\n        apply(state[key]);\n        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}\n      });\n      li.addEventListener(\"keydown\", (e) => {\n        if (e.key === \" \" || e.key === \"Enter\") { e.preventDefault(); li.click(); }\n      });\n    });\n  })();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>

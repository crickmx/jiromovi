<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#061828"/>
    </linearGradient>
    <linearGradient id="ringA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A8CC"/>
    </linearGradient>
    <linearGradient id="sparkA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#00C8F0"/>
    </linearGradient>
    <linearGradient id="coreA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5C0"/>
      <stop offset="100%" stop-color="#0097B2"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="dropA">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="13" fill="url(#bgA)"/>
  <rect width="48" height="48" rx="13" fill="none" stroke="rgba(0,212,170,0.18)" stroke-width="1"/>

  <!-- Glow center -->
  <circle cx="24" cy="24" r="18" fill="url(#glowA)"/>

  <!-- Orbit ring -->
  <circle cx="24" cy="24" r="13" stroke="url(#ringA)" stroke-width="1.2" stroke-dasharray="3.5 2.5" fill="none" opacity="0.5"/>

  <!-- Neural nodes on ring -->
  <circle cx="24" cy="11" r="1.8" fill="url(#sparkA)" opacity="0.9"/>
  <circle cx="35.3" cy="17.5" r="1.4" fill="url(#sparkA)" opacity="0.7"/>
  <circle cx="35.3" cy="30.5" r="1.4" fill="url(#sparkA)" opacity="0.7"/>
  <circle cx="24" cy="37" r="1.4" fill="url(#sparkA)" opacity="0.5"/>
  <circle cx="12.7" cy="30.5" r="1.4" fill="url(#sparkA)" opacity="0.7"/>
  <circle cx="12.7" cy="17.5" r="1.8" fill="url(#sparkA)" opacity="0.9"/>

  <!-- Connection lines from nodes to center -->
  <line x1="24" y1="11" x2="24" y2="17" stroke="url(#sparkA)" stroke-width="0.7" opacity="0.4"/>
  <line x1="35.3" y1="17.5" x2="30" y2="20" stroke="url(#sparkA)" stroke-width="0.7" opacity="0.4"/>
  <line x1="35.3" y1="30.5" x2="30" y2="28" stroke="url(#sparkA)" stroke-width="0.7" opacity="0.4"/>
  <line x1="12.7" y1="17.5" x2="18" y2="20" stroke="url(#sparkA)" stroke-width="0.7" opacity="0.4"/>
  <line x1="12.7" y1="30.5" x2="18" y2="28" stroke="url(#sparkA)" stroke-width="0.7" opacity="0.4"/>

  <!-- Central "C" lettermark -->
  <path d="M 29 17.5 Q 24 14 19.5 17 Q 15 20 15 24 Q 15 28 19.5 31 Q 24 34 29 30.5"
    stroke="url(#coreA)" stroke-width="3.5" fill="none" stroke-linecap="round"
    filter="url(#dropA)"/>

  <!-- Core dot -->
  <circle cx="24" cy="24" r="3.2" fill="url(#sparkA)" filter="url(#dropA)"/>
  <circle cx="24" cy="24" r="1.5" fill="white" opacity="0.9"/>

  <!-- Top-right AI badge -->
  <rect x="32" y="4" width="13" height="8.5" rx="3" fill="url(#sparkA)" opacity="0.92"/>
  <text x="38.5" y="10.8" font-family="'SF Pro Display','Inter',Arial,sans-serif"
    font-size="5.5" font-weight="900" letter-spacing="0.4"
    text-anchor="middle" fill="#061828">AI</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 185" fill="none">
  <!-- WiFi dot -->
  <circle cx="100" cy="14" r="5" fill="#1C37E0"/>
  <!-- WiFi arc small -->
  <path d="M83 34 Q100 22 117 34" stroke="#1C37E0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- WiFi arc large -->
  <path d="M65 20 Q100 -6 135 20" stroke="#1C37E0" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Envelope body -->
  <rect x="10" y="56" width="180" height="126" rx="14" fill="#1C37E0"/>

  <!-- Envelope bottom-left fold -->
  <path d="M10 170 L10 182 Q10 182 24 182 L82 138 Z" fill="#0E2BB8"/>
  <!-- Envelope bottom-right fold -->
  <path d="M190 170 L190 182 Q190 182 176 182 L118 138 Z" fill="#0E2BB8"/>

  <!-- Center seam (V fold on closed envelope front) -->

  <!-- Top flap V shape (lighter blue) -->
  <path d="M8 72 L100 148 L192 72 Z" fill="#4D65FF"/>

  <!-- "seguwallet" text -->
  <text x="100" y="238" font-family="'Inter','Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="#1C37E0" text-anchor="middle" letter-spacing="-0.5">seguwallet</text>
</svg>

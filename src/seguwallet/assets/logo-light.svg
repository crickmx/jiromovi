<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" fill="none">
  <!-- WiFi dot -->
  <circle cx="100" cy="26" r="5" fill="#1C37E0"/>
  <!-- WiFi arc small -->
  <path d="M83 46 Q100 34 117 46" stroke="#1C37E0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- WiFi arc large -->
  <path d="M65 32 Q100 6 135 32" stroke="#1C37E0" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Envelope body -->
  <rect x="10" y="68" width="180" height="126" rx="14" fill="#1C37E0"/>

  <!-- Envelope bottom-left fold -->
  <path d="M10 182 L10 194 Q10 194 24 194 L82 150 Z" fill="#0E2BB8"/>
  <!-- Envelope bottom-right fold -->
  <path d="M190 182 L190 194 Q190 194 176 194 L118 150 Z" fill="#0E2BB8"/>

  <!-- Center seam (V fold on closed envelope front) -->
  <path d="M10 68 L100 138 L190 68" stroke="#4D65FF" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- "seguwallet" wordmark -->
  <text x="100" y="244" font-family="'Inter','Segoe UI',Arial,sans-serif" font-weight="800" font-size="25" fill="#1C37E0" text-anchor="middle" letter-spacing="-0.3">seguwallet</text>
</svg>

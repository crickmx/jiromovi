<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- WiFi dot -->
  <circle cx="100" cy="28" r="4.5" fill="#1228B8"/>
  <!-- WiFi arc small -->
  <path d="M84 44 Q100 32 116 44" stroke="#1228B8" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- WiFi arc large -->
  <path d="M68 30 Q100 8 132 30" stroke="#1228B8" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Envelope body (rounded rect) -->
  <rect x="8" y="72" width="184" height="130" rx="16" fill="#2B3FE6"/>

  <!-- Dark inner shadow area (bottom of envelope) -->
